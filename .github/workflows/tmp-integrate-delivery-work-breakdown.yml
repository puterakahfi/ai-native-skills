name: Temporary Integrate Delivery Work Breakdown

on:
  push:
    branches:
      - 53-delivery-work-breakdown
    paths:
      - skills/delivery-work-breakdown/**
      - contracts/tests/delivery-work-breakdown.test.yaml
      - .github/workflows/tmp-integrate-delivery-work-breakdown.yml

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 53-delivery-work-breakdown
          fetch-depth: 0

      - name: Patch workflow composition and documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one source match, found {count}: {old[:120]!r}")
              write(path, text.replace(old, new, 1))

          def insert_before_once(path: str, marker: str, addition: str) -> None:
              text = read(path)
              count = text.count(marker)
              if count != 1:
                  raise SystemExit(f"{path}: expected exactly one marker, found {count}: {marker[:120]!r}")
              write(path, text.replace(marker, addition + marker, 1))

          def append_case(path: str, case_id: str, yaml_text: str) -> None:
              text = read(path)
              if f"id: {case_id}" in text:
                  return
              if not text.endswith("\n"):
                  text += "\n"
              write(path, text + "\n" + yaml_text.rstrip() + "\n")

          # workflow-router
          path = "skills/workflow-router/SKILL.md"
          replace_once(path, "ai-native-skills.version: 1.4.1", "ai-native-skills.version: 1.5.0")
          replace_once(
              path,
              'ai-native-skills.requires: "redesign-workflow design-audit design-refinement design-review brand-identity-review new-feature-workflow bugfix-workflow code-review-workflow deployment-workflow product-development-workflow chatgpt-app-development skill-evolution skill-eval git-workflow skill-doctor spec-workflow"',
              'ai-native-skills.requires: "redesign-workflow design-audit design-refinement design-review brand-identity-review new-feature-workflow bugfix-workflow code-review-workflow deployment-workflow product-development-workflow delivery-work-breakdown chatgpt-app-development skill-evolution skill-eval git-workflow skill-doctor spec-workflow"',
          )
          replace_once(
              path,
              'ai-native-skills.related_skills: \'["role-switcher","product-development-workflow","chatgpt-app-development","redesign-workflow","design-audit","design-refinement","design-review","brand-identity-review","skill-evolution","bugfix-workflow","new-feature-workflow","code-review-workflow","deployment-workflow","spec-workflow"]\'',
              'ai-native-skills.related_skills: \'["role-switcher","product-development-workflow","delivery-work-breakdown","chatgpt-app-development","redesign-workflow","design-audit","design-refinement","design-review","brand-identity-review","skill-evolution","bugfix-workflow","new-feature-workflow","code-review-workflow","deployment-workflow","spec-workflow"]\'',
          )
          replace_once(
              path,
              "| Add a capability to an existing product | `new-feature-workflow` | spec, product/design/engineering owners |",
              "| Add a capability to an existing product | `new-feature-workflow` | spec, product/design/engineering owners; `delivery-work-breakdown` when multi-slice or branch topology is unresolved |",
          )
          insert_before_once(
              path,
              "## Platform Specialist Overlays\n",
              """## Delivery Topology Overlay

Lifecycle selection and delivery topology are separate decisions.

```text
product-development-workflow | new-feature-workflow
  one independently releasable slice
    → delivery-work-breakdown may classify feature/standalone
    → product-defined release or integration target

  multiple dependent slices / one end-to-end outcome
    → delivery-work-breakdown
    → release_unit: epic
    → child PRs target the epic/integration branch
    → final epic PR targets the release branch after integrated acceptance
```

Load `delivery-work-breakdown` before repository execution when the request includes a new app, broad capability, several dependent slices, epic/feature/task decomposition, feature-flag exception, branch-base choice, or PR-target choice.

The repository default branch, green CI, or mergeability must not choose the PR target.

""",
          )
          replace_once(
              path,
              "| “add ChatGPT App integration to this product” | `new-feature-workflow` + `chatgpt-app-development` |",
              "| “add ChatGPT App integration to this product” | `new-feature-workflow` + `chatgpt-app-development`; add `delivery-work-breakdown` for dependent P0 slices |",
          )
          replace_once(
              path,
              "New capability? → new-feature-workflow\n",
              "New capability? → new-feature-workflow\n  multi-slice / branch target unresolved? → delivery-work-breakdown\n",
