name: Temporary Integrate Delivery Work Breakdown

on:
  push:
    branches:
      - 53-delivery-work-breakdown
    paths:
      - scripts/tmp-integrate-delivery.py
      - .github/workflows/tmp-integrate-delivery-work-breakdown.yml

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 53-delivery-work-breakdown
          fetch-depth: 0

      - name: Validate integration script
        run: python -m py_compile scripts/tmp-integrate-delivery.py

      - name: Apply integration
        run: python scripts/tmp-integrate-delivery.py

      - name: Remove staging files
        run: |
          rm scripts/tmp-integrate-delivery.py
          rm .github/workflows/tmp-integrate-delivery-work-breakdown.yml

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat(product): integrate delivery work breakdown"
          git push origin HEAD:53-delivery-work-breakdown
