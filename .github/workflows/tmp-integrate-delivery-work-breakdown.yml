          replace_once(
              path,
              "  --skill decision-provenance \\\n  --skill master-design \\",
              "  --skill decision-provenance \\\n  --skill delivery-work-breakdown \\\n  --skill master-design \\",
          )
          replace_once(
              path,
              "End-to-end ChatGPT App product delivery using the existing product lifecycle plus the Apps SDK/MCP platform specialist.",
              "End-to-end ChatGPT App product delivery using the existing product lifecycle, release-unit/epic decomposition, and the Apps SDK/MCP platform specialist.",
          )
          # Add to ChatGPT pack after product-manager; the first occurrence after heading is handled by split.
          text = read(path)
          heading = "## ChatGPT App Product Pack"
          before, after = text.split(heading, 1)
          old = "  --skill product-manager \\\n  --skill decision-provenance \\" 
          new = "  --skill product-manager \\\n  --skill delivery-work-breakdown \\\n  --skill decision-provenance \\"
          if after.count(old) != 1:
              raise SystemExit(f"{path}: ChatGPT pack insertion source count={after.count(old)}")
          write(path, before + heading + after.replace(old, new, 1))
          insert_before_once(
              path,
              "| `implementation-context-discovery` | repository evidence;",
              "| `delivery-work-breakdown` | verified scope and acceptance criteria; repository/release context; product-defined issue, branch, PR, feature-flag, merge, and release policy; git-workflow for execution |\n",
          )

          # Test version bumps and regression cases
          replace_once("contracts/tests/workflow-router.test.yaml", "version: 1.4.1", "version: 1.5.0")
          append_case("contracts/tests/workflow-router.test.yaml", "multi-slice-product-loads-delivery-topology", """  - id: multi-slice-product-loads-delivery-topology
    description: A broad dependent capability keeps its lifecycle and loads delivery decomposition before Git execution.
    trigger: Add a ChatGPT App P0 to an existing product through MCP, tools, widget, native handoff, and runtime verification. The slices are dependent and branch targets are not defined.
    must_contain:
    - new-feature-workflow
    - chatgpt-app-development
    - delivery-work-breakdown
    - release unit
    - epic/integration branch
    must_not_contain:
    - every child PR targets main
    - default branch decides the target
    quality_gates_tested:
    - existing_product_feature_route_preserved
    - platform_specialist_overlay
    - release_unit_classified_before_repository_execution
""")

          replace_once("contracts/tests/new-feature-workflow.test.yaml", 'version: "2.2.0"', 'version: "2.3.0"')
          append_case("contracts/tests/new-feature-workflow.test.yaml", "epic-child-targets-integration-branch", """    - id: epic-child-targets-integration-branch
      description: A feature slice inside an epic cannot create a branch or target main before delivery topology passes.
      trigger: Implement the MCP tools child slice for epic 37. Repository default is main, but no base branch or PR target has been recorded yet.
      must_contain:
        - delivery-work-breakdown
        - release unit
        - parent_ref
        - base_branch
        - pr_target
        - BLOCKED
      must_not_contain:
        - target main by default
        - create the branch immediately
      quality_gates_tested:
        - release_unit_classified_before_repository_execution
        - epic_child_pr_target_matches_integration_branch
        - no_orphan_feature_slice
""")

          replace_once("contracts/tests/git-workflow.test.yaml", "version: 1.0.1", "version: 1.1.0")
          append_case("contracts/tests/git-workflow.test.yaml", "git-does-not-guess-epic-pr-target", """  - id: git-does-not-guess-epic-pr-target
    description: Git operations consume the approved epic topology rather than the repository default.
    trigger: Create a branch and PR for a child of epic 37. The topology record says base and target are epic/37-chatgpt-app-p0 while repository default is main.
    must_contain:
    - delivery-work-breakdown
    - epic/37-chatgpt-app-p0
    - base branch
    - PR target
    must_not_contain:
    - default branch wins
    - target main
    quality_gates_tested:
    - branch_must_be_created_from_correct_base
    - pr_target_must_match_approved_delivery_topology
""")

          replace_once("contracts/tests/product-manager.test.yaml", "version: 1.0.1", "version: 1.1.0")
          append_case("contracts/tests/product-manager.test.yaml", "task-breakdown-hands-off-release-topology", """  - id: task-breakdown-hands-off-release-topology
    description: Product task breakdown keeps scope traceability but delegates epic and branch topology decisions.
    trigger: Break a multi-slice ChatGPT App MVP into tasks and decide where each PR should target.
    must_contain:
    - tasks_must_trace_to_acceptance_criteria
    - parent_ref
    - delivery-work-breakdown
    - release unit
    - branch topology
    must_not_contain:
    - product-manager chooses main from repository default
    - floating task
    quality_gates_tested:
    - acceptance_criteria_must_be_testable_not_vague
    - tasks_must_trace_to_acceptance_criteria
""")

          replace_once("contracts/tests/product-development-workflow.test.yaml", 'version: "2.2.0"', 'version: "2.3.0"')
          append_case("contracts/tests/product-development-workflow.test.yaml", "multi-slice-mvp-requires-epic-acceptance", """    - id: multi-slice-mvp-requires-epic-acceptance
      description: Product development decomposes a dependent MVP into an epic before feature branches and verifies it as one release unit.
      trigger: The approved MVP requires seven dependent implementation slices. Create branches and merge each slice directly to main as soon as its CI is green.
      must_contain:
        - delivery-work-breakdown
        - release_unit: epic
        - parent acceptance criteria
        - integration branch
        - end-to-end acceptance
        - release authorization
      must_not_contain:
        - child CI proves product acceptance
        - direct child PR to main
      quality_gates_tested:
        - mvp_release_unit_and_topology_defined_before_implementation
        - child_evidence_reconciled_at_epic_acceptance
        - release_ready_does_not_self_authorize_release
""")
          PY

      - name: Remove temporary workflow
        run: rm .github/workflows/tmp-integrate-delivery-work-breakdown.yml

      - name: Commit integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No integration changes"
            exit 0
          fi
          git commit -m "feat(product): integrate delivery work breakdown"
          git push origin HEAD:53-delivery-work-breakdown
