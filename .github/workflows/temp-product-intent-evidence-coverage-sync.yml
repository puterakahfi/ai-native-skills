name: Temporary product intent evidence coverage sync

on:
  push:
    branches:
      - 113-product-intent-evidence-conformance

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install inventory dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Regenerate contract coverage inventory
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Commit generated inventory when changed
        working-directory: ai-native-skills
        shell: bash
        run: |
          if git diff --quiet -- docs/contract-coverage-discovery.yaml; then
            echo "Inventory already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/contract-coverage-discovery.yaml
          git commit -m "chore(conformance): sync contract coverage inventory"
          git push
