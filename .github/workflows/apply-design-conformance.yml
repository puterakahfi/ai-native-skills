name: Apply Design Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-design-conformance.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ai-native-skills branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Checkout pinned ai-native-core
        uses: actions/checkout@v6
        with:
          repository: puterakahfi/ai-native-core
          ref: 97db5370efe0e4af8ed326819400c2b068910525
          path: .deps/ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Apply reviewed design interface patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import yaml

          root = Path.cwd()

          configs = {
              "accessibility": {
                  "case_id": "explicit-accessibility-interface-and-alt-text",
                  "trigger": "Audit a real UI page for accessibility and return a concrete remediation contract.",
                  "anti": "images may omit alt text when the layout looks clear",
                  "note": "Treat the supplied ui_component_or_page as evidence. Every meaningful image needs meaningful alternative text; decorative images must be explicitly hidden. Return the audit, violations, remediation, ARIA guidance, and keyboard map as separate evidence-bearing outputs.",
              },
              "adaptive-component-design": {
                  "case_id": "requested-component-is-evaluated-across-contexts",
                  "trigger": "Evaluate a requested tabs component for mobile, tablet, and desktop using real tasks and content.",
                  "anti": "the requested component is immutable",
                  "note": "Treat a requested component as a proposed solution. Use product intent, tasks, content, current components, and target contexts to compare alternatives. Horizontal collections need truthful overflow affordances; touch, pointer, and keyboard behavior must be defined, and targets may not overlap or clip.",
              },
              "dark-light-theming": {
                  "case_id": "both-theme-token-map-and-fouc-strategy",
                  "trigger": "Define a light/dark theme contract from an existing color token map and toggle requirement.",
                  "anti": "map only the default theme",
                  "note": "Map every semantic token for both themes, respect system preference when required, and produce a FOUC-prevention strategy before claiming the theme switch is complete.",
              },
              "design-brand": {
                  "case_id": "brand-identifier-resolves-locks-before-expression",
                  "trigger": "Apply a named brand identity to a new design direction without overriding locked equity.",
                  "anti": "genre may override locked brand tokens",
                  "note": "Resolve the brand_identifier first. Locked brand tokens, typeface, and palette remain authoritative; genre may fill only declared flex areas and must record forbidden overrides.",
              },
              "design-color": {
                  "case_id": "palette-outputs-use-semantic-component-roles",
                  "trigger": "Build a genre-derived palette and hand it to implementation through semantic roles.",
                  "anti": "hardcoded hex values inside components",
                  "note": "Return palette primitives, semantic role mapping, one bounded accent definition, and temperature rationale. Components consume semantic roles; hardcoded hex values inside components are rejected.",
              },
              "design-depth": {
                  "case_id": "depth-spec-preserves-legibility-and-operation",
                  "trigger": "Define a justified layered depth treatment for a product surface with imagery and controls.",
                  "anti": "effects may reduce text or control clarity",
                  "note": "Name the depth roles, declare the layer stack only when needed, and separate atmosphere, elevation/surface, and imagery integration. Body text and controls must remain legible and operable in every depth mode.",
              },
              "design-foundation": {
                  "case_id": "foundation-f5-rejects-dead-space-shortcuts",
                  "trigger": "Review a sparse hero that uses viewport-height spacing before its focal content.",
                  "anti": "min-height:100vh is accepted as intentional whitespace",
                  "note": "F5 explicitly rejects dead space and min-height:100vh as a composition shortcut. Empty space must communicate grouping, pacing, emphasis, or balance rather than delaying the focal point.",
                  "design_gate_ids": ["F5"],
              },
              "design-genre": {
                  "case_id": "genre-selection-records-candidates-and-tradeoffs",
                  "trigger": "Choose a visual expression family for a product whose direction is still open.",
                  "anti": "select a genre without recording rejected alternatives",
                  "note": "Return candidate genres, the selected expression family, signal justification, observable constraints, and selected references. Rejected candidates and trade-offs are part of the decision evidence.",
              },
              "design-iconography": {
                  "case_id": "iconography-starts-from-genre-and-returns-spec",
                  "trigger": "Define an icon system that matches an already selected visual genre.",
                  "anti": "mix unrelated icon families",
                  "note": "Start from genre_selection and return the selected family with sizing, stroke-weight, and accessibility patterns. Icon treatment must remain one coherent product system.",
              },
              "design-patterns": {
                  "case_id": "pattern-choice-compares-alternatives-and-forces",
                  "trigger": "Recommend a software design pattern for a concrete problem and provide an implementation sketch.",
                  "anti": "apply a pattern speculatively without forces",
                  "note": "Begin from problem_description. Compare real alternatives, reject speculative pattern use, preserve the open-closed principle, and return recommendation, justification, sketch, trade-offs, and anti-pattern warnings.",
              },
              "design-refinement": {
                  "case_id": "refinement-outputs-remain-explicit-and-bounded",
                  "trigger": "Refine a verified design finding while preserving the accepted direction and passing regions.",
                  "anti": "return only a vague improvement summary",
                  "note": "Expose the route decision, component-fitness or defect diagnosis, targeted patch plan, refined artifact, and gate-status delta explicitly. These outputs remain bounded by the refinement lock and preservation contract.",
              },
              "design-system": {
                  "case_id": "design-system-emits-semantic-token-contract",
                  "trigger": "Create a design-system token contract from a palette and type-scale intent.",
                  "anti": "arbitrary spacing values outside the base unit",
                  "note": "Return the token map, semantic assignments, violations, and gate scores. Spacing tokens must be multiples of the declared base unit rather than arbitrary values.",
              },
              "design-typography": {
                  "case_id": "typography-contract-bounds-families-and-prefers-variable",
                  "trigger": "Select and specify typography for a known visual genre.",
                  "anti": "use more than two typefaces plus mono without exception",
                  "note": "Start from genre_selection and return the pair, hierarchy, rhythm, and rendering specification. Use at most two typefaces plus mono, and prefer variable fonts when they satisfy the required language, weight, and rendering needs.",
              },
              "design-visual": {
                  "case_id": "visual-direction-is-distinctive-and-system-coherent",
                  "trigger": "Resolve a broad visual direction from product intent, content, foundation, and target surface.",
                  "anti": "distinctiveness through random per-section inconsistency",
                  "note": "Return compared direction candidates, the adapter loading plan, composition strategy, hierarchy role map, and typography role strategy. Distinctiveness must come from a coherent visual grammar, not inconsistent section styling.",
              },
              "master-design": {
                  "case_id": "requested-solution-is-treated-as-proposal",
                  "trigger": "Design a product flow where the requester already prescribed a dashboard and cards.",
                  "anti": "follow the requested solution blindly",
                  "note": "Separate the product requirement from the proposed solution. Evaluate the request against tasks, content, context, and alternatives before selecting or rejecting it.",
              },
              "readability": {
                  "case_id": "readability-rejects-unframed-void-before-focus",
                  "trigger": "Audit a text-heavy page whose focal heading begins far below an empty first viewport.",
                  "anti": "unframed void before the focal point is premium whitespace",
                  "note": "Use the text inventory and rendered layout. Report legibility, line length, dead space, and gate scores. An unframed void before the focal point is a readability failure, not a premium treatment.",
              },
              "responsiveness": {
                  "case_id": "responsive-audit-blocks-mobile-overflow",
                  "trigger": "Audit a layout artifact across mobile, tablet, and desktop contexts.",
                  "anti": "horizontal overflow on mobile is acceptable",
                  "note": "Inspect the supplied layout_artifact and return breakpoint, touch-target, type-scaling, and gate evidence. Horizontal overflow on mobile is a blocking failure unless it belongs to an explicitly designed, affordance-backed scroll region.",
              },
              "ux-psychology": {
                  "case_id": "ux-findings-name-principles-and-actionable-friction",
                  "trigger": "Analyze a core product flow for cognitive and behavioral friction.",
                  "anti": "the interface is confusing and overwhelming",
                  "note": "Analyze the supplied UI or flow and return cognitive load, habit loop, heuristic violations, friction map, and prioritized improvements. Vague labels such as confusing or overwhelming are rejected unless tied to a specific principle and observable evidence.",
              },
              "ux-ui-patterns": {
                  "case_id": "pattern-decision-exposes-path-and-gate-scores",
                  "trigger": "Select a UI pattern from a brief and realistic content inventory.",
                  "anti": "select a pattern without a decision-tree path",
                  "note": "Use brief_signals and content_inventory before choosing a pattern. Return the pattern selection, decision-tree path, and gate scores so the decision can be reviewed instead of treated as arbitrary taste.",
              },
          }

          strict_adapters = [
              "api-contract",
              "content-strategy",
              "data-modeling",
              "design-spacing",
              "ethics-responsible-ai",
              "information-architecture",
              "macrostructures",
              "motion-design",
              "role-switcher",
              "ui-components",
              "web-performance",
              *configs.keys(),
          ]

          def normalize_contract_path(value: str) -> str:
              return value[len("ai-native-core/"):] if value.startswith("ai-native-core/") else value

          def bump_patch(version: str) -> str:
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", version)
              if not match:
                  raise SystemExit(f"Unsupported semantic version: {version}")
              major, minor, patch = map(int, match.groups())
              return f"{major}.{minor}.{patch + 1}"

          def render_interface(contract: dict, note: str, path: str, pin: str) -> str:
              inputs = contract.get("inputs", {}).get("required", []) or []
              outputs = contract.get("outputs", {}).get("allowed", []) or []
              gates = contract.get("quality_gates", []) or []
              payload = {
                  "required_inputs": inputs,
                  "allowed_outputs": outputs,
                  "quality_gates": gates,
              }
              yaml_text = yaml.safe_dump(payload, sort_keys=False, width=120).rstrip()
              return (
                  "## Reviewed core contract interface\n\n"
                  f"Source: `{path}` · compatible line: `{pin}`\n\n"
                  "```yaml\n"
                  f"{yaml_text}\n"
                  "```\n\n"
                  f"{note}\n\n"
                  "Keep this interface synchronized with the pinned core contract. Exact declarations make ownership reviewable; they do not replace rendered, runtime, accessibility, or product evidence.\n"
              )

          def case_yaml(case: dict) -> str:
              lines = yaml.safe_dump([case], sort_keys=False, width=120).rstrip().splitlines()
              return "\n".join("    " + line for line in lines)

          for name, config in configs.items():
              skill_path = root / "skills" / name / "SKILL.md"
              text = skill_path.read_text(encoding="utf-8")
              if "## Reviewed core contract interface" in text:
                  raise SystemExit(f"{skill_path}: reviewed interface already exists")

              parts = text.split("---", 2)
              if len(parts) < 3:
                  raise SystemExit(f"{skill_path}: malformed frontmatter")
              frontmatter = yaml.safe_load(parts[1])
              metadata = frontmatter.get("metadata", {})
              current_version = str(metadata.get("ai-native-skills.version"))
              new_version = bump_patch(current_version)
              contract_rel = str(metadata.get("ai-native-skills.implements"))
              contract_pin = str(metadata.get("ai-native-skills.contract-version"))
              core_rel = normalize_contract_path(contract_rel)
              contract_doc = yaml.safe_load((root / ".deps/ai-native-core" / core_rel).read_text(encoding="utf-8"))
              contract = next(
                  value for key, value in contract_doc.items()
                  if key.endswith("_contract") and isinstance(value, dict)
              )

              version_anchor = f"ai-native-skills.version: {current_version}"
              if version_anchor not in text:
                  raise SystemExit(f"{skill_path}: version anchor not found")
              text = text.replace(version_anchor, f"ai-native-skills.version: {new_version}", 1)

              heading = re.search(r"(?m)^# .+\n", text)
              if not heading:
                  raise SystemExit(f"{skill_path}: title heading not found")
              section = "\n" + render_interface(contract, config["note"], contract_rel, contract_pin) + "\n"
              text = text[:heading.end()] + section + text[heading.end():].lstrip("\n")
              skill_path.write_text(text, encoding="utf-8")

              findings_inputs = contract.get("inputs", {}).get("required", []) or []
              findings_outputs = contract.get("outputs", {}).get("allowed", []) or []
              findings_gates = contract.get("quality_gates", []) or []
              must_contain = [*findings_inputs, *findings_outputs, *findings_gates]
              case = {
                  "id": config["case_id"],
                  "description": "Protect the reviewed core interface and its executable interpretation.",
                  "trigger": config["trigger"],
                  "must_contain": must_contain,
                  "must_not_contain": [config["anti"]],
                  "quality_gates_tested": findings_gates or ["explicit_contract_interface"],
              }
              if config.get("design_gate_ids"):
                  case["design_gate_ids"] = config["design_gate_ids"]

              eval_path = root / "contracts" / "tests" / f"{name}.test.yaml"
              if eval_path.is_file():
                  eval_text = eval_path.read_text(encoding="utf-8")
                  if config["case_id"] in eval_text:
                      raise SystemExit(f"{eval_path}: case already exists")
                  version_pattern = re.compile(r'(?m)^(\s*version:\s*)["\']?[^"\'\n]+["\']?\s*$')
                  eval_text, count = version_pattern.subn(rf'\g<1>"{new_version}"', eval_text, count=1)
                  if count != 1:
                      raise SystemExit(f"{eval_path}: version line not found")
                  eval_text = eval_text.rstrip() + "\n\n" + case_yaml(case) + "\n"
                  eval_path.write_text(eval_text, encoding="utf-8")
              else:
                  content = (
                      "skill_test:\n"
                      f"  skill: {name}\n"
                      f"  version: \"{new_version}\"\n"
                      "  description: Verify the adapter exposes and applies its reviewed core interface.\n\n"
                      "  cases:\n"
                      f"{case_yaml(case)}\n"
                  )
                  eval_path.write_text(content, encoding="utf-8")

          registry_path = root / "contracts" / "conformance" / "strict-adapters.txt"
          registry_path.parent.mkdir(parents=True, exist_ok=True)
          registry_path.write_text(
              "# Adapters that must produce no conformance finding.\n"
              "# Add entries only after audited migration and regression coverage.\n"
              + "\n".join(sorted(set(strict_adapters)))
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Inspect migration diff
        run: |
          git diff --check
          git status --short

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests contracts/conformance
          git commit -m "fix: resolve design adapter conformance warnings [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
