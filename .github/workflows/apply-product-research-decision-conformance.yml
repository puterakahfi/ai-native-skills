name: Apply Product Research Decision Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-product-research-decision-conformance.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Checkout pinned ai-native-core
        uses: actions/checkout@v6
        with:
          repository: puterakahfi/ai-native-core
          ref: 53765c155376ad28abf71c2fbdb73e6714942299
          path: .deps/ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Apply reviewed interface migration
        shell: bash
        run: |
          mkdir -p .tmp/adapter-repo .tmp/product-research-decision-migration
          cp -R skills .tmp/adapter-repo/skills
          set +e
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo > .tmp/product-research-decision-migration/before.txt
          set -e
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap
          import yaml

          root = Path.cwd()
          names = [
              "business-value-alignment",
              "decision-making",
              "experiment-design",
              "product-manager",
              "user-research",
          ]
          interpretations = {
              "business-value-alignment": "Begin with request_or_opportunity before recommending a solution. Produce a value_alignment_brief with explicit user and business value, leading/lagging/guardrail metrics, evidence-labeled assumptions, risks, and an explicit continue, narrow, experiment-first, or stop verdict. Low or unclear value is surfaced before PRD, design, or implementation begins.",
              "decision-making": "Resolve decision_context and options_list before analysis. Classify reversibility before choosing, run a premortem for irreversible decisions, then return reversibility_verdict, premortem_risks, recommended_option, and decision_gate_scores. Preserve alternatives and uncertainty instead of presenting one option as inevitable.",
              "experiment-design": "Resolve hypothesis_or_opportunity, target_users, and riskiest_assumption before test design. Use the smallest ethical test that can falsify the hypothesis, state what will not be built yet, define measurable success and guardrails before execution, and map PASS, PARTIAL, and FAIL to PRD, narrower learning, pivot, or stop decisions.",
              "product-manager": "Start from an attributable product_intent_or_feature_request. Produce the appropriate product intent, PRD or feature spec, testable acceptance criteria, task breakdown, explicit priority list, and out-of-scope list. Every task traces to acceptance criteria; implementation detail requires engineering review rather than being smuggled into product definition.",
              "user-research": "Start from research_goal and separate existing evidence from assumptions. Produce jtbd_statements, insight_synthesis, persona_sketch, and research_gate_scores grounded in observed data. JTBD describes the job, situation, motivation, and outcome rather than disguising a proposed feature as user need; thin evidence remains explicitly provisional.",
          }
          eval_meta = {
              "business-value-alignment": (
                  "value-analysis-starts-from-request-or-opportunity",
                  "Evaluate a feature request before PRD or implementation and issue an evidence-labeled value verdict.",
                  ["user_value_must_be_explicit_before_solution_recommendation", "stop_continue_or_experiment_verdict_must_be_explicit"],
                  ["start implementation before value analysis", "treat assumptions as known facts"],
              ),
              "decision-making": (
                  "decision-analysis-classifies-reversibility-first",
                  "Compare explicit options and handle an irreversible choice with premortem evidence.",
                  ["reversibility_classified_before_deciding", "premortem_run_for_irreversible_decisions"],
                  ["choose before classifying reversibility", "omit the premortem for an irreversible decision"],
              ),
              "experiment-design": (
                  "experiment-starts-from-users-hypothesis-and-risk",
                  "Design the smallest test for a named target segment and riskiest assumption.",
                  ["riskiest_assumption_must_be_named_before_test_design", "smallest_test_must_be_smaller_than_building_the_full_solution"],
                  ["build the full solution as the first test", "design the test before naming target users"],
              ),
              "product-manager": (
                  "product-definition-starts-from-attributable-intent",
                  "Turn an explicit feature request into scoped, measurable, traceable product work.",
                  ["acceptance_criteria_must_be_testable_not_vague", "tasks_must_trace_to_acceptance_criteria"],
                  ["invent the product request", "create floating tasks without acceptance criteria"],
              ),
              "user-research": (
                  "research-output-remains-evidence-grounded",
                  "Synthesize research toward JTBD, insights, a provisional persona, and gate scores from a stated goal.",
                  ["insights_grounded_in_evidence_not_assumption", "jtbd_framed_as_job_not_feature"],
                  ["present assumptions as interview evidence", "write the requested feature as a JTBD statement"],
              ),
          }

          report = (root / ".tmp/product-research-decision-migration/before.txt").read_text(encoding="utf-8")
          parsed = {}
          current = None
          current_finding = None
          for line in report.splitlines():
              match = re.match(r"^[⚠✗✓]\s+skills/([^/]+)/SKILL\.md", line)
              if match:
                  current = match.group(1)
                  current_finding = None
                  continue
              match = re.match(r"^\s{2}([a-z_]+) \[(WARN|ERROR|NOT_CHECKABLE)\]: (.*)$", line)
              if match and current:
                  category, severity, message = match.groups()
                  current_finding = {"category": category, "severity": severity, "message": message, "items": []}
                  parsed.setdefault(current, []).append(current_finding)
                  continue
              match = re.match(r"^\s{4}-\s+(.+)$", line)
              if match and current_finding:
                  current_finding["items"].append(match.group(1))

          def bump_patch(version):
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", str(version))
              if not match:
                  raise SystemExit(f"unsupported skill version: {version}")
              major, minor, patch = map(int, match.groups())
              return f"{major}.{minor}.{patch + 1}"

          def yaml_list(values):
              if not values:
                  return "  []"
              return "\n".join(f"- {value}" for value in values)

          for name in names:
              skill_path = root / "skills" / name / "SKILL.md"
              text = skill_path.read_text(encoding="utf-8")
              if "## Reviewed core contract interface" in text:
                  raise SystemExit(f"{skill_path} already has reviewed interface")
              parts = text.split("---", 2)
              frontmatter = yaml.safe_load(parts[1])
              metadata = frontmatter.get("metadata", {})
              new_version = bump_patch(metadata.get("ai-native-skills.version"))
              contract_rel = metadata.get("ai-native-skills.implements")
              pin = str(metadata.get("ai-native-skills.contract-version"))
              normalized = contract_rel.removeprefix("ai-native-core/")
              contract_doc = yaml.safe_load((root / ".deps/ai-native-core" / normalized).read_text(encoding="utf-8"))
              contract = contract_doc.get("skill_contract") or contract_doc.get("workflow_contract") or contract_doc.get("runtime_contract")
              required = contract.get("inputs", {}).get("required", [])
              allowed = contract.get("outputs", {}).get("allowed", [])
              gates = contract.get("quality_gates", []) or []

              text = re.sub(r"(ai-native-skills\.version:\s*)[^\n]+", lambda m: m.group(1) + new_version, text, count=1)
              interface = f'''## Reviewed core contract interface

          Source: `{contract_rel}` · compatible line: `{pin}`

          ```yaml
          required_inputs:
          {yaml_list(required)}
          allowed_outputs:
          {yaml_list(allowed)}
          quality_gates:
          {yaml_list(gates)}
          ```

          {interpretations[name]}

          Keep this interface synchronized with the pinned core contract. Exact declarations make ownership reviewable; they do not replace user evidence, product approval, experiment results, decision provenance, engineering review, or business outcome proof.
          '''
              heading = re.search(r"^# .+$", text, flags=re.MULTILINE)
              if not heading:
                  raise SystemExit(f"missing H1: {skill_path}")
              text = text[:heading.end()] + "\n\n" + textwrap.dedent(interface).strip() + "\n" + text[heading.end():]
              skill_path.write_text(text, encoding="utf-8")

              missing = []
              for finding in parsed.get(name, []):
                  missing.extend(finding["items"])
              case_id, description, selected_gates, prohibited = eval_meta[name]
              must_contain = []
              for value in [*missing, *selected_gates]:
                  if value not in must_contain:
                      must_contain.append(value)
              eval_doc = {
                  "skill_test": {
                      "skill": name,
                      "version": new_version,
                      "description": f"Verify {name} exposes and applies its reviewed product, research, experiment, or decision contract interface.",
                      "cases": [{
                          "id": case_id,
                          "description": description,
                          "trigger": f"Apply {name} to a realistic product, research, experiment, business-value, or decision task and report the contract-backed result.",
                          "must_contain": must_contain,
                          "must_not_contain": prohibited,
                          "quality_gates_tested": selected_gates,
                      }],
                  }
              }
              eval_path = root / "contracts/tests" / f"{name}.test.yaml"
              if eval_path.exists():
                  raise SystemExit(f"unexpected existing eval contract: {eval_path}")
              eval_path.write_text(yaml.safe_dump(eval_doc, sort_keys=False, width=120), encoding="utf-8")

          registry = root / "contracts/conformance/strict-adapters.txt"
          lines = registry.read_text(encoding="utf-8").splitlines()
          comments = [line for line in lines if line.startswith("#")]
          entries = [line.strip() for line in lines if line.strip() and not line.startswith("#")]
          registry.write_text("\n".join([*comments, *sorted(set(entries) | set(names))]) + "\n", encoding="utf-8")
          PY

      - name: Validate migration
        shell: bash
        run: |
          python scripts/validate-eval-contracts.py --write-smoke-outputs .tmp/eval-smoke-outputs
          rm -rf .tmp/adapter-repo
          mkdir -p .tmp/adapter-repo
          cp -R skills .tmp/adapter-repo/skills
          (
            cd .tmp/adapter-repo
            bash "$GITHUB_WORKSPACE/.deps/ai-native-core/scripts/validate-implements.sh" \
              "$GITHUB_WORKSPACE/.deps/ai-native-core"
          )
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo | tee .tmp/product-research-decision-migration/after.txt
          grep -Eq '^Warnings:[[:space:]]+0$' .tmp/product-research-decision-migration/after.txt
          grep -Eq '^Errors:[[:space:]]+0$' .tmp/product-research-decision-migration/after.txt
          grep -Eq '^Not checkable:[[:space:]]+0$' .tmp/product-research-decision-migration/after.txt
          git diff --check

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests contracts/conformance/strict-adapters.txt
          git commit -m "fix: resolve product research decision conformance warnings [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
