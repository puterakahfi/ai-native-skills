name: Apply Context Workflow Maintenance Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-context-workflow-maintenance-conformance.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Checkout pinned ai-native-core
        uses: actions/checkout@v6
        with:
          repository: puterakahfi/ai-native-core
          ref: 53765c155376ad28abf71c2fbdb73e6714942299
          path: .deps/ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Apply reviewed interface migration
        shell: bash
        run: |
          mkdir -p .tmp/adapter-repo .tmp/context-workflow-maintenance-migration
          cp -R skills .tmp/adapter-repo/skills
          set +e
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo > .tmp/context-workflow-maintenance-migration/before.txt
          set -e
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap
          import yaml

          root = Path.cwd()
          names = [
              "context-engineering",
              "context-manager",
              "hermes-profile-bootstrap",
              "onboarding",
              "plan",
              "prompt-optimizer",
              "redesign-workflow",
              "rule-manager",
              "skill-eval",
              "skill-evolution",
              "workflow-router",
          ]
          interpretations = {
              "context-engineering": "Start from product_or_repo_ref. Produce agents_md, cursorrules when applicable, a context_pack_template, guardrail_rules, and a context_gap_report. Context is a reviewed, versioned engineering artifact: it encodes enforceable architecture constraints and prohibitions, references the engineering contract, and avoids duplicate rules across context files.",
              "context-manager": "Resolve task_or_workflow_ref together with product_ref before handoff. Return a context_pack, missing_context_report, stale_context_flag, and context_validation_verdict. Every included rule, skill, contract, and product fact must retain a traceable source; missing or stale context is reported rather than assumed.",
              "hermes-profile-bootstrap": "Resolve runtime_target, profile_name, preset, skill_catalog_source, and safety_constraints before generation. Produce profile_skeleton_spec, skill_preset_manifest, profile_distribution_manifest, runtime_adapter_requirements, install_plan, verification_plan, safety_exclusion_policy, and generation_handoff. A generated profile remains a runtime adapter skeleton, not a product repository or a container for secrets.",
              "onboarding": "Begin with repository_or_codebase and inspect it before assumptions. Return agents_md_draft, codebase_map, key_entry_points, architecture_summary, gotchas_and_pitfalls, and first_task_recommendations based on code, commands, issues, and repository evidence rather than framework guesses.",
              "plan": "Begin with goal_or_task and produce a plan_document, task_list, file_path_references, and approach_summary before execution starts. Steps remain bite-sized, independently verifiable, and saved to a plan file; planning does not silently perform the implementation.",
              "prompt-optimizer": "Treat raw_intent as the source input. Return an optimized_prompt plus explicit scope_declaration, constraint_list, stop_condition, and token_estimate. The optimized prompt removes guessing by naming in-scope and out-of-scope work, output format, constraints, and completion boundary.",
              "redesign-workflow": "A parent repository pointer may move only after the child repository has a stable reviewed commit. Do not make the parent chase an uncommitted worktree, transient child head, failed validation state, or head that may still be rewritten; preserve expected-head leases and re-inspect drift before retry.",
              "rule-manager": "Resolve rule_target before authoring or validation. Return the appropriate rule_document, agents_md or cursorrules representation, rule_violation_report, rule_gap_analysis, and rule_update_recommendation while keeping rules specific, traceable, non-conflicting, and distinct from canonical engineering contracts.",
              "skill-eval": "Evaluate skill_name against test_case and produce eval_verdict, gate_compliance_report, applied_vs_ignored_classification, and regression_test_result. Generic or templated responses must be detected explicitly; output presence alone is not evidence that the skill behavior was applied.",
              "skill-evolution": "From source_case, observed_failure, verified_fix, before_after_evidence, and candidate_skill_or_workflow, produce the complete learning and promotion record. A candidate transferable rule must be tested against multiple contexts and counterexamples before promotion; one successful anecdote is not reusable evidence.",
              "workflow-router": "Start from user_request and return workflow_selection, skill_load_order, routing_rationale, ambiguity_resolution, and post_fix_learning_route. Ambiguity is clarified rather than guessed, and any post-fix learning route remains subject to repository write ownership, expected-head, review, and approval policy.",
          }
          eval_meta = {
              "context-engineering": (
                  "context-artifacts-are-versioned-and-reviewed",
                  "Author persistent repository context from an explicit product or repository reference.",
                  ["context_must_be_versioned_and_reviewed"],
                  ["treat context files as unreviewed scratch notes", "write vague best-practice rules"],
              ),
              "context-manager": (
                  "context-pack-preserves-source-traceability",
                  "Resolve task and product context into a traceable handoff pack.",
                  ["context_source_must_be_traceable", "missing_context_must_be_flagged_not_assumed"],
                  ["invent missing product facts", "remove source references"],
              ),
              "hermes-profile-bootstrap": (
                  "profile-bootstrap-emits-complete-safe-handoff",
                  "Bootstrap a Hermes runtime profile from an explicit target, catalog source, preset, and safety constraints.",
                  [],
                  ["embed secrets", "treat the profile as a product repository"],
              ),
              "onboarding": (
                  "onboarding-maps-codebase-before-guidance",
                  "Onboard into an existing repository and produce evidence-backed context artifacts.",
                  ["codebase_must_be_read_before_any_assumption", "agents_md_must_be_produced_as_output"],
                  ["assume a framework without evidence", "skip repository inspection"],
              ),
              "plan": (
                  "plan-produces-verifiable-file-aware-tasks",
                  "Plan an implementation goal before execution with exact paths and atomic verification steps.",
                  ["plan_must_be_written_before_execution_starts", "plan_must_reference_exact_file_paths"],
                  ["start implementation while planning", "use vague phases only"],
              ),
              "prompt-optimizer": (
                  "optimized-prompt-exposes-scope-constraints-and-stop",
                  "Transform raw intent into a bounded prompt with measurable completion.",
                  ["optimized_prompt_must_have_explicit_scope_in_and_out", "constraint_list_must_be_present", "optimized_prompt_must_have_stop_condition"],
                  ["make it better", "leave scope implicit"],
              ),
              "redesign-workflow": (
                  "parent-pointer-waits-for-stable-child-head",
                  "Coordinate a parent repository pointer update while child redesign work is still changing.",
                  ["parent_pointer_does_not_chase_unstable_child_head"],
                  ["update the parent pointer to an uncommitted child worktree", "chase a transient child head"],
              ),
              "rule-manager": (
                  "rule-authoring-starts-from-explicit-target",
                  "Author and validate rules for a named target without duplicating canonical contracts.",
                  ["rules_must_be_traceable_to_product_or_engineering_contract", "no_conflicting_rules_in_same_scope"],
                  ["author rules without a target", "duplicate the engineering contract"],
              ),
              "skill-eval": (
                  "skill-eval-detects-generic-responses",
                  "Evaluate whether a skill was actually applied instead of merely producing output.",
                  ["generic_response_detection_is_mandatory", "eval_must_test_behavior_not_just_presence_of_output"],
                  ["pass a generic response", "treat output presence as application proof"],
              ),
              "skill-evolution": (
                  "transferable-rule-needs-multiple-contexts-and-counterexamples",
                  "Evaluate whether a verified fix should become reusable shared behavior.",
                  ["transferable_rule_is_validated_against_multiple_contexts_and_counterexamples"],
                  ["promote one anecdote as universal", "skip counterexample testing"],
              ),
              "workflow-router": (
                  "router-clarifies-ambiguity-and-preserves-approval-policy",
                  "Route an ambiguous request that may trigger post-fix learning and repository writes.",
                  ["ambiguous_requests_must_be_clarified_not_assumed", "post_fix_learning_route_must_not_bypass_repository_write_or_approval_policy"],
                  ["guess the ambiguous lifecycle", "bypass repository approval"],
              ),
          }

          report = (root / ".tmp/context-workflow-maintenance-migration/before.txt").read_text(encoding="utf-8")
          parsed = {}
          current = None
          current_finding = None
          for line in report.splitlines():
              match = re.match(r"^[⚠✗✓]\s+skills/([^/]+)/SKILL\.md", line)
              if match:
                  current = match.group(1)
                  current_finding = None
                  continue
              match = re.match(r"^\s{2}([a-z_]+) \[(WARN|ERROR|NOT_CHECKABLE)\]: (.*)$", line)
              if match and current:
                  category, severity, message = match.groups()
                  current_finding = {"category": category, "severity": severity, "message": message, "items": []}
                  parsed.setdefault(current, []).append(current_finding)
                  continue
              match = re.match(r"^\s{4}-\s+(.+)$", line)
              if match and current_finding:
                  current_finding["items"].append(match.group(1))

          def bump_patch(version):
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", str(version))
              if not match:
                  raise SystemExit(f"unsupported skill version: {version}")
              major, minor, patch = map(int, match.groups())
              return f"{major}.{minor}.{patch + 1}"

          def yaml_list(values):
              if not values:
                  return "  []"
              return "\n".join(f"- {value}" for value in values)

          for name in names:
              skill_path = root / "skills" / name / "SKILL.md"
              text = skill_path.read_text(encoding="utf-8")
              if "## Reviewed core contract interface" in text:
                  raise SystemExit(f"{skill_path} already has reviewed interface")
              parts = text.split("---", 2)
              frontmatter = yaml.safe_load(parts[1])
              metadata = frontmatter.get("metadata", {})
              new_version = bump_patch(metadata.get("ai-native-skills.version"))
              contract_rel = metadata.get("ai-native-skills.implements")
              pin = str(metadata.get("ai-native-skills.contract-version"))
              normalized = contract_rel.removeprefix("ai-native-core/")
              contract_doc = yaml.safe_load((root / ".deps/ai-native-core" / normalized).read_text(encoding="utf-8"))
              contract = contract_doc.get("skill_contract") or contract_doc.get("workflow_contract") or contract_doc.get("runtime_contract")
              required = contract.get("inputs", {}).get("required", [])
              allowed = contract.get("outputs", {}).get("allowed", [])
              gates = contract.get("quality_gates", []) or []

              text = re.sub(r"(ai-native-skills\.version:\s*)[^\n]+", lambda m: m.group(1) + new_version, text, count=1)
              interface = f'''## Reviewed core contract interface

          Source: `{contract_rel}` · compatible line: `{pin}`

          ```yaml
          required_inputs:
          {yaml_list(required)}
          allowed_outputs:
          {yaml_list(allowed)}
          quality_gates:
          {yaml_list(gates)}
          ```

          {interpretations[name]}

          Keep this interface synchronized with the pinned core contract. Exact declarations make ownership reviewable; they do not replace repository, runtime, workflow, review, approval, or product evidence.
          '''
              heading = re.search(r"^# .+$", text, flags=re.MULTILINE)
              if not heading:
                  raise SystemExit(f"missing H1: {skill_path}")
              text = text[:heading.end()] + "\n\n" + textwrap.dedent(interface).strip() + "\n" + text[heading.end():]
              skill_path.write_text(text, encoding="utf-8")

              missing = []
              for finding in parsed.get(name, []):
                  missing.extend(finding["items"])
              case_id, description, selected_gates, prohibited = eval_meta[name]
              must_contain = []
              for value in [*missing, *selected_gates]:
                  if value not in must_contain:
                      must_contain.append(value)
              case = {
                  "id": case_id,
                  "description": description,
                  "trigger": f"Apply {name} to a realistic context, routing, profile, planning, evaluation, or maintenance task and report the contract-backed result.",
                  "must_contain": must_contain,
                  "must_not_contain": prohibited,
                  "quality_gates_tested": selected_gates,
              }

              eval_path = root / "contracts/tests" / f"{name}.test.yaml"
              if eval_path.exists():
                  eval_doc = yaml.safe_load(eval_path.read_text(encoding="utf-8"))
                  skill_test = eval_doc["skill_test"]
                  skill_test["version"] = new_version
                  cases = skill_test.setdefault("cases", [])
                  if any(existing.get("id") == case_id for existing in cases):
                      raise SystemExit(f"duplicate eval case: {name}/{case_id}")
                  cases.append(case)
              else:
                  eval_doc = {
                      "skill_test": {
                          "skill": name,
                          "version": new_version,
                          "description": f"Verify {name} exposes and applies its reviewed context, workflow, profile, or maintenance contract interface.",
                          "cases": [case],
                      }
                  }
              eval_path.write_text(yaml.safe_dump(eval_doc, sort_keys=False, width=120), encoding="utf-8")

          registry = root / "contracts/conformance/strict-adapters.txt"
          lines = registry.read_text(encoding="utf-8").splitlines()
          comments = [line for line in lines if line.startswith("#")]
          entries = [line.strip() for line in lines if line.strip() and not line.startswith("#")]
          registry.write_text("\n".join([*comments, *sorted(set(entries) | set(names))]) + "\n", encoding="utf-8")
          PY

      - name: Validate migration
        shell: bash
        run: |
          python scripts/validate-eval-contracts.py --write-smoke-outputs .tmp/eval-smoke-outputs
          rm -rf .tmp/adapter-repo
          mkdir -p .tmp/adapter-repo
          cp -R skills .tmp/adapter-repo/skills
          (
            cd .tmp/adapter-repo
            bash "$GITHUB_WORKSPACE/.deps/ai-native-core/scripts/validate-implements.sh" \
              "$GITHUB_WORKSPACE/.deps/ai-native-core"
          )
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo | tee .tmp/context-workflow-maintenance-migration/after.txt
          grep -Eq '^Errors:[[:space:]]+0$' .tmp/context-workflow-maintenance-migration/after.txt
          grep -Eq '^Not checkable:[[:space:]]+0$' .tmp/context-workflow-maintenance-migration/after.txt
          python - <<'PY'
          from pathlib import Path
          import re
          names = {"context-engineering","context-manager","hermes-profile-bootstrap","onboarding","plan","prompt-optimizer","redesign-workflow","rule-manager","skill-eval","skill-evolution","workflow-router"}
          report = Path(".tmp/context-workflow-maintenance-migration/after.txt").read_text(encoding="utf-8")
          offenders = set()
          for line in report.splitlines():
              match = re.match(r"^[⚠✗]\s+skills/([^/]+)/SKILL\.md", line)
              if match and match.group(1) in names:
                  offenders.add(match.group(1))
          if offenders:
              raise SystemExit("migrated adapters still have findings: " + ", ".join(sorted(offenders)))
          PY
          git diff --check

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests contracts/conformance/strict-adapters.txt
          git commit -m "fix: resolve context workflow maintenance conformance warnings [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
