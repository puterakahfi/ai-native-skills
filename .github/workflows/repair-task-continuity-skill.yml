name: Repair task continuity skill artifacts

on:
  push:
    branches:
      - 78-add-task-continuity-skill
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: 78-add-task-continuity-skill

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Regenerate capability inventory
        run: python3 scripts/verify-capability-inventory.py --write-snapshot

      - name: Validate eval contracts and capture exact diagnostic
        id: eval
        shell: bash
        run: |
          set +e
          python3 scripts/validate-eval-contracts.py --write-smoke-outputs /tmp/task-continuity-smoke > /tmp/task-continuity-eval.log 2>&1
          status=$?
          set -e
          cat /tmp/task-continuity-eval.log
          if [[ "$status" -ne 0 ]]; then
            cp /tmp/task-continuity-eval.log docs/task-continuity-eval-diagnostic.txt
            echo "failed=true" >> "$GITHUB_OUTPUT"
          else
            rm -f docs/task-continuity-eval-diagnostic.txt
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated inventory, diagnostic, and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/repair-task-continuity-skill.yml
          git add docs/capability-inventory.json
          if [[ -f docs/task-continuity-eval-diagnostic.txt ]]; then
            git add docs/task-continuity-eval-diagnostic.txt
          else
            git rm --ignore-unmatch docs/task-continuity-eval-diagnostic.txt
          fi
          git commit -m "chore(context): refresh task continuity inventory and eval evidence (#78)"
          git push origin HEAD:78-add-task-continuity-skill
