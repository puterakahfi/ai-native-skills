name: Fix redesign preservation gate declaration

on:
  push:
    branches:
      - 59-component-family-design
    paths:
      - .github/workflows/fix-component-family-conformance.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 59-component-family-design
          fetch-depth: 0

      - name: Add exact preservation quality gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('skills/redesign-workflow/SKILL.md')
          text = path.read_text()
          anchor = '- current_state_baseline_scope_and_locks_are_captured_before_production\n'
          gate = '- preservation_locks_are_recorded_and_rechecked\n'
          if anchor not in text:
              raise SystemExit('redesign quality gate anchor missing')
          if gate not in text:
              text = text.replace(anchor, anchor + gate, 1)
              path.write_text(text)
          PY

      - name: Commit quality gate declaration
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add skills/redesign-workflow/SKILL.md
          git commit -m 'fix(redesign): declare preservation lock gate'
          git push origin HEAD:59-component-family-design
