name: Temporary contract coverage discovery

on:
  push:
    branches:
      - 26-contract-coverage-and-compatibility-registry
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install inventory dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Compile inventory
        run: python -m py_compile scripts/inventory-contract-coverage.py

      - name: Generate deterministic repository inventory
        run: >-
          python scripts/inventory-contract-coverage.py
          --root .
          --core-root ai-native-core
          --output docs/contract-coverage-discovery.yaml

      - name: Generate core conformance migration reports
        id: core_conformance
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python ai-native-core/scripts/validate-conformance.py \
            ai-native-core \
            . \
            --mode migration \
            --output-dir /tmp/conformance-reports \
            --format json \
            > /tmp/conformance-inventory.log 2>&1
          status=$?
          tail -n 240 /tmp/conformance-inventory.log
          exit "$status"

      - name: Record conformance outcome
        if: always()
        shell: bash
        run: |
          cat > /tmp/conformance-outcome.yaml <<EOF
          core_conformance_outcome: ${{ steps.core_conformance.outcome }}
          EOF

      - name: Upload discovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage-discovery-${{ github.run_id }}
          path: |
            docs/contract-coverage-discovery.yaml
            /tmp/conformance-outcome.yaml
            /tmp/conformance-inventory.log
            /tmp/conformance-reports
          if-no-files-found: warn

      - name: Commit discovery report and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/contract-coverage-discovery.yaml
          git rm .github/workflows/tmp-contract-coverage-discovery.yml
          git commit -m 'docs(governance): record contract coverage discovery'
          git push
