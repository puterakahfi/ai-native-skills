name: Temporary eval contract diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture repository validation surface
        shell: bash
        run: |
          set -euo pipefail
          find .github/workflows scripts tests contracts -maxdepth 4 -type f 2>/dev/null | sort > /tmp/repository-validation-files.txt
          grep -RIl "Validate repository eval contracts" .github/workflows > /tmp/matching-workflows.txt || true
          : > /tmp/matching-workflow-content.txt
          while IFS= read -r file; do
            [ -n "$file" ] || continue
            {
              echo "===== $file ====="
              cat "$file"
              echo
            } >> /tmp/matching-workflow-content.txt
          done < /tmp/matching-workflows.txt
          grep -RInE "run-eval|validate.*contract|eval.*contract" scripts .github/workflows 2>/dev/null > /tmp/validation-command-index.txt || true

      - name: Upload diagnostic surface
        uses: actions/upload-artifact@v4
        with:
          name: eval-contract-diagnostics-${{ github.run_id }}
          path: |
            /tmp/repository-validation-files.txt
            /tmp/matching-workflows.txt
            /tmp/matching-workflow-content.txt
            /tmp/validation-command-index.txt
