name: Diagnose Adapter Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-conformance.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          ref: 97db5370efe0e4af8ed326819400c2b068910525
          path: .deps/ai-native-core

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: python -m pip install 'PyYAML>=6,<7'

      - name: Capture production adapter conformance
        shell: bash
        run: |
          rm -rf .tmp/adapter-repo
          mkdir -p .tmp/adapter-repo audit
          cp -R skills .tmp/adapter-repo/skills
          set +e
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo > audit/conformance-report.txt 2>&1
          status=$?
          set -e
          {
            echo "exit_status=$status"
            cat audit/conformance-report.txt
          } > audit/conformance-report.with-status.txt
          mv audit/conformance-report.with-status.txt audit/conformance-report.txt
          cat audit/conformance-report.txt

      - name: Commit report
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add audit/conformance-report.txt
          git commit -m 'chore(audit): capture adapter conformance findings [skip ci]'
          git push origin HEAD:${HEAD_BRANCH}
