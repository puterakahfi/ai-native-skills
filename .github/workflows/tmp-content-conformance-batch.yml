name: Temporary content conformance batch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Compile migration and inventory tooling
        run: |
          python -m py_compile \
            ai-native-skills/scripts/tmp-migrate-content-conformance.py \
            ai-native-skills/scripts/inventory-contract-coverage.py

      - name: Apply allowlisted reviewed migration
        run: >-
          python ai-native-skills/scripts/tmp-migrate-content-conformance.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Regenerate deterministic coverage inventory
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core
          --output docs/contract-coverage-discovery.yaml

      - name: Validate repository in migration mode
        run: >-
          python ai-native-core/scripts/validate-conformance.py
          ai-native-core
          ai-native-skills
          --mode migration
          --output-dir /tmp/conformance-reports
          --format json

      - name: Assert content declarations are conformant
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          targets = ["copywriting", "cro"]
          failures = []
          for target in targets:
              document = json.loads((Path("/tmp/conformance-reports") / f"{target}.json").read_text())
              records = document["conformance_report"]["results"]
              if len(records) != 1:
                  failures.append((target, "REPORT_CARDINALITY", len(records)))
                  continue
              report = records[0]
              print(f"{target}: {report['structural_status']}")
              if report["structural_status"] != "CONFORMANT":
                  failures.append((target, report["structural_status"], report.get("findings", [])))
          if failures:
              raise SystemExit(json.dumps(failures, indent=2))
          PY

      - name: Upload content migration evidence
        uses: actions/upload-artifact@v4
        with:
          name: content-conformance-batch-${{ github.run_id }}
          path: |
            ai-native-skills/docs/contract-coverage-discovery.yaml
            /tmp/conformance-reports/copywriting.json
            /tmp/conformance-reports/cro.json
            /tmp/conformance-reports/repository-summary.json

      - name: Commit reviewed migration and remove temporary tooling
        working-directory: ai-native-skills
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            skills/copywriting/SKILL.md \
            skills/copywriting/adapter.conformance.yaml \
            skills/cro/SKILL.md \
            skills/cro/adapter.conformance.yaml \
            docs/contract-coverage-discovery.yaml
          git rm \
            scripts/tmp-migrate-content-conformance.py \
            .github/workflows/tmp-content-conformance-batch.yml
          git commit -m 'feat(governance): migrate content conformance batch'
          git push
