name: Inspect component family wiring anchors

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-component-family-wiring.yml

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Publish missing wiring anchors
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python - <<'PY' > /tmp/wiring-report.txt
          from pathlib import Path

          checks = {
              'skills/adaptive-component-design/SKILL.md': [
                  'ai-native-skills.version: 1.2.3',
                  '"accessibility","ui-components"]',
                  '10. Different component families must preserve product meaning and controlled state.',
                  '12. Screenshots alone do not prove keyboard, dynamic affordances, state equivalence, or the viewport that produced the artifact.',
                  'shared state and semantics contract\nrealistic content stress results',
              ],
              'skills/implementation-context-discovery/SKILL.md': [
                  'ai-native-skills.version: 1.1.0',
                  '"adaptive-component-design","new-feature-workflow"',
                  '3. Inspect actual source, exports, variants, stories/examples, representative usage, and ownership.',
                  '5. Reuse a fit component or existing variant before local duplication.',
                  'component source, exports, variants, stories, tests, and usage\ncanonical registry availability',
                  'component_system_map: []\n    canonical_component_inventory: []',
              ],
              'skills/design-review/SKILL.md': [
                  'ai-native-skills.version: 3.3.0',
                  '"design-system","adaptive-component-design"',
                  '16. Review does not silently become redesign or implementation.',
                  'Phase 5 — COMPONENT REVIEW',
                  'A build is not visual verification. A screenshot is not interaction or runtime verification.',
              ],
              'skills/redesign-workflow/SKILL.md': [
                  'ai-native-skills.version: 3.5.0',
                  'ai-native-skills.pack-version: "1.1.0"',
                  'design-visual design-layout design-strategy',
                  '"adaptive-component-design","macrostructures"',
                  '11. For repository patch or executable prototype output, discover implementation context before code production.',
                  'system/framework, shared components, tokens, icons, repository conventions,',
                  'strategy, foundation, structure, components, expression,',
                  'reuse/extension decisions, implementation mapping, and dependency authority',
              ],
              'packs/redesign/pack.yaml': [
                  'version: "1.1.0"',
                  'description: Complete dependency bundle for delegated redesign with repository implementation-context preservation.',
                  'reason: Select suitable component capabilities and hand them to repository implementation-context mapping.',
              ],
          }

          missing = []
          for path, anchors in checks.items():
              text = Path(path).read_text()
              for anchor in anchors:
                  if anchor not in text:
                      missing.append(f'{path}: {anchor!r}')

          print('## Component-family wiring anchor inspection')
          if missing:
              print('Missing anchors:')
              for item in missing:
                  print(f'- {item}')
          else:
              print('All anchors present.')
          PY

          body=$(cat /tmp/wiring-report.txt)
          gh api --method PATCH \
            repos/${{ github.repository }}/issues/comments/5024555171 \
            -f body="$body"
