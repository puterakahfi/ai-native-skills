name: Run Interface Conformance Migration

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-interface-conformance-pr.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Extract reviewed skill and eval patch
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/apply-interface-conformance-pr.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          block = source[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          script = '\n'.join(lines) + '\n'
          cutoff = 'workflow = ROOT / ".github" / "workflows" / "skill-eval.yml"'
          if cutoff not in script:
              raise SystemExit('canonical workflow cutoff anchor missing')
          script = script.split(cutoff, 1)[0]
          Path('/tmp/apply_interface_conformance.py').write_text(script, encoding='utf-8')
          PY

      - name: Apply reviewed skill and eval patch
        run: python /tmp/apply_interface_conformance.py

      - name: Inspect migration diff
        run: |
          git diff --check
          git status --short

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests
          git commit -m "feat: resolve adapter interface conformance errors [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
