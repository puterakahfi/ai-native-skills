name: Temporary delivery governance coverage sync

on:
  push:
    branches:
      - 107-delivery-governance-conformance

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Regenerate contract coverage inventory
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Commit synchronized inventory
        working-directory: ai-native-skills
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/contract-coverage-discovery.yaml; then
            echo 'Coverage inventory already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/contract-coverage-discovery.yaml
          git commit -m 'chore(governance): sync delivery governance coverage'
          git push
