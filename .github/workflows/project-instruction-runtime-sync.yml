name: Sync project instruction runtime limits

on:
  push:
    branches:
      - 84-enforce-runtime-instruction-limits
    paths:
      - .github/workflows/project-instruction-runtime-sync.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: 84-enforce-runtime-instruction-limits
          fetch-depth: 0

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: .deps/ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install generator dependency
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Validate size helper
        shell: bash
        run: |
          set -euo pipefail
          validator="skills/project-instruction-generator/scripts/validate-instruction-size.py"
          template="skills/project-instruction-generator/references/project-instructions-template.md"
          python -m py_compile "$validator"
          python "$validator" "$template" \
            --runtime chatgpt-projects \
            --hard-maximum 8000 \
            --target-budget 7200 \
            --provenance runtime-profile \
            --json
          python - <<'PY'
          from pathlib import Path
          Path('/tmp/over-limit.txt').write_text('x' * 8450, encoding='utf-8')
          PY
          set +e
          python "$validator" /tmp/over-limit.txt \
            --runtime chatgpt-projects \
            --hard-maximum 8000 \
            --target-budget 7200 \
            --provenance runtime-profile \
            --json
          status=$?
          set -e
          test "$status" -eq 3

      - name: Regenerate contract coverage snapshot
        run: >-
          python scripts/inventory-contract-coverage.py
          --root .
          --core-root .deps/ai-native-core
          --output docs/contract-coverage-discovery.yaml

      - name: Commit generated snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/contract-coverage-discovery.yaml
          if git diff --cached --quiet; then
            echo "Snapshot already current"
            exit 0
          fi
          git commit -m "chore(docs): regenerate contract coverage inventory"
          git push origin HEAD:84-enforce-runtime-instruction-limits
