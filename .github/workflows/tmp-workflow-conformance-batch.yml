name: Temporary workflow conformance batch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Compile migration and inventory tooling
        run: |
          python -m py_compile \
            ai-native-skills/scripts/tmp-migrate-workflow-conformance.py \
            ai-native-skills/scripts/inventory-contract-coverage.py

      - name: Apply allowlisted reviewed migration
        id: migrate_batch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python ai-native-skills/scripts/tmp-migrate-workflow-conformance.py \
            --root ai-native-skills \
            --core-root ai-native-core \
            > /tmp/workflow-migration.log 2>&1
          status=$?
          cat /tmp/workflow-migration.log
          exit "$status"

      - name: Upload migration diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-conformance-diagnostics-${{ github.run_id }}
          path: /tmp/workflow-migration.log
          if-no-files-found: warn

      - name: Enforce migration preconditions
        if: steps.migrate_batch.outcome == 'failure'
        run: exit 1

      - name: Regenerate deterministic coverage inventory
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core
          --output docs/contract-coverage-discovery.yaml

      - name: Validate repository in migration mode
        run: >-
          python ai-native-core/scripts/validate-conformance.py
          ai-native-core
          ai-native-skills
          --mode migration
          --output-dir /tmp/conformance-reports
          --format json

      - name: Inspect representative workflow declarations
        id: representative_conformance
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/workflow-conformance-findings.json
          import json
          from pathlib import Path

          targets = ["design-refinement", "redesign-workflow", "skill-evolution"]
          result = {}
          failed = False
          for target in targets:
              path = Path("/tmp/conformance-reports") / f"{target}.json"
              document = json.loads(path.read_text())
              records = document["conformance_report"]["results"]
              if len(records) != 1:
                  raise SystemExit(f"{target}: expected one report record, found {len(records)}")
              report = records[0]
              result[target] = {
                  "structural_status": report["structural_status"],
                  "findings": report.get("findings", []),
              }
              if report["structural_status"] != "CONFORMANT":
                  failed = True
          print(json.dumps(result, indent=2))
          if failed:
              raise SystemExit(1)
          PY
          status=$?
          cat /tmp/workflow-conformance-findings.json
          exit "$status"

      - name: Upload workflow migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-conformance-batch-${{ github.run_id }}
          path: |
            ai-native-skills/docs/contract-coverage-discovery.yaml
            /tmp/workflow-conformance-findings.json
            /tmp/conformance-reports/design-refinement.json
            /tmp/conformance-reports/redesign-workflow.json
            /tmp/conformance-reports/skill-evolution.json
            /tmp/conformance-reports/repository-summary.json
          if-no-files-found: warn

      - name: Enforce representative conformance
        if: steps.representative_conformance.outcome == 'failure'
        run: exit 1

      - name: Commit reviewed migration and remove temporary tooling
        working-directory: ai-native-skills
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            skills/design-refinement/SKILL.md \
            skills/design-refinement/adapter.conformance.yaml \
            skills/redesign-workflow/SKILL.md \
            skills/redesign-workflow/adapter.conformance.yaml \
            skills/skill-evolution/SKILL.md \
            skills/skill-evolution/adapter.conformance.yaml \
            docs/contract-coverage-discovery.yaml
          git rm \
            scripts/tmp-migrate-workflow-conformance.py \
            .github/workflows/tmp-workflow-conformance-batch.yml
          git commit -m 'feat(governance): migrate canonical workflow conformance batch'
          git push
