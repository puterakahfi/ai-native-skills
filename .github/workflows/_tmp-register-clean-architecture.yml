name: Temporary clean-architecture registration

on:
  push:
    branches:
      - 91-feature-clean-architecture

permissions:
  contents: write

jobs:
  register:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills repository
        uses: actions/checkout@v4
        with:
          ref: 91-feature-clean-architecture
          fetch-depth: 0

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: .deps/ai-native-core

      - name: Install validation dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Register capability metadata
        run: python3 scripts/_tmp_register_clean_architecture.py

      - name: Regenerate contract coverage snapshot
        run: |
          python3 scripts/inventory-contract-coverage.py \
            --root . \
            --core-root .deps/ai-native-core \
            --output docs/contract-coverage-discovery.yaml

      - name: Commit generated metadata
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/skills.md docs/capability-inventory.json \
            docs/contract-coverage-discovery.yaml \
            catalog/capability-discovery/classifications.json \
            catalog/capability-discovery/topics.json \
            catalog/capability-discovery/job-profiles.json
          if git diff --cached --quiet; then
            echo "No generated metadata changes"
            exit 0
          fi
          git commit -m "docs(clean-architecture): register capability metadata"
          git push origin HEAD:91-feature-clean-architecture
