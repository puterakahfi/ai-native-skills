name: Apply Architecture Engineering Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-architecture-engineering-conformance.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Checkout pinned ai-native-core
        uses: actions/checkout@v6
        with:
          repository: puterakahfi/ai-native-core
          ref: 97db5370efe0e4af8ed326819400c2b068910525
          path: .deps/ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Apply reviewed interface migration
        shell: bash
        run: |
          mkdir -p .tmp/adapter-repo .tmp/architecture-engineering-migration
          cp -R skills .tmp/adapter-repo/skills
          set +e
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo > .tmp/architecture-engineering-migration/before.txt
          set -e
          python - <<'PY'
          from pathlib import Path
          import json
          import re
          import textwrap
          import yaml

          root = Path.cwd()
          names = json.loads(r'''["adr","ai-system-design","architecture-review","diagram-architect","domain-driven-design","event-driven-design","git-workflow","language-standards","master-engineer","micro-frontend","model-selection","native-ai-engineer","ports-and-adapters","refactoring","response-contract","service-design","spike","systematic-debugging","systems-thinking","technical-debt-governance","test-driven-development"]''')
          interpretations = json.loads(r'''{"adr":"Accepted ADRs stay immutable. A replacement decision must be authored as a new ADR, include a superseded_adr_reference, and point back to the original record so the decision history remains traceable.","ai-system-design":"Production approval requires an eval_framework before deploy, measurable RAG retrieval quality, an explicit fallback_strategy, and graceful degradation instead of silent failure. High-stakes paths must define human-in-the-loop ownership.","architecture-review":"Compilation and test success are evidence, not architecture approval. Review the code_or_pr_diff against the engineering_contract_ref and emit a compliance_verdict with violations, ADR and dependency flags, smells, and recommendations.","diagram-architect":"Do not choose a renderer until diagram_subject, diagram_purpose, audience, and source_context are known. Missing or conflicting source context must be reported rather than replaced with invented nodes, edges, or ownership.","domain-driven-design":"Each aggregate has one root, value objects are immutable, domain events use past-tense domain language, and every context map names upstream and downstream relationships. Keep domain logic inside the domain boundary.","event-driven-design":"A saga is incomplete without compensating transactions. Producer and consumer may share a contract but must not share a database; delivery, idempotency, DLQ behavior, and schema evolution remain explicit.","git-workflow":"Treat intent as the operation request and report actual execution state. Do not claim branch creation, commits, PR opening, merge, or conflict resolution unless the corresponding action was completed and evidenced.","language-standards":"Evaluate the declared language for the supplied artifact, return a language_compliance_verdict and violation_list, and provide a corrected_artifact only when correction is requested or required by the task.","master-engineer":"Every architecture or implementation direction must make the decision point, constraints, alternatives, and tradeoffs explicit. A pattern name without documented forces and consequences is not an engineering decision.","micro-frontend":"A proposed MFE boundary must support independent deployment, isolated CSS, an explicit design-token sharing strategy, declared shared dependencies, and a fallback when a remote fails to load.","model-selection":"Record the model_selection_decision, routing and fallback plans, cost-latency-quality tradeoff, verification plan, and escalation policy. Never select a model before classifying task intent, risk, capabilities, and context constraints.","native-ai-engineer":"Start from the architecture question, existing context, target-layer decision, and constraints. Keep universal domain contracts, runtime mappings, adapter boundaries, executable skill/workflow contracts, and learning capture in their owning layers.","ports-and-adapters":"Every external dependency crosses a named port, adapters implement ports, and dependency inversion is enforced at every boundary. Framework and infrastructure imports do not enter the domain.","refactoring":"Refactoring preserves behavior. Do not add a feature or fix a bug inside the refactoring change, keep tests green, prevent coverage regression, and report the plan, updated tests, and complexity delta.","response-contract":"Evaluate the supplied agent_response against the declared response rules. Return either a compliant_response or a violation_report, and estimate token savings only from removals that preserve task completeness.","service-design":"Derive service boundaries from the domain context, give each service its own data, justify synchronous versus asynchronous communication, and return boundaries, communication decisions, API outline, ownership map, and decomposition rationale.","spike":"A spike begins with one uncertainty and an explicit time box. Its prototype is throwaway, its output includes a feasibility verdict and implementation recommendation, and spike code must never be shipped directly.","systematic-debugging":"Require a reproducible bug description and reproduction context. Establish a tight feedback loop, state root cause and hypotheses, add the regression test before the fix, then report implementation and verification evidence.","systems-thinking":"Analyze reinforcing and balancing loops, second-order effects, Conway alignment, Goodhart risk for new metrics, emergence, leverage points, and unintended consequences before recommending intervention.","technical-debt-governance":"New debt must be classified and logged before merge. High-impact debt needs an owned paydown plan, priority, and gate status rather than an informal TODO.","test-driven-development":"Follow red-green-refactor: write and observe the failing test first, make it pass with the smallest implementation, refactor without breaking tests, and finish with no skipped tests."}''')
          eval_meta = json.loads(r'''{"adr":["superseding-adr-preserves-history","Supersede an accepted ADR while preserving immutable decision history.",["superseding_adr_must_reference_original"],["replace the old ADR in place"]],"ai-system-design":["production-ai-design-requires-evals-and-fallback","Design a production RAG feature with measurable retrieval, evaluation, and degradation behavior.",["eval_framework_must_exist_before_production_deploy","rag_retrieval_quality_must_be_measurable","ai_feature_must_degrade_gracefully_not_fail_silently"],["deploy first and add evaluation later","fail silently"]],"architecture-review":["compiled-code-is-not-architecture-approval","Review a compiling PR against its engineering contract and report violations and flags.",["treats_compiled_as_approved_is_forbidden"],["compiled means approved"]],"diagram-architect":["diagram-starts-from-subject-purpose-and-source","Specify an architecture diagram from named subject, purpose, audience, and source context.",["preserve_architecture_truth_over_visual_novelty","name_source_of_truth_for_nodes_edges_and_boundaries"],["invent missing architecture"]],"domain-driven-design":["ddd-model-preserves-core-invariants","Model bounded contexts, aggregates, value objects, events, and directed context relationships.",["every_aggregate_must_have_a_single_root","value_objects_must_be_immutable","domain_events_must_be_named_in_past_tense","context_map_must_define_upstream_downstream_relationships"],["multiple aggregate roots are fine","mutable value object"]],"event-driven-design":["saga-and-data-boundaries-are-explicit","Design an event flow with compensation, idempotency, DLQ, and separate producer-consumer data ownership.",["saga_must_define_compensating_transactions","no_direct_db_sharing_between_producer_and_consumer"],["share one database","omit compensation"]],"git-workflow":["git-result-reports-only-executed-actions","Execute a branch, commit, PR, and merge workflow from explicit intent and report conflicts honestly.",["branch_must_be_created_from_correct_base","pr_must_reference_issue_before_submit"],["claim merge without executing it"]],"language-standards":["language-review-emits-verdict-and-correction","Review a mixed-language artifact against its declared language and return violations plus a corrected form.",["artifact_language_must_be_explicitly_declared","no_mixed_language_within_same_artifact_type"],["silently accept mixed language"]],"master-engineer":["engineering-decision-documents-tradeoffs","Choose a durable architecture direction and document alternatives, consequences, and verification.",["tradeoffs_documented"],["tradeoffs are unnecessary"]],"micro-frontend":["mfe-boundary-remains-independent-and-isolated","Design an MFE boundary with independent deployment, isolated CSS, shared tokens, and load fallback.",["each_mfe_must_be_independently_deployable","css_must_be_isolated_per_mfe","design_token_sharing_strategy_must_be_defined"],["shared global CSS is fine","deploy only through the monolith"]],"model-selection":["model-choice-records-routing-fallback-and-verification","Select and route a model for a risky task with capability, privacy, cost, fallback, and verification constraints.",["task_intent_must_be_classified_before_model_choice","fallback_must_be_defined_for_unavailable_or_failing_model","verification_plan_must_match_task_risk"],["choose the model before classifying the task"]],"native-ai-engineer":["native-ai-placement-keeps-layer-ownership","Place a new capability across core, skills, runtime, and product layers from explicit constraints.",["classify_by_responsibility_not_visibility","define_contract_before_adapter_automation"],["put everything in the most visible repository"]],"ports-and-adapters":["external-dependencies-cross-named-ports","Design a feature so external services cross domain ports and adapters preserve dependency inversion.",["all_external_dependencies_must_cross_via_port","dependency_inversion_principle_enforced_at_every_boundary"],["domain imports the framework"]],"refactoring":["refactoring-does-not-hide-feature-or-bug-work","Refactor a module while preserving behavior, coverage, and independently verifiable steps.",["no_feature_added_during_refactoring","no_bug_fixed_during_refactoring","test_coverage_must_not_decrease"],["add a feature during refactoring","fix the bug as part of cleanup"]],"response-contract":["response-review-emits-compliant-output-or-violations","Evaluate an agent response for filler, precision, proportional length, and exact commands.",["lead_with_answer_not_preamble","response_length_proportional_to_task_complexity"],["approve filler without reporting it"]],"service-design":["service-boundaries-own-data-and-failure-modes","Decompose a domain into services with explicit data ownership and communication rationale.",["each_service_must_own_its_data","no_shared_database_across_services","failure_modes_must_be_considered_per_communication_pattern"],["use one shared database"]],"spike":["spike-is-timeboxed-throwaway-and-verdict-led","Run a time-boxed technical spike and return a verdict without shipping prototype code.",["time_box_must_be_respected","do_not_ship_spike_code_directly"],["ship the spike directly","ignore the time box"]],"systematic-debugging":["debugging-proves-root-cause-before-fix","Investigate a reproducible bug, establish feedback, add regression coverage, fix one cause, and verify.",["no_fixes_without_root_cause_investigation","regression_test_required_before_fix","verify_fix_with_full_test_suite"],["try random fixes"]],"systems-thinking":["system-change-analyzes-second-order-and-metric-risks","Evaluate a system intervention through loops, second-order effects, Conway alignment, and Goodhart risk.",["second_order_effects_must_be_analyzed_not_just_first","conways_law_must_be_applied_to_team_and_architecture_alignment","goodharts_law_risk_must_be_assessed_for_any_new_metric"],["only analyze first-order effects"]],"technical-debt-governance":["new-debt-is-logged-before-merge","Classify newly introduced debt, assign impact and paydown ownership, and gate merge.",["new_debt_logged_before_merging"],["merge first and log debt later"]],"test-driven-development":["tdd-refactor-keeps-tests-green-and-unskipped","Implement one behavior through observed red, green, and safe refactor with no skipped final tests.",["refactor_must_not_break_tests","no_skipped_tests_in_final_output"],["skip failing tests","refactor may break tests"]]}''')

          report = (root / ".tmp/architecture-engineering-migration/before.txt").read_text(encoding="utf-8")
          parsed = {}
          current = None
          current_finding = None
          for line in report.splitlines():
              match = re.match(r"^[⚠✗✓]\s+skills/([^/]+)/SKILL\.md", line)
              if match:
                  current = match.group(1)
                  current_finding = None
                  continue
              match = re.match(r"^\s{2}([a-z_]+) \[(WARN|ERROR|NOT_CHECKABLE)\]: (.*)$", line)
              if match and current:
                  category, severity, message = match.groups()
                  current_finding = {
                      "category": category,
                      "severity": severity,
                      "message": message,
                      "items": [],
                  }
                  parsed.setdefault(current, []).append(current_finding)
                  continue
              match = re.match(r"^\s{4}-\s+(.+)$", line)
              if match and current_finding:
                  current_finding["items"].append(match.group(1))

          def bump_patch(version):
              match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", str(version))
              if not match:
                  raise SystemExit(f"unsupported skill version: {version}")
              major, minor, patch = map(int, match.groups())
              return f"{major}.{minor}.{patch + 1}"

          def yaml_list(values):
              return "\n".join(f"- {value}" for value in values)

          for name in names:
              skill_path = root / "skills" / name / "SKILL.md"
              text = skill_path.read_text(encoding="utf-8")
              if "## Reviewed core contract interface" in text:
                  raise SystemExit(f"{skill_path} already has reviewed interface")

              parts = text.split("---", 2)
              if len(parts) != 3:
                  raise SystemExit(f"invalid frontmatter: {skill_path}")
              frontmatter = yaml.safe_load(parts[1])
              metadata = frontmatter.get("metadata", {})
              old_version = str(metadata.get("ai-native-skills.version"))
              new_version = bump_patch(old_version)
              contract_rel = metadata.get("ai-native-skills.implements")
              pin = str(metadata.get("ai-native-skills.contract-version"))
              normalized = contract_rel.removeprefix("ai-native-core/")
              contract_path = root / ".deps/ai-native-core" / normalized
              contract_doc = yaml.safe_load(contract_path.read_text(encoding="utf-8"))
              contract = contract_doc.get("skill_contract") or contract_doc.get("workflow_contract") or contract_doc.get("runtime_contract")
              required = contract.get("inputs", {}).get("required", [])
              allowed = contract.get("outputs", {}).get("allowed", [])
              gates = contract.get("quality_gates", [])

              text = re.sub(
                  r"(ai-native-skills\.version:\s*)[^\n]+",
                  lambda m: m.group(1) + new_version,
                  text,
                  count=1,
              )

              interface = f'''## Reviewed core contract interface

          Source: `{contract_rel}` · compatible line: `{pin}`

          ```yaml
          required_inputs:
          {yaml_list(required)}
          allowed_outputs:
          {yaml_list(allowed)}
          quality_gates:
          {yaml_list(gates)}
          ```

          {interpretations[name]}

          Keep this interface synchronized with the pinned core contract. Exact declarations make ownership reviewable; they do not replace runtime, repository, architecture, test, or product evidence.
          '''

              heading = re.search(r"^# .+$", text, flags=re.MULTILINE)
              if not heading:
                  raise SystemExit(f"missing H1: {skill_path}")
              insert_at = heading.end()
              text = text[:insert_at] + "\n\n" + textwrap.dedent(interface).strip() + "\n" + text[insert_at:]
              skill_path.write_text(text, encoding="utf-8")

              missing = []
              for finding in parsed.get(name, []):
                  missing.extend(finding["items"])
              case_id, description, selected_gates, prohibited = eval_meta[name]
              must_contain = []
              for value in [*missing, *selected_gates]:
                  if value not in must_contain:
                      must_contain.append(value)

              eval_doc = {
                  "skill_test": {
                      "skill": name,
                      "version": new_version,
                      "description": f"Verify {name} exposes and applies its reviewed architecture or engineering contract interface.",
                      "cases": [{
                          "id": case_id,
                          "description": description,
                          "trigger": f"Apply {name} to a realistic architecture or engineering decision and report the contract-backed result.",
                          "must_contain": must_contain,
                          "must_not_contain": prohibited,
                          "quality_gates_tested": selected_gates,
                      }],
                  }
              }
              eval_path = root / "contracts" / "tests" / f"{name}.test.yaml"
              if eval_path.exists():
                  raise SystemExit(f"unexpected existing eval contract: {eval_path}")
              eval_path.parent.mkdir(parents=True, exist_ok=True)
              eval_path.write_text(yaml.safe_dump(eval_doc, sort_keys=False, width=120), encoding="utf-8")

          registry = root / "contracts" / "conformance" / "strict-adapters.txt"
          lines = registry.read_text(encoding="utf-8").splitlines()
          comments = [line for line in lines if line.startswith("#")]
          entries = [line.strip() for line in lines if line.strip() and not line.startswith("#")]
          merged = sorted(set(entries) | set(names))
          registry.write_text("\n".join([*comments, *merged]) + "\n", encoding="utf-8")
          PY

      - name: Validate migration
        shell: bash
        run: |
          python scripts/validate-eval-contracts.py --write-smoke-outputs .tmp/eval-smoke-outputs
          rm -rf .tmp/adapter-repo
          mkdir -p .tmp/adapter-repo
          cp -R skills .tmp/adapter-repo/skills
          (
            cd .tmp/adapter-repo
            bash "$GITHUB_WORKSPACE/.deps/ai-native-core/scripts/validate-implements.sh" \
              "$GITHUB_WORKSPACE/.deps/ai-native-core"
          )
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo | tee .tmp/architecture-engineering-migration/after.txt
          grep -Eq '^Errors:[[:space:]]+0$' .tmp/architecture-engineering-migration/after.txt
          grep -Eq '^Not checkable:[[:space:]]+0$' .tmp/architecture-engineering-migration/after.txt
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          names = set(json.loads(r'''["adr","ai-system-design","architecture-review","diagram-architect","domain-driven-design","event-driven-design","git-workflow","language-standards","master-engineer","micro-frontend","model-selection","native-ai-engineer","ports-and-adapters","refactoring","response-contract","service-design","spike","systematic-debugging","systems-thinking","technical-debt-governance","test-driven-development"]'''))
          report = Path(".tmp/architecture-engineering-migration/after.txt").read_text(encoding="utf-8")
          offenders = set()
          for line in report.splitlines():
              match = re.match(r"^[⚠✗]\s+skills/([^/]+)/SKILL\.md", line)
              if match and match.group(1) in names:
                  offenders.add(match.group(1))
          if offenders:
              raise SystemExit("migrated adapters still have findings: " + ", ".join(sorted(offenders)))
          PY
          git diff --check

      - name: Commit architecture and engineering migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests contracts/conformance/strict-adapters.txt
          git commit -m "fix: resolve architecture engineering conformance warnings [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
