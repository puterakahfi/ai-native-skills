name: Validate capability inventory

on:
  pull_request:
    branches:
      - main
    paths:
      - skills/**/SKILL.md
      - README.md
      - docs/skills.md
      - docs/capability-inventory.json
      - docs/capability-discovery.md
      - catalog/capability-discovery/**
      - scripts/verify-capability-inventory.py
      - scripts/verify-capability-discovery.py
      - .github/workflows/validate-capability-inventory.yml
  push:
    branches:
      - main
    paths:
      - skills/**/SKILL.md
      - README.md
      - docs/skills.md
      - docs/capability-inventory.json
      - docs/capability-discovery.md
      - catalog/capability-discovery/**
      - scripts/verify-capability-inventory.py
      - scripts/verify-capability-discovery.py
      - .github/workflows/validate-capability-inventory.yml

permissions:
  contents: read

jobs:
  inventory-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify executable inventory and capability discovery
        run: |
          python3 scripts/verify-capability-inventory.py
          python3 scripts/verify-capability-discovery.py

      - name: Prove executable metadata regressions fail closed
        shell: bash
        run: |
          set -euo pipefail
          target="skills/accessibility/SKILL.md"
          cp "$target" /tmp/accessibility.SKILL.md

          restore_target() {
            cp /tmp/accessibility.SKILL.md "$target"
          }

          expect_failure() {
            local expected="$1"
            set +e
            output=$(python3 scripts/verify-capability-inventory.py 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output"
            test "$status" -ne 0
            grep -Fq "$expected" <<<"$output"
            restore_target
          }

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("name: accessibility", "name: adaptive-component-design", 1)
          path.write_text(source)
          PY
          expect_failure "Duplicate capability names: adaptive-component-design"

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("  ai-native-skills.type: skill\n", "", 1)
          path.write_text(source)
          PY
          expect_failure 'missing metadata["ai-native-skills.type"]'

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace(
              "  ai-native-skills.type: skill",
              "  ai-native-skills.type: adapter",
              1,
          )
          path.write_text(source)
          PY
          expect_failure "invalid ai-native-skills.type 'adapter'"

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("name: accessibility", "name: accessibility-renamed", 1)
          path.write_text(source)
          PY
          expect_failure "Capability path/name mismatch"

      - name: Prove discovery regressions fail closed
        shell: bash
        run: |
          set -euo pipefail
          classifications="catalog/capability-discovery/classifications.json"
          facets="catalog/capability-discovery/facets.json"
          topics="catalog/capability-discovery/topics.json"
          profiles="catalog/capability-discovery/job-profiles.json"
          cp "$classifications" /tmp/classifications.json
          cp "$facets" /tmp/facets.json
          cp "$topics" /tmp/topics.json
          cp "$profiles" /tmp/job-profiles.json

          restore_catalog() {
            cp /tmp/classifications.json "$classifications"
            cp /tmp/facets.json "$facets"
            cp /tmp/topics.json "$topics"
            cp /tmp/job-profiles.json "$profiles"
          }

          expect_discovery_failure() {
            local expected="$1"
            set +e
            output=$(python3 scripts/verify-capability-discovery.py 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output"
            test "$status" -ne 0
            grep -Fq "$expected" <<<"$output"
            restore_catalog
          }

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/classifications.json")
          data = json.loads(path.read_text())
          for group in data["classification_groups"]:
              if "accessibility" in group["capabilities"]:
                  group["capabilities"].remove("accessibility")
                  group.get("overrides", {}).pop("accessibility", None)
                  break
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "capability discovery coverage mismatch: missing: accessibility"

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/classifications.json")
          data = json.loads(path.read_text())
          data["classification_groups"][0]["defaults"]["ecosystems"].append(
              "unknown-ecosystem"
          )
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "unknown values: unknown-ecosystem"

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/job-profiles.json")
          data = json.loads(path.read_text())
          data["job_profiles"][0]["workflow_routes"][0]["workflow"] = "product-manager"
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "must reference a workflow; 'product-manager' is 'skill'"

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/topics.json")
          data = json.loads(path.read_text())
          data["topics"][0]["capabilities"].append("unknown-capability")
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "topics[0].capabilities unknown: unknown-capability"

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/topics.json")
          data = json.loads(path.read_text())
          data["topics"] = [
              topic
              for topic in data["topics"]
              if topic["id"] != "growth-marketing"
          ]
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "topics missing required entries: growth-marketing"

          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("catalog/capability-discovery/classifications.json")
          data = json.loads(path.read_text())
          for group in data["classification_groups"]:
              if "architecture-review" in group["capabilities"]:
                  group.setdefault("overrides", {})["architecture-review"] = {
                      "domains": [
                          "engineering",
                          "quality",
                          "security",
                          "governance",
                      ]
                  }
                  break
          path.write_text(json.dumps(data))
          PY
          expect_discovery_failure "'architecture-review' has 4 primary domains"
