name: Validate capability inventory

on:
  pull_request:
    branches:
      - main
    paths:
      - skills/**/SKILL.md
      - README.md
      - docs/skills.md
      - docs/capability-inventory.json
      - scripts/verify-capability-inventory.py
      - .github/workflows/validate-capability-inventory.yml
  push:
    branches:
      - main
    paths:
      - skills/**/SKILL.md
      - README.md
      - docs/skills.md
      - docs/capability-inventory.json
      - scripts/verify-capability-inventory.py
      - .github/workflows/validate-capability-inventory.yml

permissions:
  contents: read

jobs:
  inventory-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify executable capability metadata and public documentation
        run: python3 scripts/verify-capability-inventory.py

      - name: Prove metadata regressions fail closed
        shell: bash
        run: |
          set -euo pipefail
          target="skills/accessibility/SKILL.md"
          cp "$target" /tmp/accessibility.SKILL.md

          restore_target() {
            cp /tmp/accessibility.SKILL.md "$target"
          }

          expect_failure() {
            local expected="$1"
            set +e
            output=$(python3 scripts/verify-capability-inventory.py 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output"
            test "$status" -ne 0
            grep -Fq "$expected" <<<"$output"
            restore_target
          }

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("name: accessibility", "name: adaptive-component-design", 1)
          path.write_text(source)
          PY
          expect_failure "Duplicate capability names: adaptive-component-design"

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("  ai-native-skills.type: skill\n", "", 1)
          path.write_text(source)
          PY
          expect_failure 'missing metadata["ai-native-skills.type"]'

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace(
              "  ai-native-skills.type: skill",
              "  ai-native-skills.type: adapter",
              1,
          )
          path.write_text(source)
          PY
          expect_failure "invalid ai-native-skills.type 'adapter'"

          python3 <<'PY'
          from pathlib import Path

          path = Path("skills/accessibility/SKILL.md")
          source = path.read_text()
          source = source.replace("name: accessibility", "name: accessibility-renamed", 1)
          path.write_text(source)
          PY
          expect_failure "Capability path/name mismatch"
