name: Diagnose Design Evals

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-design-evals.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install "PyYAML>=6,<7"

      - name: Extract and apply eval narrowing script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/refine-design-conformance-evals.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          block = source[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/narrow_design_evals.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          python /tmp/narrow_design_evals.py

      - name: Capture validator output
        shell: bash
        run: |
          mkdir -p .tmp/design-eval-diagnostics
          set +e
          python scripts/validate-eval-contracts.py \
            --write-smoke-outputs .tmp/eval-smoke-outputs \
            > .tmp/design-eval-diagnostics/validator.txt 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > .tmp/design-eval-diagnostics/status.txt
          cat .tmp/design-eval-diagnostics/validator.txt

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: design-eval-diagnostics
          path: .tmp/design-eval-diagnostics
          retention-days: 3
