name: Inspect repository eval contracts

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-eval-contracts.yml
      - contracts/tests/component-family-design.test.yaml

permissions:
  contents: read
  issues: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install "PyYAML>=6,<7"

      - name: Update exact validator output comment
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          output=$(python scripts/validate-eval-contracts.py --write-smoke-outputs .tmp/eval-smoke-outputs 2>&1)
          status=$?
          body=$(printf '## Component-family eval validator output\n\n```text\n%s\n```\n\nExit status: %s' "$output" "$status")
          gh api --method PATCH \
            repos/${{ github.repository }}/issues/comments/5024544067 \
            -f body="$body"
          exit 0
