name: Inspect repository eval contracts

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-eval-contracts.yml

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Print eval inventory and representative contracts
        shell: bash
        run: |
          set -euo pipefail
          echo '=== EVAL INVENTORY ==='
          find . -type f \( -iname '*eval*.yaml' -o -iname '*eval*.yml' -o -path '*/evals/*' \) | sort
          echo '=== REPRESENTATIVE CONTRACTS ==='
          count=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "--- $file ---"
            sed -n '1,260p' "$file"
            count=$((count + 1))
            [ "$count" -ge 8 ] && break
          done < <(find . -type f \( -iname '*eval*.yaml' -o -iname '*eval*.yml' -o -path '*/evals/*' \) | sort)
