name: Inspect repository eval contracts

on:
  push:
    branches:
      - 59-component-family-design
    paths:
      - .github/workflows/inspect-eval-contracts.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 59-component-family-design
          fetch-depth: 0

      - name: Capture eval inventory and representative contracts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/component-family-design
          {
            echo '# Repository eval inventory'
            echo
            find . -type f \( -iname '*eval*.yaml' -o -iname '*eval*.yml' -o -path '*/evals/*' \) | sort
            echo
            echo '## Representative YAML files'
            count=0
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              echo
              echo "### $file"
              echo '```yaml'
              sed -n '1,220p' "$file"
              echo '```'
              count=$((count + 1))
              [ "$count" -ge 4 ] && break
            done < <(find . -type f \( -iname '*eval*.yaml' -o -iname '*eval*.yml' -o -path '*/evals/*' \) | sort)
          } > docs/component-family-design/eval-inventory.md

      - name: Commit inspection evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/component-family-design/eval-inventory.md
          git commit -m 'docs(eval): capture repository eval contract examples'
          git push origin HEAD:59-component-family-design
