name: Inspect repository eval contracts

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/inspect-eval-contracts.yml
      - contracts/tests/component-family-design.test.yaml

permissions:
  contents: read
  pull-requests: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install "PyYAML>=6,<7"

      - name: Publish exact validator output
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set +e
          output=$(python scripts/validate-eval-contracts.py --write-smoke-outputs .tmp/eval-smoke-outputs 2>&1)
          status=$?
          {
            echo '## Temporary component-family eval validator output'
            echo
            echo '```text'
            printf '%s\n' "$output"
            echo '```'
            echo
            echo "Exit status: $status"
          } > /tmp/eval-validator-report.md
          gh pr comment "$PR_NUMBER" --body-file /tmp/eval-validator-report.md
          exit 0
