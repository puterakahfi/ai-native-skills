name: Apply component family wiring

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-component-family-wiring.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 59-component-family-design
          fetch-depth: 0

      - name: Refine related design owners
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'Expected text not found in {path}: {old[:140]!r}')
              p.write_text(text.replace(old, new, 1))

          replace('skills/adaptive-component-design/SKILL.md', 'ai-native-skills.version: 1.2.3', 'ai-native-skills.version: 1.2.4')
          replace('skills/adaptive-component-design/SKILL.md', '"accessibility","ui-components"]', '"accessibility","ui-components","component-family-design"]')
          replace(
              'skills/adaptive-component-design/SKILL.md',
              '10. Different component families must preserve product meaning and controlled state.\n11. Verify realistic content, text expansion, states, input modes, and boundary widths.',
              '10. Different component patterns must preserve product meaning and controlled state.\n11. When an accepted organism or template family exists, cross-context substitutions must remain declared variants of that family unless `component-family-design` approves a new family.\n12. Verify realistic content, text expansion, states, input modes, and boundary widths.',
          )
          replace(
              'skills/adaptive-component-design/SKILL.md',
              '12. Screenshots alone do not prove keyboard, dynamic affordances, state equivalence, or the viewport that produced the artifact.\n13. Implemented output requires independent design-review evidence.',
              '13. Screenshots alone do not prove keyboard, dynamic affordances, state equivalence, family identity, or the viewport that produced the artifact.\n14. Implemented output requires independent design-review evidence.',
          )
          replace(
              'skills/adaptive-component-design/SKILL.md',
              'shared state and semantics contract\nrealistic content stress results',
              'shared state and semantics contract\naccepted component family and variant identity when applicable\nrealistic content stress results',
          )

          replace('skills/implementation-context-discovery/SKILL.md', 'ai-native-skills.version: 1.1.0', 'ai-native-skills.version: 1.2.0')
          replace('skills/implementation-context-discovery/SKILL.md', '"adaptive-component-design","new-feature-workflow"', '"adaptive-component-design","component-family-design","new-feature-workflow"')
          replace(
              'skills/implementation-context-discovery/SKILL.md',
              '3. Inspect actual source, exports, variants, stories/examples, representative usage, and ownership.\n4. Map requested component capability coverage before creating a component.',
              '3. Inspect actual source, exports, variants, stories/examples, representative usage, and ownership.\n4. Inspect shared organisms, page shells, template families, route instances, and configuration adapters when a repeated interface region is involved.\n5. Map requested component capability and component-family coverage before creating a component.',
          )
          replace(
              'skills/implementation-context-discovery/SKILL.md',
              '5. Reuse a fit component or existing variant before local duplication.\n6. Prefer bounded extension',
              '6. Reuse a fit component, component family, template, or existing variant before local duplication.\n7. Prefer bounded extension',
          )
          replace(
              'skills/implementation-context-discovery/SKILL.md',
              'component source, exports, variants, stories, tests, and usage\ncanonical registry availability',
              'component source, exports, variants, stories, tests, and usage\norganism and template source, route instances, family variants, slots, and configuration adapters\ncanonical registry availability',
          )
          replace(
              'skills/implementation-context-discovery/SKILL.md',
              'For every requested capability, review installed components, variants, bounded extension, composition, canonical registry availability, semantic-native eligibility, and interaction/accessibility/token contracts.',
              'For every requested capability, review installed components, variants, bounded extension, composition, canonical registry availability, semantic-native eligibility, and interaction/accessibility/token contracts. For organisms and templates, consume the accepted family contract from `component-family-design` and map it to actual repository source, configuration adapters, routes, and imports.',
          )
          replace(
              'skills/implementation-context-discovery/SKILL.md',
              'component_system_map: []\n    canonical_component_inventory: []',
              'component_system_map: []\n    canonical_component_inventory: []\n    canonical_component_family_inventory: []\n    organism_inventory: []\n    template_inventory: []\n    route_to_family_instance_map: []',
          )

          replace('skills/design-review/SKILL.md', 'ai-native-skills.version: 3.3.0', 'ai-native-skills.version: 3.4.0')
          replace('skills/design-review/SKILL.md', '"design-system","adaptive-component-design"', '"design-system","component-family-design","adaptive-component-design"')
          replace(
              'skills/design-review/SKILL.md',
              '16. Review does not silently become redesign or implementation.',
              '16. When equivalent shared organisms or templates appear across routes, review family consistency across the relevant route set rather than accepting one route in isolation.\n17. Route-specific differences must trace to declared slots or bounded variants when a fit family exists.\n18. Review does not silently become redesign or implementation.',
          )
          replace(
              'skills/design-review/SKILL.md',
              'Phase 5 — COMPONENT REVIEW\n   Load component-review.md only for present or required interactive components.',
              'Phase 5 — COMPONENT + FAMILY REVIEW\n   Load component-review.md for present or required interactive components.\n   Load `component-family-design` evidence when repeated organisms, templates, or equivalent route roles are in scope.',
          )
          replace(
              'skills/design-review/SKILL.md',
              'A build is not visual verification. A screenshot is not interaction or runtime verification.',
              'A build is not visual verification. One route screenshot is not cross-route component-family verification. A screenshot is not interaction or runtime verification.',
          )

          replace('skills/redesign-workflow/SKILL.md', 'ai-native-skills.version: 3.5.0', 'ai-native-skills.version: 3.6.0')
          replace('skills/redesign-workflow/SKILL.md', 'ai-native-skills.pack-version: "1.1.0"', 'ai-native-skills.pack-version: "1.2.0"')
          replace('skills/redesign-workflow/SKILL.md', 'design-visual design-layout design-strategy', 'design-visual design-layout component-family-design design-strategy')
          replace('skills/redesign-workflow/SKILL.md', '"adaptive-component-design","macrostructures"', '"component-family-design","adaptive-component-design","macrostructures"')
          replace(
              'skills/redesign-workflow/SKILL.md',
              '11. For repository patch or executable prototype output, discover implementation context before code production.',
              '11. When a redesign creates or changes a repeated organism, page shell, or equivalent cross-route role, run `component-family-design` before code production.\n12. For repository patch or executable prototype output, discover implementation context before code production.',
          )
          replace(
              'skills/redesign-workflow/SKILL.md',
              'system/framework, shared components, tokens, icons, repository conventions,',
              'system/framework, shared components, organism and template families, route instances, tokens, icons, repository conventions,',
          )
          replace(
              'skills/redesign-workflow/SKILL.md',
              'strategy, foundation, structure, components, expression,\n   interaction, content, implementation capability requirements',
              'strategy, foundation, structure, component capability, component-family and template composition, expression,\n   interaction, content, implementation capability requirements',
          )
          replace(
              'skills/redesign-workflow/SKILL.md',
              'reuse/extension decisions, implementation mapping, and dependency authority',
              'family reuse/variant decisions, route-instance mapping, component reuse/extension decisions, implementation mapping, and dependency authority',
          )

          replace('packs/redesign/pack.yaml', 'version: "1.1.0"', 'version: "1.2.0"')
          replace(
              'packs/redesign/pack.yaml',
              'description: Complete dependency bundle for delegated redesign with repository implementation-context preservation.',
              'description: Complete dependency bundle for delegated redesign with component-family consistency and repository implementation-context preservation.',
          )
          replace(
              'packs/redesign/pack.yaml',
              '''    - name: ui-components\n      classification: adapter\n      port: layout\n      reason: Select suitable component capabilities and hand them to repository implementation-context mapping.\n''',
              '''    - name: ui-components\n      classification: adapter\n      port: layout\n      reason: Select suitable component capabilities and classify their hierarchy before family and repository mapping.\n    - name: component-family-design\n      classification: adapter\n      port: layout\n      when: The redesign creates or changes a repeated organism, page shell, template, or equivalent product role across routes.\n      reason: Preserve invariant anatomy, configurable slots, bounded variants, adaptive family identity, and route-to-family mappings.\n''',
          )
          PY

      - name: Commit wiring
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add skills/adaptive-component-design/SKILL.md \
            skills/implementation-context-discovery/SKILL.md \
            skills/design-review/SKILL.md \
            skills/redesign-workflow/SKILL.md \
            packs/redesign/pack.yaml
          git commit -m 'refine(design): enforce component-family consistency'
          git push origin HEAD:59-component-family-design
