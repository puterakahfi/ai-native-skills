name: Apply component family wiring

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-component-family-wiring.yml

permissions:
  contents: write

jobs:
  wire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 59-component-family-design
          fetch-depth: 0

      - name: Apply owner wiring
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f'Missing anchor in {path}: {old!r}')
              p.write_text(text.replace(old, new, 1))

          adaptive = 'skills/adaptive-component-design/SKILL.md'
          replace(adaptive, 'ai-native-skills.version: 1.2.3', 'ai-native-skills.version: 1.2.4')
          replace(adaptive, '"accessibility","ui-components"]', '"accessibility","ui-components","component-family-design"]')
          replace(adaptive, '10. Different component families must preserve product meaning and controlled state.', '10. Different component patterns must preserve product meaning and controlled state.\n11. When an accepted organism or template family exists, substitutions must remain declared variants of that family unless `component-family-design` approves a new family.')
          replace(adaptive, '11. Verify realistic content, text expansion, states, input modes, and boundary widths.', '12. Verify realistic content, text expansion, states, input modes, and boundary widths.')
          replace(adaptive, '12. Screenshots alone do not prove keyboard, dynamic affordances, state equivalence, or the viewport that produced the artifact.', '13. Screenshots alone do not prove keyboard, dynamic affordances, state equivalence, family identity, or the viewport that produced the artifact.')
          replace(adaptive, '13. Implemented output requires independent design-review evidence.', '14. Implemented output requires independent design-review evidence.')
          replace(adaptive, 'shared state and semantics contract\nrealistic content stress results', 'shared state and semantics contract\naccepted component family and variant identity when applicable\nrealistic content stress results')

          context = 'skills/implementation-context-discovery/SKILL.md'
          replace(context, 'ai-native-skills.version: 1.1.0', 'ai-native-skills.version: 1.2.0')
          replace(context, '"adaptive-component-design","new-feature-workflow"', '"adaptive-component-design","component-family-design","new-feature-workflow"')
          family_mapping = '## Organism and template family mapping\n\nWhen the requested capability is an organism, shell, or repeated cross-route region:\n\n```text\nconsume the accepted family contract from component-family-design\n→ inventory actual organism and template source\n→ map route instances and configuration adapters\n→ verify canonical variants and shared ownership\n→ prohibit route-local duplication when the family fits\n```\n\nRepository discovery does not define the family anatomy. It maps the accepted family to real paths, imports, variants, stories, route adapters, tokens, and migration status.\n\n## Required evidence'
          replace(context, '## Required evidence', family_mapping)
          replace(context, 'component source, exports, variants, stories, tests, and usage\ncanonical registry availability', 'component source, exports, variants, stories, tests, and usage\norganism and template source, route instances, family variants, slots, and configuration adapters\ncanonical registry availability')
          replace(context, 'For every requested capability, review installed components, variants, bounded extension, composition, canonical registry availability, semantic-native eligibility, and interaction/accessibility/token contracts.', 'For every requested capability, review installed components, variants, bounded extension, composition, canonical registry availability, semantic-native eligibility, and interaction/accessibility/token contracts. For organisms and templates, consume the accepted family contract from `component-family-design` and map it to actual repository source, configuration adapters, routes, and imports.')
          replace(context, 'component_system_map: []\n    canonical_component_inventory: []', 'component_system_map: []\n    canonical_component_inventory: []\n    canonical_component_family_inventory: []\n    organism_inventory: []\n    template_inventory: []\n    route_to_family_instance_map: []')

          review = 'skills/design-review/SKILL.md'
          replace(review, 'ai-native-skills.version: 3.3.0', 'ai-native-skills.version: 3.4.0')
          replace(review, '"design-system","adaptive-component-design"', '"design-system","component-family-design","adaptive-component-design"')
          replace(review, '16. Review does not silently become redesign or implementation.', '16. When equivalent shared organisms or templates appear across routes, review family consistency across the relevant route set rather than accepting one route in isolation.\n17. Route-specific differences must trace to declared slots or bounded variants when a fit family exists.\n18. Review does not silently become redesign or implementation.')
          replace(review, 'Phase 5 — COMPONENT REVIEW\n   Load component-review.md only for present or required interactive components.', 'Phase 5 — COMPONENT + FAMILY REVIEW\n   Load component-review.md for present or required interactive components.\n   Load `component-family-design` evidence when repeated organisms, templates, or equivalent route roles are in scope.')
          replace(review, 'A build is not visual verification. A screenshot is not interaction or runtime verification.', 'A build is not visual verification. One route screenshot is not cross-route component-family verification. A screenshot is not interaction or runtime verification.')

          redesign = 'skills/redesign-workflow/SKILL.md'
          replace(redesign, 'ai-native-skills.version: 3.5.0', 'ai-native-skills.version: 3.6.0')
          replace(redesign, 'ai-native-skills.pack-version: "1.1.0"', 'ai-native-skills.pack-version: "1.2.0"')
          replace(redesign, 'design-visual design-layout design-strategy', 'design-visual design-layout component-family-design design-strategy')
          replace(redesign, '"adaptive-component-design","macrostructures"', '"component-family-design","adaptive-component-design","macrostructures"')
          replace(redesign, '11. For repository patch or executable prototype output, discover implementation context before code production.', '11. When a redesign creates or changes a repeated organism, page shell, or equivalent cross-route role, run `component-family-design` before code production.\n12. For repository patch or executable prototype output, discover implementation context before code production.')
          renumber = [
              (12, 13, 'Package presence alone does not establish canonical framework, component, styling, icon, state, form, query, or data systems.'),
              (13, 14, 'Reuse, bounded extension, composition, or semantic-native implementation precedes a new dependency proposal.'),
              (14, 15, 'Implementation mapping must name canonical paths/imports and prohibited parallel systems before production.'),
              (15, 16, 'A new dependency requires a proven capability gap, consequences, and verified authority.'),
              (16, 17, 'Every repository write uses an expected-head lease.'),
              (17, 18, 'Inspect head drift before retry; newest commit is not automatically authoritative.'),
              (18, 19, 'Two reversals of the same decision/path stop automatic writes; never ping-pong or force-push.'),
              (19, 20, 'Classify every effective changed path against verified scope.'),
              (20, 21, 'OUT_OF_SCOPE, UNKNOWN, provenance-blocked, or implementation-context-blocked changes block passing review and delivery.'),
              (21, 22, 'Verification evidence must match domain, artifact state, changed layers, and delivery boundary.'),
              (22, 23, 'Build success is not design or architecture proof; screenshot evidence is not runtime or interaction proof.'),
              (23, 24, 'Repository-context discovery cannot self-certify the implementation it guided; run architecture-review after code.'),
              (24, 25, 'Acceptance runs through design-review, governing domain reviewer, and architecture-review when code is delivered.'),
              (25, 26, 'Preserve PASS, FAIL, PARTIAL, NOT_VERIFIED, and NOT_APPLICABLE exactly.'),
              (26, 27, 'Contextual hard gates come from loaded reviewers, not a global UI checklist.'),
              (27, 28, 'Provenance, scope, implementation context, concurrency, evidence, coverage, and facade verdict all control delivery.'),
              (28, 29, 'Classify root cause and correction ownership before fixing.'),
              (29, 30, 'Maximum design iterations default to 5; after two failed patches in one region, re-read and replan.'),
              (30, 31, 'Verified reusable fixes require skill-evolution and a regression eval.'),
              (31, 32, 'Blocked or bounded attempts are never labeled PASS.'),
              (32, 33, 'Never claim a complete redesign environment from the workflow entrypoint alone.'),
          ]
          for old_number, new_number, text in renumber:
              replace(redesign, f'{old_number}. {text}', f'{new_number}. {text}')
          replace(redesign, 'system/framework, shared components, tokens, icons, repository conventions,', 'system/framework, shared components, organism and template families, route instances, tokens, icons, repository conventions,')
          replace(redesign, 'strategy, foundation, structure, components, expression,\n   interaction, content, implementation capability requirements', 'strategy, foundation, structure, component capability, component-family and template composition, expression,\n   interaction, content, implementation capability requirements')
          replace(redesign, 'reuse/extension decisions, implementation mapping, and dependency authority', 'family reuse/variant decisions, route-instance mapping, component reuse/extension decisions, implementation mapping, and dependency authority')

          pack = 'packs/redesign/pack.yaml'
          replace(pack, 'version: "1.1.0"', 'version: "1.2.0"')
          replace(pack, 'description: Complete dependency bundle for delegated redesign with repository implementation-context preservation.', 'description: Complete dependency bundle for delegated redesign with component-family consistency and repository implementation-context preservation.')
          old_ui = '\n'.join([
              '    - name: ui-components',
              '      classification: adapter',
              '      port: layout',
              '      reason: Select suitable component capabilities and hand them to repository implementation-context mapping.',
              '',
          ])
          new_ui = '\n'.join([
              '    - name: ui-components',
              '      classification: adapter',
              '      port: layout',
              '      reason: Select suitable component capabilities and classify their hierarchy before family and repository mapping.',
              '    - name: component-family-design',
              '      classification: adapter',
              '      port: layout',
              '      when: The redesign creates or changes a repeated organism, page shell, template, or equivalent product role across routes.',
              '      reason: Preserve invariant anatomy, configurable slots, bounded variants, adaptive family identity, and route-to-family mappings.',
              '',
          ])
          replace(pack, old_ui, new_ui)
          PY

      - name: Commit wiring
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add skills/adaptive-component-design/SKILL.md \
            skills/implementation-context-discovery/SKILL.md \
            skills/design-review/SKILL.md \
            skills/redesign-workflow/SKILL.md \
            packs/redesign/pack.yaml
          git commit -m 'refine(design): enforce component-family consistency'
          git push origin HEAD:59-component-family-design
