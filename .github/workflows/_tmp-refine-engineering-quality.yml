name: Temporary engineering quality refinement

on:
  push:
    branches:
      - 92-refinement-engineering-quality-integration
  pull_request:
    branches:
      - 88-epic-engineering-design-quality

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skills repository
        uses: actions/checkout@v4
        with:
          ref: 92-refinement-engineering-quality-integration
          fetch-depth: 0

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: .deps/ai-native-core

      - name: Install validation dependencies
        run: python3 -m pip install --quiet pyyaml

      - name: Apply workflow and pack refinement
        run: python3 scripts/_tmp_refine_engineering_quality.py

      - name: Regenerate generated inventories
        run: |
          python3 scripts/verify-capability-inventory.py --write-snapshot --skip-docs
          python3 scripts/inventory-contract-coverage.py \
            --root . \
            --core-root .deps/ai-native-core \
            --output docs/contract-coverage-discovery.yaml

      - name: Diagnostic validation
        continue-on-error: true
        run: |
          python3 scripts/verify-capability-inventory.py
          python3 scripts/verify-capability-discovery.py
          python3 scripts/validate-skill-tests.py

      - name: Commit refined files
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills/code-review-workflow/SKILL.md \
            skills/new-feature-workflow/SKILL.md \
            docs/skill-packs.md \
            docs/capability-inventory.json \
            docs/contract-coverage-discovery.yaml \
            catalog/capability-discovery/job-profiles.json \
            contracts/tests/code-review-workflow.test.yaml \
            contracts/tests/new-feature-workflow.test.yaml
          if git diff --cached --quiet; then
            echo "No refinement changes"
            exit 0
          fi
          git commit -m "refactor(engineering): integrate design-quality capabilities"
          git push origin HEAD:92-refinement-engineering-quality-integration
