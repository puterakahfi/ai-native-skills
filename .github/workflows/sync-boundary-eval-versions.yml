name: Sync Boundary Eval Versions

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/sync-boundary-eval-versions.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Update version-pinned eval contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          versions = {
              "adaptive-component-design": ("1.2.1", "1.2.2"),
              "decision-provenance": ("1.0.0", "1.0.1"),
              "redesign-workflow": ("3.4.0", "3.4.1"),
              "skill-evolution": ("1.0.0", "1.0.1"),
          }

          found = set()
          for path in sorted(Path("contracts/tests").glob("*.yaml")):
              text = path.read_text(encoding="utf-8")
              for skill, (old, new) in versions.items():
                  if not re.search(rf"^\s*skill:\s*{re.escape(skill)}\s*$", text, re.MULTILINE):
                      continue
                  found.add(skill)
                  updated, count = re.subn(
                      rf'(^\s*version:\s*)"{re.escape(old)}"\s*$',
                      rf'\g<1>"{new}"',
                      text,
                      count=1,
                      flags=re.MULTILINE,
                  )
                  if count != 1:
                      raise RuntimeError(f"{path}: expected version {old} for {skill}")
                  path.write_text(updated, encoding="utf-8")
                  print(f"updated {path}: {skill} {old} -> {new}")
                  break

          print("version-pinned evals found:", ", ".join(sorted(found)))
          missing = sorted(set(versions) - found)
          print("no version-pinned eval found:", ", ".join(missing) or "none")
          PY

      - name: Commit eval version sync
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts/tests
          git commit -m "test: sync boundary clarification skill versions [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
