name: Temporary unowned contract candidate mapping

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  map:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check PyYAML

      - name: Compile candidate mapper
        run: python -m py_compile ai-native-skills/scripts/map-unowned-contract-candidates.py

      - name: Generate exact candidate mapping
        run: >-
          python ai-native-skills/scripts/map-unowned-contract-candidates.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Upload candidate evidence
        uses: actions/upload-artifact@v4
        with:
          name: unowned-contract-candidates-${{ github.run_id }}
          path: ai-native-skills/docs/unowned-contract-candidates.yaml

      - name: Commit candidate mapping and remove temporary workflow
        working-directory: ai-native-skills
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/unowned-contract-candidates.yaml
          git rm .github/workflows/tmp-unowned-candidate-mapping.yml
          git commit -m 'docs(governance): map unowned contract candidates'
          git push
