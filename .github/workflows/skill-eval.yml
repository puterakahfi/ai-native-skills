name: Skill and Gate Contracts

on:
  pull_request:
    paths:
      - "contracts/**"
      - "skills/**"
      - "docs/**"
      - "README.md"
      - "scripts/tmp-integrate-delivery.py"
      - ".github/workflows/skill-eval.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: delivery-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrate_delivery:
    if: github.head_ref == '53-delivery-work-breakdown'
    name: Integrate delivery capability
    runs-on: ubuntu-latest
    steps:
      - name: Checkout delivery branch
        uses: actions/checkout@v6
        with:
          ref: 53-delivery-work-breakdown
          fetch-depth: 0

      - name: Apply integration when not yet applied
        run: |
          if grep -q 'ai-native-skills.version: 1.5.0' skills/workflow-router/SKILL.md; then
            echo 'Delivery integration already applied.'
            exit 0
          fi
          python -m py_compile scripts/tmp-integrate-delivery.py
          python scripts/tmp-integrate-delivery.py

      - name: Commit content changes only
        run: |
          if grep -q 'ai-native-skills.version: 1.4.1' skills/workflow-router/SKILL.md; then
            echo 'No integration content to commit.'
            exit 0
          fi
          git checkout -- .github/workflows/skill-eval.yml
          git checkout -- .github/workflows/tmp-integrate-delivery-work-breakdown.yml
          git checkout -- scripts/tmp-integrate-delivery.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs contracts skills
          if git diff --cached --quiet; then
            echo 'No content changes.'
            exit 0
          fi
          git commit -m "feat(product): integrate delivery work breakdown"
          git push origin HEAD:53-delivery-work-breakdown

  validate:
    if: github.head_ref != '53-delivery-work-breakdown'
    name: Cleanup marker
    runs-on: ubuntu-latest
    steps:
      - run: echo cleanup marker
