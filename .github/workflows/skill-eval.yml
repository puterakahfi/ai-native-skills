name: Skill and Gate Contracts

on:
  push:
    branches: [main]
    paths:
      - "contracts/conformance/**"
      - "contracts/tests/**"
      - "skills/**"
      - "scripts/run-eval.sh"
      - "scripts/validate-eval-contracts.py"
      - "scripts/validate-design-gate-registry.py"
      - ".github/workflows/skill-eval.yml"
  pull_request:
    paths:
      - "contracts/conformance/**"
      - "contracts/tests/**"
      - "skills/**"
      - "scripts/run-eval.sh"
      - "scripts/validate-eval-contracts.py"
      - "scripts/validate-design-gate-registry.py"
      - ".github/workflows/skill-eval.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-and-gate-contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate skill and gate contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout ai-native-skills
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install "PyYAML>=6,<7" jsonschema

      - name: Check local validator and runner syntax
        run: |
          python -m py_compile scripts/validate-design-gate-registry.py
          python -m py_compile scripts/validate-eval-contracts.py
          bash -n scripts/run-eval.sh

      - name: Validate canonical design gate registry
        run: python scripts/validate-design-gate-registry.py

      - name: Validate repository eval contracts
        run: |
          python scripts/validate-eval-contracts.py \
            --write-smoke-outputs .tmp/eval-smoke-outputs

      - name: Checkout pinned ai-native-core runner
        uses: actions/checkout@v6
        with:
          repository: puterakahfi/ai-native-core
          ref: 4ba50647866c0413ec90a6c8c9a37520b2e26900
          path: .deps/ai-native-core

      - name: Stage production skill adapters
        run: |
          rm -rf .tmp/adapter-repo
          mkdir -p .tmp/adapter-repo
          cp -R skills .tmp/adapter-repo/skills

      - name: Validate adapter paths and pinned versions
        shell: bash
        run: |
          cd .tmp/adapter-repo
          bash "$GITHUB_WORKSPACE/.deps/ai-native-core/scripts/validate-implements.sh" \
            "$GITHUB_WORKSPACE/.deps/ai-native-core"

      - name: Generate structured conformance v2 reports
        shell: bash
        run: |
          set -o pipefail
          rm -rf .tmp/conformance
          mkdir -p .tmp/conformance
          python .deps/ai-native-core/scripts/validate-conformance.py \
            .deps/ai-native-core \
            .tmp/adapter-repo \
            --mode migration \
            --output-dir .tmp/conformance \
            --format json \
            | tee .tmp/conformance/inventory.log

      - name: Validate repository conformance result classes
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path('.tmp/conformance/repository-summary.json')
          document = json.loads(report_path.read_text(encoding='utf-8'))
          report = document['conformance_report']
          summary = report['summary']
          print(json.dumps(summary, indent=2))

          if summary['errors'] != 0:
              raise SystemExit(f"Explicit conformance errors: {summary['errors']}")
          if summary['partial'] != 0:
              raise SystemExit(f"Unexpected partial declarations: {summary['partial']}")

          results = {item['adapter_id']: item for item in report['results']}
          declarations = sorted(
              path.parent.name
              for path in Path('skills').glob('*/adapter.conformance.yaml')
          )
          failures = []
          for adapter_id in declarations:
              item = results.get(adapter_id)
              if item is None:
                  failures.append(f'{adapter_id}: missing conformance report')
                  continue
              if item['structural_status'] != 'CONFORMANT':
                  failures.append(
                      f"{adapter_id}: expected CONFORMANT, got {item['structural_status']} "
                      f"findings={item.get('findings', [])}"
                  )
          if failures:
              raise SystemExit('\n'.join(failures))
          print(f'v2 declarations conformant: {len(declarations)}')
          PY

      - name: Validate strict legacy adapters remain contradiction-free
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          registry_path = Path('contracts/conformance/strict-adapters.txt')
          report_path = Path('.tmp/conformance/repository-summary.json')
          if not registry_path.is_file():
              raise SystemExit(f'Missing strict adapter registry: {registry_path}')

          entries = []
          for raw in registry_path.read_text(encoding='utf-8').splitlines():
              value = raw.strip()
              if not value or value.startswith('#'):
                  continue
              entries.append(value)

          duplicates = sorted({item for item in entries if entries.count(item) > 1})
          if duplicates:
              raise SystemExit(f'Duplicate strict adapter entries: {duplicates}')

          missing = sorted(
              item for item in entries
              if not (Path('skills') / item / 'SKILL.md').is_file()
          )
          if missing:
              raise SystemExit(f'Strict adapter entries without SKILL.md: {missing}')

          report = json.loads(report_path.read_text(encoding='utf-8'))['conformance_report']
          results = {item['adapter_id']: item for item in report['results']}
          failures = []

          for adapter_id in entries:
              item = results.get(adapter_id)
              if item is None:
                  failures.append(f'{adapter_id}: missing conformance result')
                  continue

              declaration = Path('skills') / adapter_id / 'adapter.conformance.yaml'
              status = item['structural_status']
              if declaration.is_file():
                  if status != 'CONFORMANT':
                      failures.append(
                          f"{adapter_id}: v2 declaration is {status}, "
                          f"findings={item.get('findings', [])}"
                      )
                  continue

              if status != 'NOT_CHECKABLE':
                  failures.append(
                      f'{adapter_id}: legacy adapter expected NOT_CHECKABLE, got {status}'
                  )
                  continue

              findings = item.get('findings', [])
              finding_codes = {finding.get('code') for finding in findings}
              invalid_codes = finding_codes - {'STRUCTURED_DECLARATION_MISSING'}
              if invalid_codes:
                  failures.append(
                      f'{adapter_id}: unexpected legacy findings {sorted(invalid_codes)}'
                  )
              if any(finding.get('severity') in {'ERROR', 'PARTIAL'} for finding in findings):
                  failures.append(f'{adapter_id}: error/partial finding in legacy report')
              diagnostics = item.get('migration_diagnostics', [])
              if any(diagnostic.get('severity') != 'INFO' for diagnostic in diagnostics):
                  failures.append(f'{adapter_id}: non-INFO migration diagnostic')

          if failures:
              raise SystemExit('\n'.join(failures))
          print(f'strict adapters migration-safe: {len(entries)}')
          PY

      - name: Validate contracts with canonical core runner
        env:
          SKILL_EVAL_TESTS_DIR: ${{ github.workspace }}/contracts/tests
        run: |
          python .deps/ai-native-core/scripts/run-eval.py \
            --all \
            --validate-tests

      - name: Verify wrapper integration
        env:
          AI_NATIVE_CORE_DIR: ${{ github.workspace }}/.deps/ai-native-core
        run: |
          bash scripts/run-eval.sh --all --validate-tests

      - name: Run per-case runner compatibility smoke
        env:
          AI_NATIVE_CORE_DIR: ${{ github.workspace }}/.deps/ai-native-core
        run: |
          mkdir -p .tmp/eval-reports
          bash scripts/run-eval.sh \
            --all \
            --output-dir .tmp/eval-smoke-outputs \
            --report-json .tmp/eval-reports/contract-smoke.json

      - name: Upload adapter conformance reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: adapter-conformance
          path: |
            .tmp/conformance/inventory.log
            .tmp/conformance/repository-summary.json
            .tmp/conformance/*.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: skill-eval-contract-smoke
          path: .tmp/eval-reports/contract-smoke.json
          if-no-files-found: warn
          retention-days: 14
