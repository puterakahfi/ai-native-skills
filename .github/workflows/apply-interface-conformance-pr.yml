name: Apply Interface Conformance Migration

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/apply-interface-conformance-pr.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply reviewed interface patches
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          ROOT = Path.cwd()

          def patch_skill(name, old_version, new_version, section, replacements=()):
              path = ROOT / "skills" / name / "SKILL.md"
              text = path.read_text(encoding="utf-8")
              old = f"ai-native-skills.version: {old_version}"
              new = f"ai-native-skills.version: {new_version}"
              if old not in text:
                  raise SystemExit(f"{path}: expected version anchor not found: {old}")
              text = text.replace(old, new, 1)
              for before, after in replacements:
                  if before not in text:
                      raise SystemExit(f"{path}: replacement anchor not found: {before}")
                  text = text.replace(before, after, 1)
              if "## Core contract interface" in text:
                  raise SystemExit(f"{path}: interface section already exists")
              match = re.search(r"(?m)^# .+\n", text)
              if not match:
                  raise SystemExit(f"{path}: title heading not found")
              insertion = "\n" + section.strip() + "\n\n"
              text = text[:match.end()] + insertion + text[match.end():].lstrip("\n")
              path.write_text(text, encoding="utf-8")

          patch_skill(
              "api-contract", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - api_description_or_spec
          allowed_outputs:
            - openapi_spec
            - contract_test_suite
            - versioning_decision
            - breaking_change_report
            - consumer_impact_analysis
          quality_gates:
            - api_must_have_explicit_versioning_strategy
            - breaking_changes_must_be_detected_before_deploy
            - contract_tests_must_exist_for_every_consumer
            - no_undocumented_endpoints_in_production
            - error_responses_must_follow_consistent_schema
            - backward_compatibility_must_be_preserved_within_major_version
            - api_design_must_be_consumer_driven
            - deprecation_must_be_announced_before_removal
          ```

          Start from the `api_description_or_spec`; missing source material is `NOT_VERIFIED`, not permission to invent an API. Return only the applicable declared outputs. Preserve backward compatibility within one major version, detect breaking changes before deploy, reject undocumented production endpoints, and announce deprecation before removal.
          '''
          )

          patch_skill(
              "content-strategy", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - content_inventory
            - audience_profile
          allowed_outputs:
            - content_structure
            - tone_guidelines
            - microcopy_variants
            - content_gate_scores
          quality_gates:
            - information_sequenced_by_user_mental_model
            - tone_consistent_across_sections
          ```

          Sequence information from the audience's mental model and task progression, not the author's internal organization. The declared tone must remain consistent across sections; contextual variation may change intensity, never identity.
          '''
          )

          patch_skill(
              "data-modeling", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - domain_context
            - entity_inventory
          allowed_outputs:
            - schema_definition
            - migration_plan
            - model_alignment_verdict
            - data_modeling_gate_scores
          quality_gates:
            - schema_reflects_domain_not_database_convenience
            - migrations_are_reversible_or_documented
            - no_implicit_coupling_across_bounded_contexts
          ```

          A migration must be reversible or explicitly document why rollback is unsafe and what recovery path replaces it. Cross-bounded-context relationships require an explicit integration contract; do not create implicit database coupling between contexts.
          '''
          )

          patch_skill(
              "design-spacing", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - genre_selection
            - macrostructure
          allowed_outputs:
            - section_spacing_spec
            - component_spacing_spec
            - ma_rationale
            - hierarchy_spacing_map
          quality_gates:
            - rhythm_consistent_across_sections
            - ma_intentional_not_accidental
            - more_space_above_headings_than_below
            - no_min_height_100vh
            - breathing_room_earned_by_content_not_default_padding
          ```

          Keep rhythm consistent across sections. Ma must be intentional, not accidental. Headings require more space above than below to preserve grouping. `min-height:100vh` is forbidden as a spacing shortcut, and breathing room must be earned by content rather than default padding.
          '''
          )

          patch_skill(
              "ethics-responsible-ai", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - ai_feature_or_system
          allowed_outputs:
            - ethics_audit_report
            - fairness_analysis
            - harm_assessment
            - transparency_recommendations
            - consent_and_governance_gaps
            - accountability_map
          quality_gates:
            - affected_groups_must_be_identified_before_launch
            - high_stakes_decisions_must_have_human_oversight
            - training_data_bias_must_be_audited
            - ai_involvement_must_be_disclosed_to_users
            - consent_must_be_explicit_for_data_used_in_ai
            - accountability_must_be_assigned_for_ai_errors
            - harm_must_be_assessed_not_assumed_negligible
            - power_asymmetry_must_be_acknowledged
          ```

          Before launch, identify affected groups, audit training-data bias, disclose AI involvement, assign accountability for errors, and assess harm instead of assuming it is negligible. High-stakes decisions require human oversight; data used in AI requires explicit consent, and power asymmetry must be acknowledged.
          '''
          )

          patch_skill(
              "information-architecture", "1.1.0", "1.1.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - content_inventory
            - user_goals
          allowed_outputs:
            - sitemap
            - nav_hierarchy
            - content_grouping_verdict
            - ia_gate_scores
          quality_gates:
            - nav_items_reflect_page_sections
            - content_grouped_by_user_mental_model
            - max_2_nav_levels
          ```

          Navigation items must reflect real page sections and content must be grouped by the user's mental model. Keep navigation hierarchy to a maximum of two levels; deeper organization requires search, progressive disclosure, or a justified alternate structure.
          '''
          )

          patch_skill(
              "macrostructures", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - brief_signals
            - prior_macrostructure_ref
          allowed_outputs:
            - macrostructure_selection
            - justification_from_signals
            - diversification_verdict
            - css_pattern_ref
            - macrostructure_gate_scores
          quality_gates:
            - selection_must_be_justified_from_brief_signals_not_diversification_only
            - new_pick_must_differ_from_prior_on_2_or_more_axes
            - no_dead_space_in_split_panels
            - cards_must_fill_height_in_split_layout
          ```

          When a prior macrostructure exists, a new pick must differ on at least two declared axes unless stronger brief evidence overrides diversification. Split panels must not create dead space, and cards in a split layout must fill the intended panel height rather than leaving accidental voids.
          '''
          )

          patch_skill(
              "motion-design", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - animation_inventory
          allowed_outputs:
            - animation_verdict
            - gpu_compliance_report
            - reduced_motion_audit
            - motion_gate_scores
          quality_gates:
            - every_animation_has_user_signal_purpose
            - hover_transitions_200ms_or_less
            - gpu_only_transform_and_opacity
            - prefers_reduced_motion_media_query_present
          ```

          Every animation requires a user-signal purpose such as feedback, orientation, continuity, or hierarchy. Decorative motion with no user signal is rejected. Hover transitions must be 200 ms or less. GPU-safe motion uses only transform and opacity, and reduced-motion support must include a `prefers-reduced-motion` media query.
          '''
          )

          patch_skill(
              "role-switcher", "1.3.0", "1.3.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - user_request
          allowed_outputs:
            - detected_intent
            - role_composition
            - skills_to_load
            - analysis_with_multi_lens
          quality_gates:
            - intent_must_be_detected_before_role_selection
            - role_composition_must_be_explicit_not_implicit
            - each_role_must_contribute_a_distinct_lens
            - no_role_loaded_without_clear_relevance_to_intent
            - multi_role_output_must_be_structured_by_lens
            - agent_must_state_which_roles_were_activated
          ```

          State the detected intent and activated roles explicitly. Each role must contribute a distinct lens, and multi-role evidence must remain structured by lens before the owner synthesizes one decision. Never load a role without clear relevance to the user request.
          '''
          )

          patch_skill(
              "ui-components", "1.0.0", "1.1.0", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - brief_signals
            - content_inventory
          allowed_outputs:
            - pattern_selection
            - decision_tree_path
            - pattern_gate_scores
          quality_gates:
            - pattern_selected_from_decision_tree_not_arbitrary
            - hero_pattern_matches_content_volume
          ```

          Component work starts with `brief_signals` and `content_inventory`. Select the pattern through the relevant decision tree, record the `decision_tree_path`, and verify that the hero pattern matches content volume. Only after selection may the chosen template be copied verbatim.
          ''',
              replacements=((
                  "1. **Copy template verbatim — zero improvisation.** Improvisation = bugs. Template = correct behavior on all viewports.",
                  "1. **Select first, then copy the chosen template verbatim.** Pattern selection comes from the decision tree, brief signals, and content inventory; improvising after selection still creates bugs."
              ), (
                  "1. **Copy template verbatim — zero improvisation.**",
                  "1. **Select through the decision tree, then copy the chosen template verbatim.**"
              ))
          )

          patch_skill(
              "web-performance", "1.0.0", "1.0.1", r'''
          ## Core contract interface

          ```yaml
          required_inputs:
            - page_artifact
          allowed_outputs:
            - lcp_audit
            - cls_audit
            - inp_audit
            - performance_gate_scores
          quality_gates:
            - lcp_under_2500ms
            - cls_under_0_1
            - no_render_blocking_resources
          ```

          Measure the supplied `page_artifact`; missing runtime evidence is `NOT_VERIFIED`. LCP must remain under 2500 ms, CLS under 0.1, and render-blocking resources must be eliminated or explicitly proven unavoidable within the performance budget.
          '''
          )

          evals = {
              "api-contract": ("1.0.1", "api-change-preserves-consumers", [
                  "api_must_have_explicit_versioning_strategy",
                  "breaking_changes_must_be_detected_before_deploy",
                  "backward_compatibility_must_be_preserved_within_major_version",
                  "deprecation_must_be_announced_before_removal",
              ], ["silently break consumers"]),
              "content-strategy": ("1.0.1", "content-follows-user-mental-model", [
                  "information_sequenced_by_user_mental_model",
                  "tone_consistent_across_sections",
              ], ["author's internal organization decides the sequence"]),
              "data-modeling": ("1.0.1", "migration-and-context-boundaries", [
                  "migrations_are_reversible_or_documented",
                  "no_implicit_coupling_across_bounded_contexts",
              ], ["shared database foreign key across bounded contexts without a contract"]),
              "design-spacing": ("1.0.1", "spacing-rhythm-and-ma-gates", [
                  "rhythm_consistent_across_sections",
                  "ma_intentional_not_accidental",
                  "more_space_above_headings_than_below",
                  "no_min_height_100vh",
              ], ["default padding creates breathing room automatically"]),
              "ethics-responsible-ai": ("1.0.1", "prelaunch-ethics-accountability", [
                  "affected_groups_must_be_identified_before_launch",
                  "training_data_bias_must_be_audited",
                  "ai_involvement_must_be_disclosed_to_users",
                  "accountability_must_be_assigned_for_ai_errors",
                  "harm_must_be_assessed_not_assumed_negligible",
              ], ["harm is negligible by default"]),
              "information-architecture": ("1.1.1", "navigation-reflects-content-model", [
                  "nav_items_reflect_page_sections",
                  "content_grouped_by_user_mental_model",
                  "max_2_nav_levels",
              ], ["three navigation levels by default"]),
              "macrostructures": ("1.0.1", "split-layout-has-no-voids", [
                  "new_pick_must_differ_from_prior_on_2_or_more_axes",
                  "no_dead_space_in_split_panels",
                  "cards_must_fill_height_in_split_layout",
              ], ["diversification alone overrides the brief"]),
              "motion-design": ("1.0.1", "motion-purpose-duration-and-reduction", [
                  "every_animation_has_user_signal_purpose",
                  "hover_transitions_200ms_or_less",
                  "gpu_only_transform_and_opacity",
                  "prefers_reduced_motion_media_query_present",
              ], ["decorative motion needs no user purpose"]),
              "ui-components": ("1.1.0", "pattern-selection-precedes-template-copy", [
                  "brief_signals",
                  "content_inventory",
                  "pattern_selected_from_decision_tree_not_arbitrary",
                  "hero_pattern_matches_content_volume",
              ], ["copy the first template before selecting a pattern"]),
              "web-performance": ("1.0.1", "core-vitals-and-render-blocking-gates", [
                  "lcp_under_2500ms",
                  "cls_under_0_1",
                  "no_render_blocking_resources",
              ], ["optimize without measuring the page artifact"]),
          }

          tests_dir = ROOT / "contracts" / "tests"
          tests_dir.mkdir(parents=True, exist_ok=True)
          for skill, (version, case_id, must_contain, must_not_contain) in evals.items():
              path = tests_dir / f"{skill}.test.yaml"
              if path.exists():
                  raise SystemExit(f"{path}: expected new eval file but it already exists")
              lines = [
                  "skill_test:",
                  f"  skill: {skill}",
                  f"  version: \"{version}\"",
                  f"  description: Verify {skill} exposes and applies its core contract interface.",
                  "",
                  "  cases:",
                  f"    - id: {case_id}",
                  "      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.",
                  f"      trigger: \"Apply {skill} to a realistic change and report the contract-backed decision.\"",
                  "      must_contain:",
              ]
              lines += [f"        - \"{item}\"" for item in must_contain]
              lines += ["      must_not_contain:"]
              lines += [f"        - \"{item}\"" for item in must_not_contain]
              lines += ["      quality_gates_tested:"]
              lines += [f"        - {item}" for item in must_contain if "_" in item]
              path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          role_test = tests_dir / "role-switcher.test.yaml"
          role_text = role_test.read_text(encoding="utf-8")
          if 'version: "1.3.0"' not in role_text:
              raise SystemExit("role-switcher eval version anchor missing")
          role_text = role_text.replace('version: "1.3.0"', 'version: "1.3.1"', 1)
          role_text += r'''

              - id: explicit-role-activation-and-lens-structure
                description: Role composition must state activated roles and preserve distinct lenses before synthesis.
                trigger: "Analyze a cross-domain request using multiple roles, but make ownership and each contribution explicit."
                must_contain:
                  - "detected_intent"
                  - "role_composition"
                  - "analysis_with_multi_lens"
                  - "agent_must_state_which_roles_were_activated"
                must_not_contain:
                  - "silent role activation"
                  - "flat undifferentiated report"
                quality_gates_tested:
                  - intent_must_be_detected_before_role_selection
                  - each_role_must_contribute_a_distinct_lens
                  - multi_role_output_must_be_structured_by_lens
                  - agent_must_state_which_roles_were_activated
          '''
          role_test.write_text(role_text, encoding="utf-8")

          workflow = ROOT / ".github" / "workflows" / "skill-eval.yml"
          workflow_text = workflow.read_text(encoding="utf-8")
          old_block = '''          set -o pipefail
                    mkdir -p .tmp/conformance
                    set +e
                    python .deps/ai-native-core/scripts/validate-conformance.py \\
                      .deps/ai-native-core \\
                      .tmp/adapter-repo | tee .tmp/conformance/report.txt
                    validator_status=${PIPESTATUS[0]}
                    set -e

                    if grep -Eq 'boundary \\[(ERROR|WARN|NOT_CHECKABLE)\\]' .tmp/conformance/report.txt; then
                      echo 'Boundary conformance findings must be resolved before merge.'
                      exit 1
                    fi
                    grep -Eq '^Not checkable:[[:space:]]+0$' .tmp/conformance/report.txt

                    if [ "$validator_status" -ne 0 ]; then
                      echo '::warning::Legacy gate/input/output conformance debt remains tracked in issue #29; boundary conformance is clean.'
                    fi
          '''
          new_block = '''          set -o pipefail
                    mkdir -p .tmp/conformance
                    python .deps/ai-native-core/scripts/validate-conformance.py \\
                      .deps/ai-native-core \\
                      .tmp/adapter-repo | tee .tmp/conformance/report.txt
                    grep -Eq '^Errors:[[:space:]]+0$' .tmp/conformance/report.txt
                    grep -Eq '^Not checkable:[[:space:]]+0$' .tmp/conformance/report.txt
                    if grep -Eq 'boundary \\[(ERROR|WARN|NOT_CHECKABLE)\\]' .tmp/conformance/report.txt; then
                      echo 'Boundary conformance findings must be resolved before merge.'
                      exit 1
                    fi
          '''
          if old_block not in workflow_text:
              raise SystemExit("skill-eval conformance block anchor missing")
          workflow.write_text(workflow_text.replace(old_block, new_block, 1), encoding="utf-8")
          PY

      - name: Inspect migration diff
        run: |
          git diff --check
          git status --short

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add skills contracts/tests .github/workflows/skill-eval.yml
          git commit -m "feat: resolve adapter interface conformance errors [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
