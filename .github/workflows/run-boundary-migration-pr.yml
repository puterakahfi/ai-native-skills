name: Run Boundary Migration

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/run-boundary-migration-pr.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Extract reviewed migration script
        run: |
          python - <<'PY'
          from pathlib import Path

          workflow = Path('.github/workflows/apply-boundary-migration.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          block = workflow[start:end]
          lines = [line[10:] if line.startswith('          ') else line for line in block.splitlines()]
          Path('/tmp/apply_boundary_migration.py').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Apply reviewed migration
        run: python /tmp/apply_boundary_migration.py

      - name: Preserve workflow files for connector-managed policy update
        run: git checkout HEAD -- .github/workflows

      - name: Inspect migration diff
        run: |
          git diff --check
          git status --short

      - name: Commit migration
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: declare contract adapter boundaries [skip ci]"
          git push origin HEAD:${HEAD_BRANCH}
