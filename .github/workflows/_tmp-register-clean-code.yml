name: Temporary clean-code metadata registration

on:
  push:
    branches:
      - 89-feature-clean-code

permissions:
  contents: write

jobs:
  register:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 89-feature-clean-code
          fetch-depth: 0

      - name: Register capability metadata and validate
        run: python3 scripts/_tmp_register_clean_code.py

      - name: Commit generated metadata
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/skills.md docs/capability-inventory.json \
            catalog/capability-discovery/classifications.json \
            catalog/capability-discovery/topics.json \
            catalog/capability-discovery/job-profiles.json
          if git diff --cached --quiet; then
            echo "No generated metadata changes"
            exit 0
          fi
          git commit -m "docs(clean-code): register capability metadata"
          git push origin HEAD:89-feature-clean-code
