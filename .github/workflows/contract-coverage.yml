name: Contract Coverage

on:
  pull_request:
    paths:
      - "skills/**"
      - "compat/**"
      - "schemas/contract-exemption.schema.yaml"
      - "scripts/inventory-contract-coverage.py"
      - "scripts/validate-contract-coverage.py"
      - "scripts/map-unowned-contract-candidates.py"
      - "docs/contract-coverage-discovery.yaml"
      - "docs/compatibility-registry-migration.yaml"
      - "docs/unowned-contract-candidates.yaml"
      - "tests/test_contract_exemptions.py"
      - ".github/workflows/contract-coverage.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "compat/**"
      - "schemas/contract-exemption.schema.yaml"
      - "scripts/inventory-contract-coverage.py"
      - "scripts/validate-contract-coverage.py"
      - "scripts/map-unowned-contract-candidates.py"
      - "docs/contract-coverage-discovery.yaml"
      - "docs/compatibility-registry-migration.yaml"
      - "docs/unowned-contract-candidates.yaml"
      - "tests/test_contract_exemptions.py"
      - ".github/workflows/contract-coverage.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          path: ai-native-skills
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Compile coverage tooling and tests
        run: |
          python -m py_compile \
            ai-native-skills/scripts/inventory-contract-coverage.py \
            ai-native-skills/scripts/map-unowned-contract-candidates.py \
            ai-native-skills/scripts/validate-contract-coverage.py \
            ai-native-skills/tests/test_contract_exemptions.py

      - name: Regenerate contract coverage evidence
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Commit regenerated inventory
        if: github.event_name == 'pull_request'
        working-directory: ai-native-skills
        run: |
          if git diff --quiet -- docs/contract-coverage-discovery.yaml; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/contract-coverage-discovery.yaml
          git commit -m "chore(contracts): refresh coverage inventory"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Validate repository contract coverage
        run: >-
          python ai-native-skills/scripts/validate-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Run exemption regressions
        working-directory: ai-native-skills
        run: python -m unittest discover -s tests -p 'test_contract_exemptions.py' -v

      - name: Validate core v2 migration state
        run: >-
          python ai-native-core/scripts/validate-conformance.py
          ai-native-core
          ai-native-skills
          --mode migration
          --output-dir /tmp/conformance-reports
          --format json

      - name: Assert no explicit conformance errors
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(
              (Path("/tmp/conformance-reports") / "repository-summary.json").read_text()
          )["conformance_report"]["summary"]
          print(json.dumps(summary, indent=2))
          if summary["errors"] != 0:
              raise SystemExit("explicit conformance errors are not allowed")
          PY

      - name: Upload coverage and conformance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-coverage-${{ github.run_id }}
          path: |
            ai-native-skills/docs/contract-coverage-discovery.yaml
            ai-native-skills/docs/compatibility-registry-migration.yaml
            /tmp/conformance-reports/repository-summary.json
          if-no-files-found: warn
