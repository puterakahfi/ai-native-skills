name: Temporary finalize contract governance

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout executable adapters
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          path: ai-native-skills

      - name: Checkout canonical core
        uses: actions/checkout@v4
        with:
          repository: puterakahfi/ai-native-core
          path: ai-native-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Compile finalizer and permanent tooling
        run: |
          python -m py_compile \
            ai-native-skills/scripts/tmp-finalize-contract-exemptions.py \
            ai-native-skills/scripts/inventory-contract-coverage.py \
            ai-native-skills/scripts/validate-contract-coverage.py \
            ai-native-skills/tests/test_contract_exemptions.py

      - name: Finalize allowlisted exemption scope and review dates
        run: >-
          python ai-native-skills/scripts/tmp-finalize-contract-exemptions.py
          --root ai-native-skills

      - name: Remove one-time tooling before validation
        working-directory: ai-native-skills
        run: >-
          git rm
          scripts/tmp-finalize-contract-exemptions.py
          .github/workflows/tmp-finalize-contract-governance.yml

      - name: Regenerate deterministic coverage report
        run: >-
          python ai-native-skills/scripts/inventory-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core
          --output docs/contract-coverage-discovery.yaml

      - name: Validate repository coverage and exemptions
        run: >-
          python ai-native-skills/scripts/validate-contract-coverage.py
          --root ai-native-skills
          --core-root ai-native-core

      - name: Run exemption regressions
        working-directory: ai-native-skills
        run: python -m unittest discover -s tests -p 'test_contract_exemptions.py' -v

      - name: Validate core v2 migration state
        run: >-
          python ai-native-core/scripts/validate-conformance.py
          ai-native-core
          ai-native-skills
          --mode migration
          --output-dir /tmp/conformance-reports
          --format json

      - name: Upload finalization evidence
        uses: actions/upload-artifact@v4
        with:
          name: finalized-contract-governance-${{ github.run_id }}
          path: |
            ai-native-skills/docs/contract-coverage-discovery.yaml
            ai-native-skills/docs/compatibility-registry-migration.yaml
            /tmp/conformance-reports/repository-summary.json

      - name: Commit finalized governance state
        working-directory: ai-native-skills
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            skills/*/contract.exemption.yaml \
            docs/contract-coverage-discovery.yaml
          git add -u
          git commit -m 'feat(governance): finalize reviewed exemptions and coverage gate'
          git push
