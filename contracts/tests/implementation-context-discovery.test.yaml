skill_test:
  skill: implementation-context-discovery
  version: "1.2.0"
  description: Verify component coverage, variants, canonical registry options, typography roles, and semantic-native boundaries are resolved before implementation.

  cases:
    - id: shadcn-components-and-variants-are-reused
      description: Existing source components and variants must precede local duplicates.
      trigger: "Next.js repo memakai shadcn source components, Tailwind semantic variables, dan Lucide. Button, Input, Select, serta Button outline variant tersedia dan dipakai production. Redesign mengusulkan raw local controls, route-local button system, dan icon library kedua. Putuskan mapping."
      must_contain:
        - "component capability coverage"
        - "component variant inventory"
        - "reuse"
        - "reuse_variant"
        - "CONVENTION_DRIFT"
        - "DEPENDENCY_DRIFT"
        - "implementation mapping"
        - "architecture-review"
      must_not_contain:
        - "raw local replacement is equivalent"
        - "create a new button system"
        - "install another icon library"
      sequence_required:
        - pattern: "repository evidence|implementation context"
          must_come_before: "component capability coverage|reuse|implementation mapping"
      quality_gates_tested:
        - repository_context_is_inspected_before_implementation
        - actual_component_exports_variants_registry_and_usage_are_inventoried
        - component_capability_coverage_is_mapped_before_component_creation
        - existing_fit_components_and_utilities_are_reused_before_local_duplication
        - existing_fit_variants_are_reused_before_new_variants
        - icon_component_styling_state_and_data_systems_are_not_mixed_without_approved_reason

    - id: source-copied-system-does-not-require-marketing-package
      description: Canonicality comes from repository source and usage, not a package name.
      trigger: "Manifest tidak punya package bernama shadcn. Repo punya components.json, shared UI source, Radix primitives, CVA, cn, semantic tokens, stories, dan repeated production imports. Nyatakan system dan batas component availability."
      must_contain:
        - "source-copied"
        - "components.json"
        - "Radix"
        - "CVA"
        - "actual usage"
        - "canonical"
        - "actual components"
        - "variants"
      must_not_contain:
        - "no shadcn dependency means no component system"
        - "every upstream component is installed"
        - "package presence is the only evidence"
      quality_gates_tested:
        - package_presence_alone_does_not_establish_canonical_status
        - canonicality_uses_declared_dependency_actual_usage_repetition_repository_convention_and_current_decisions
        - actual_component_exports_variants_registry_and_usage_are_inventoried

    - id: missing-dialog-prefers-canonical-registry
      description: A canonical registry component precedes another component library or custom primitive.
      trigger: "Repo canonical-nya shadcn. Dialog belum ada lokal, tetapi tersedia dari configured canonical registry dan memenuhi focus, escape, portal, accessibility, dan token contract. Agent mengusulkan library kedua."
      must_contain:
        - "canonical registry"
        - "local absence"
        - "add_canonical_registry_component"
        - "repository-owned source"
        - "rejected alternatives"
        - "verification plan"
      must_not_contain:
        - "install the second component library"
        - "missing locally means capability gap"
        - "generated source needs no review"
      quality_gates_tested:
        - component_capability_coverage_is_mapped_before_component_creation
        - canonical_registry_component_is_considered_before_parallel_library_or_custom_primitive
        - bounded_extension_or_composition_is_preferred_before_product_specific_or_parallel_system_creation

    - id: typography-roles-precede-local-scale
      description: Repository typography roles must be mapped before route-local type systems.
      trigger: "Repo punya display, sans, mono serta page-title, section-title, body, label, metadata, dan code treatments. Redesign mengusulkan unrelated size, weight, tracking, dan measure untuk setiap local heading tanpa named reason."
      must_contain:
        - "typography role map"
        - "semantic roles"
        - "representative usage"
        - "reuse"
        - "CONVENTION_DRIFT"
        - "bounded extension"
        - "verification"
      must_not_contain:
        - "invent a route-local typography system"
        - "every heading may use an unrelated scale"
        - "font package presence is enough"
      quality_gates_tested:
        - typography_roles_are_mapped_and_preserved_before_route_local_type_system_creation
        - convention_locks_and_scoped_exceptions_are_traceable_to_repository_evidence
        - implementation_mapping_precedes_code_production

    - id: semantic-structure-is-valid-but-does-not-excuse-dialog-duplication
      description: Semantic HTML remains valid while duplicated interactive contracts remain drift.
      trigger: "Documentation page memakai main, section, article, headings, list, links, dan details/summary dengan benar. Namun page juga membuat div-based dialog dan dropdown padahal canonical Dialog dan Select tersedia."
      must_contain:
        - "semantic native eligibility"
        - "valid"
        - "interaction contract"
        - "Dialog"
        - "Select"
        - "CONVENTION_DRIFT"
        - "reuse"
      must_not_contain:
        - "every element must be shadcn"
        - "all native markup is acceptable"
        - "semantic structure excuses interaction duplication"
      quality_gates_tested:
        - semantic_native_elements_remain_valid_when_no_richer_canonical_contract_is_needed
        - semantic_native_structure_does_not_authorize_duplicate_interactive_components
        - bypassing_a_fit_canonical_abstraction_without_evidence_is_convention_drift

    - id: product-component-composes-primitives-before-dependency
      description: Product components remain valid, while new dependencies require a proven gap after all coverage options.
      trigger: "BrandAssetPicker membutuhkan domain policy. Canonical Input, Popover, Command, Button, form conventions, tokens, dan Lucide tersedia. Untuk virtualization terpisah, measured requirement tetap tidak terpenuhi setelah components, variants, composition, canonical registry, semantic-native, dan product adapter dievaluasi. Putuskan keduanya."
      must_contain:
        - "component capability coverage"
        - "compose"
        - "product-specific component"
        - "canonical primitives"
        - "CAPABILITY_GAP"
        - "canonical registry"
        - "alternatives"
        - "approval authority"
        - "ROUTE_FOR_APPROVAL"
      must_not_contain:
        - "all custom components are drift"
        - "install a second component system"
        - "dependency automatically approved"
      sequence_required:
        - pattern: "existing options|canonical registry|capability gap"
          must_come_before: "dependency|candidate"
      quality_gates_tested:
        - bounded_extension_or_composition_is_preferred_before_product_specific_or_parallel_system_creation
        - canonical_registry_component_is_considered_before_parallel_library_or_custom_primitive
        - new_dependencies_require_proven_capability_gap_alternatives_consequences_and_authority
        - source_only_evidence_does_not_claim_runtime_visual_or_accessibility_conformance
        - independent_architecture_review_remains_required_after_implementation
