skill_test:
  skill: web-performance
  version: "1.0.1"
  description: Verify web-performance exposes and applies its core contract interface.

  cases:
    - id: core-vitals-and-render-blocking-gates
      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.
      trigger: "Apply web-performance to a realistic change and report the contract-backed decision."
      must_contain:
        - "lcp_under_2500ms"
        - "cls_under_0_1"
        - "no_render_blocking_resources"
      must_not_contain:
        - "optimize without measuring the page artifact"
      quality_gates_tested:
        - lcp_under_2500ms
        - cls_under_0_1
        - no_render_blocking_resources
