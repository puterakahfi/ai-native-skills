skill_test:
  skill: api-contract
  version: "1.0.1"
  description: Verify api-contract exposes and applies its core contract interface.

  cases:
    - id: api-change-preserves-consumers
      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.
      trigger: "Apply api-contract to a realistic change and report the contract-backed decision."
      must_contain:
        - "api_must_have_explicit_versioning_strategy"
        - "breaking_changes_must_be_detected_before_deploy"
        - "backward_compatibility_must_be_preserved_within_major_version"
        - "deprecation_must_be_announced_before_removal"
      must_not_contain:
        - "silently break consumers"
      quality_gates_tested:
        - api_must_have_explicit_versioning_strategy
        - breaking_changes_must_be_detected_before_deploy
        - backward_compatibility_must_be_preserved_within_major_version
        - deprecation_must_be_announced_before_removal
