skill_test:
  skill: context-manager
  version: 1.0.1
  description: Verify context-manager exposes and applies its reviewed context, workflow, profile, or maintenance contract
    interface.
  cases:
  - id: context-pack-preserves-source-traceability
    description: Resolve task and product context into a traceable handoff pack.
    trigger: Apply context-manager to a realistic context, routing, profile, planning, evaluation, or maintenance task and
      report the contract-backed result.
    must_contain:
    - context_source_must_be_traceable
    - task_or_workflow_ref
    - product_ref
    - missing_context_must_be_flagged_not_assumed
    must_not_contain:
    - invent missing product facts
    - remove source references
    quality_gates_tested:
    - context_source_must_be_traceable
    - missing_context_must_be_flagged_not_assumed
