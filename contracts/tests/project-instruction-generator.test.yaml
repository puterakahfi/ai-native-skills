skill_test:
  skill: project-instruction-generator
  version: 1.1.0
  description: Verify project-instruction-generator produces a concise runtime-valid bootstrap with routing, disclosure, repository discipline, completion gates, evidence-gated evolution, and character-capacity validation.
  cases:
  - id: generate-standard-project-instructions-from-project-resources
    description: Generate paste-ready ChatGPT Project Instructions where changing inputs are mainly project identity and resource URLs.
    trigger: >-
      Create standardized ChatGPT Project Instructions for a project named VisualMate Custom GPT. Its purpose is to develop, test, and release an AI Creative Control System. Use https://github.com/puterakahfi/visualmate-gpt as the primary repository, https://github.com/users/puterakahfi/projects/10 as project management, https://github.com/puterakahfi/ai-native-skills as executable skills, https://github.com/puterakahfi/ai-native-core as core contracts, and https://github.com/puterakahfi/ai-native-fw as the runtime/control-plane source. Keep the artifact paste-ready for ChatGPT Projects.
    must_contain:
    - VisualMate Custom GPT
    - Source Priority
    - workflow-router
    - role-switcher
    - Execution Context
    - Execution Receipt
    - route
    - execute
    - verify
    - deliver
    - learn
    - evolve when justified
    - skill-evolution
    - NO_CHANGE
    - LOCAL_ONLY
    - EVAL_ONLY
    - BUG
    - IMPROVEMENT
    - RFC
    - DEFERRED_UNVERIFIED
    - ai-native-core
    - ai-native-skills
    - ai-native-fw
    - Character count
    - 8,000
    - 7,200
    - Remaining hard budget
    - Verified learning before evolution
    must_not_contain:
    - invent an issue number
    - automatically modify every skill after use
    - copy the complete methodology of every referenced skill
    - claim a skill was applied without observable output
    quality_gates_tested:
    - project_specific_values_are_traceable
    - reusable_policy_is_separated_from_project_configuration
    - routing_and_role_composition_precede_execution
    - capability_evolution_is_evidence_gated
    - ownership_boundaries_are_preserved
    - generated_instructions_remain_a_bootstrap_not_a_methodology_dump
    - chatgpt_runtime_capacity_is_reported
  - id: audit-bloated-project-instructions
    description: Reduce instructions that duplicate full delivery, git, evidence, and evolution procedures.
    trigger: >-
      Audit and rewrite project instructions that copy complete delivery-work-breakdown matrices, every git command, the entire evidence taxonomy, and the full skill-evolution procedure. Preserve governing behavior, move methodology behind owning skills, and keep the final ChatGPT Project artifact inside its safe character budget.
    must_contain:
    - delivery-work-breakdown
    - git-workflow
    - decision-provenance
    - skill-evolution
    - concise
    - observable evidence
    - Project Instructions
    - character
    - target budget
    must_not_contain:
    - full epic classification matrix
    - every git command
    - entire evidence taxonomy
    - complete skill-evolution procedure
    quality_gates_tested:
    - duplicated_methodology_is_replaced_by_skill_mandates
    - project_specific_constraints_are_preserved
    - generated_instructions_remain_concise
    - runtime_budget_is_used_as_an_anti_bloat_gate
  - id: reject-over-limit-chatgpt-project-instructions
    description: Prevent an over-limit ChatGPT Project artifact from receiving PASS.
    trigger: >-
      The final text intended for ChatGPT Project Settings contains 8,450 characters. Validate it and report whether it is paste-ready.
    must_contain:
    - 8,450
    - 8,000
    - 7,200
    - hard maximum
    - target budget
    - safety margin
    - Remaining hard budget
    - FAIL
    - NEEDS_WORK
    - not paste-ready
    must_not_contain:
    - 'Final verdict: PASS'
    - within the verified limit
    quality_gates_tested:
    - output_above_hard_maximum_cannot_pass
    - exact_character_count_is_reported
    - runtime_acceptance_is_not_claimed_for_rejected_output
  - id: keep-unknown-platform-limit-unverified
    description: Do not invent capacity limits for a platform without verified evidence.
    trigger: >-
      Generate project-scoped instructions for an unspecified Claude, X, or Meta workspace. No official documentation or direct runtime validation for the instruction-field character limit has been provided.
    must_contain:
    - NOT_VERIFIED
    - limit provenance
    - platform acceptance
    - unproven
    - do not guess
    must_not_contain:
    - Claude maximum is 8,000
    - X maximum is 8,000
    - Meta maximum is 8,000
    - reuse the ChatGPT limit
    quality_gates_tested:
    - unknown_runtime_limits_are_not_invented
    - provider_specific_limits_do_not_leak_across_platforms
    - platform_acceptance_requires_verified_capacity
