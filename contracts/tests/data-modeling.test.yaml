skill_test:
  skill: data-modeling
  version: "1.0.1"
  description: Verify data-modeling exposes and applies its core contract interface.

  cases:
    - id: migration-and-context-boundaries
      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.
      trigger: "Apply data-modeling to a realistic change and report the contract-backed decision."
      must_contain:
        - "migrations_are_reversible_or_documented"
        - "no_implicit_coupling_across_bounded_contexts"
      must_not_contain:
        - "shared database foreign key across bounded contexts without a contract"
      quality_gates_tested:
        - migrations_are_reversible_or_documented
        - no_implicit_coupling_across_bounded_contexts
