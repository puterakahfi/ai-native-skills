skill_test:
  skill: plan
  version: 1.0.1
  description: Verify plan exposes and applies its reviewed context, workflow, profile, or maintenance contract interface.
  cases:
  - id: plan-produces-verifiable-file-aware-tasks
    description: Plan an implementation goal before execution with exact paths and atomic verification steps.
    trigger: Apply plan to a realistic context, routing, profile, planning, evaluation, or maintenance task and report the
      contract-backed result.
    must_contain:
    - task_list
    - file_path_references
    - approach_summary
    - goal_or_task
    - plan_must_be_written_before_execution_starts
    - plan_must_reference_exact_file_paths
    must_not_contain:
    - start implementation while planning
    - use vague phases only
    quality_gates_tested:
    - plan_must_be_written_before_execution_starts
    - plan_must_reference_exact_file_paths
