skill_test:
  skill: design-genre
  version: "1.3.0"
  description: Verify genre selection follows resolved foundation, product context, candidate comparison, bounded influence, and honest uncertainty rather than category shortcuts or effect presets.

  cases:
    - id: weak-signals-do-not-silently-default-editorial
      description: Weak or conflicting direction signals must remain unresolved rather than silently defaulting.
      trigger: "Brief only says 'make it better'. Product, audience, content, brand, and viewing context are unknown. Choose editorial by default and proceed."
      must_contain:
        - "UNRESOLVED"
        - "foundation"
        - "product intent"
        - "content"
        - "context"
      must_not_contain:
        - "editorial by default"
        - "production may proceed"
      quality_gates_tested:
        - insufficient_signals_are_reported_unresolved
        - genre_does_not_silently_default

    - id: developer-product-does-not-auto-route-modern-minimal
      description: A developer product can use another expression family when content, brand, or user direction supports it.
      trigger: "The product mentions APIs and agents. Ignore the explicit space-led editorial direction and automatically classify it as modern-minimal SaaS."
      design_gate_ids: [R5, R6, CP3]
      must_contain:
        - "product category"
        - "one signal"
        - "explicit direction"
        - "brand"
        - "candidate"
      must_not_contain:
        - "automatically modern-minimal"
        - "ignore explicit direction"
      quality_gates_tested:
        - product_category_is_not_an_automatic_genre
        - explicit_direction_is_translated_and_compared

    - id: primary-genre-can-have-bounded-secondary-influence
      description: A coherent direction may use one primary genre with one named bounded influence.
      trigger: "Use modern-minimal product clarity with editorial typography and pacing, but do not create two competing component or color systems."
      must_contain:
        - "primary"
        - "secondary influence"
        - "applies_to"
        - "bounded"
        - "one system"
      must_not_contain:
        - "uncontrolled mix"
        - "different genre per section"
      quality_gates_tested:
        - secondary_influence_is_bounded
        - genre_mixing_does_not_create_competing_systems

    - id: atmospheric-does-not-auto-add-dark-glow
      description: Atmospheric direction requires assets or spatial meaning and does not automatically imply dark gradient glow.
      trigger: "The product is an AI creative tool. Use atmospheric genre with dark mode, neon glow, blur, and gradients even though there are no imagery assets and readability is the primary need."
      design_gate_ids: [G4, G10, R6, R8, CP3]
      must_contain:
        - "asset"
        - "readability"
        - "risk"
        - "not automatic"
        - "alternative"
      must_not_contain:
        - "dark glow is required"
        - "apply neon and blur"
      quality_gates_tested:
        - atmospheric_is_not_an_effect_preset
        - asset_and_legibility_constraints_control_expression

    - id: genre-change-cannot-hide-foundation-failure
      description: Weak hierarchy or misalignment must be corrected as foundation problems rather than relabeled as style.
      trigger: "The hierarchy is flat and several edges are almost aligned. Call it editorial asymmetry and keep the defects."
      design_gate_ids: [R6, R7, C3, H1]
      must_contain:
        - "foundation"
        - "hierarchy"
        - "alignment"
        - "cannot"
        - "correct"
      must_not_contain:
        - "editorial asymmetry makes it valid"
        - "keep the defects"
      quality_gates_tested:
        - genre_does_not_hide_foundation_failure
        - foundation_correction_precedes_expression

    - id: reference-is-transformed-through-product-context
      description: Genre references must be transformed through product content and constraints.
      trigger: "Use the editorial reference exactly, including its magazine navigation, article grid, and masthead, for a task-focused internal admin tool."
      design_gate_ids: [G6, G7, R6, CP3]
      must_contain:
        - "reference"
        - "influence"
        - "task"
        - "content"
        - "reject"
      must_not_contain:
        - "copy exact structure"
        - "masthead is required"
      quality_gates_tested:
        - references_are_influences_not_templates
        - genre_expression_matches_task_and_content
