skill_test:
  skill: motion-design
  version: "1.0.1"
  description: Verify motion-design exposes and applies its core contract interface.

  cases:
    - id: motion-purpose-duration-and-reduction
      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.
      trigger: "Apply motion-design to a realistic change and report the contract-backed decision."
      must_contain:
        - "every_animation_has_user_signal_purpose"
        - "hover_transitions_200ms_or_less"
        - "gpu_only_transform_and_opacity"
        - "prefers_reduced_motion_media_query_present"
      must_not_contain:
        - "decorative motion needs no user purpose"
      quality_gates_tested:
        - every_animation_has_user_signal_purpose
        - hover_transitions_200ms_or_less
        - gpu_only_transform_and_opacity
        - prefers_reduced_motion_media_query_present
