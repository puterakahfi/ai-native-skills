skill_test:
  skill: role-switcher
  version: "1.5.0"
  description: Verify role composition separates ownership and reviewers, then requires observable evidence for every activated role.

  cases:
    - id: chatgpt-app-product-from-zero-composition
      description: A ChatGPT App product from zero keeps product ownership while loading the platform and architecture specialists.
      trigger: "Compose roles untuk membangun produk ChatGPT App dari nol dengan Apps SDK, MCP tools, widget, auth, dan native image generation milik user."
      must_contain:
        - "product-manager"
        - "chatgpt-app-development"
        - "native-ai-engineer"
        - "master-design"
        - "master-engineer"
        - "security-review"
      must_not_contain:
        - "chatgpt-app-development as owner"
        - "all skills"
        - "prompt-engineer as product owner"
      quality_gates_tested:
        - one_lifecycle_owner
        - platform_specialist_boundary
        - architecture_and_design_coverage
        - reviewer_coverage

    - id: existing-product-chatgpt-adapter-composition
      description: Existing-product integration uses engineering ownership plus product authority and the ChatGPT platform specialist.
      trigger: "Produk sudah ada. Tambahkan MCP/Apps SDK adapter dan widget ChatGPT tanpa mengubah domain core. Compose role yang benar."
      must_contain:
        - "master-engineer"
        - "product-manager"
        - "chatgpt-app-development"
        - "native-ai-engineer"
        - "architecture-review"
      must_not_contain:
        - "chatgpt-app-development as owner"
        - "new product lifecycle"
      quality_gates_tested:
        - existing_feature_owner_preserved
        - product_authority_separated
        - platform_specialist_boundary

    - id: mobile-tabs-composition
      description: Cross-device component acceptance needs a design owner, adaptive specialist, and facade reviewer.
      trigger: "Tentukan apakah tabs category ini cocok untuk mobile, tablet, dan desktop lalu review implementasinya."
      design_gate_ids: [I4, G13, G14]
      must_contain:
        - "master-design"
        - "adaptive-component-design"
        - "design-review"
        - "built-in interactive"
      must_not_contain:
        - "adaptive-component-design as owner"
        - "all skills"
      quality_gates_tested:
        - one_owner
        - specialist_boundary
        - reviewer_facade_present
        - canonical_gate_identity

    - id: logo-review-composition
      description: Identity-system acceptance uses the installed brand identity adapter in addition to the facade.
      trigger: "Review logo dan identity system ini untuk memastikan siap dipakai sebagai brand utama. brand-identity-review tersedia."
      design_gate_ids: [BI1, BI2, BI5, BI7, BI11, BI16]
      must_contain:
        - "design-review"
        - "brand-identity-review"
        - "ADAPTER_COVERED"
        - "BI"
      must_not_contain:
        - "built-in interactive strategy"
        - "master-design is automatically the identity expert"
        - "LIMITED REVIEW"
      quality_gates_tested:
        - facade_not_domain_expert
        - specialized_domain_reviewer_required
        - installed_adapter_selected
        - canonical_gate_identity

    - id: missing-logo-reviewer-falls-back-to-limited
      description: Identity acceptance remains limited when the required adapter is unavailable.
      trigger: "Review identity system ini, tetapi brand-identity-review tidak terpasang di runtime."
      must_contain:
        - "LIMITED REVIEW"
        - "brand-identity-review"
        - "install"
      must_not_contain:
        - "built-in interactive"
        - "ADAPTER_COVERED"
      quality_gates_tested:
        - missing_reviewer_limits_verdict
        - specialized_domain_never_falls_back_to_ui_gates

    - id: static-poster-composition
      description: Static marketing review uses the design owner, relevant visual specialists, and built-in static reviewer.
      trigger: "Buat role composition untuk audit poster jualan dengan fokus harga, produk, hierarchy, dan final export."
      design_gate_ids: [SV5, SV9, SV11, SV17, RI1]
      must_contain:
        - "master-design"
        - "design-review"
        - "built-in static"
        - "visual-communication"
      must_not_contain:
        - "RI1"
        - "keyboard reviewer"
      quality_gates_tested:
        - static_domain_composition
        - interactive_reviewer_not_selected
        - canonical_gate_identity

    - id: explicit-role-activation-and-lens-structure
      description: Role composition must state activated roles and preserve distinct lenses before synthesis.
      trigger: "Analyze a cross-domain request using multiple roles, but make ownership and each contribution explicit."
      must_contain:
        - "detected_intent"
        - "role_composition"
        - "analysis_with_multi_lens"
        - "agent_must_state_which_roles_were_activated"
      must_not_contain:
        - "silent role activation"
        - "flat undifferentiated report"
      quality_gates_tested:
        - intent_must_be_detected_before_role_selection
        - each_role_must_contribute_a_distinct_lens
        - multi_role_output_must_be_structured_by_lens
        - agent_must_state_which_roles_were_activated

    - id: repository-ui-work-blocked-with-label-only-roles
      description: Naming design, implementation-context, and engineering roles is insufficient when their required outputs are missing.
      trigger: "Redesign an existing repository UI. State master-design, implementation-context-discovery, master-engineer, and design-review as active roles, but no implementation mapping or review evidence has been produced yet."
      must_contain:
        - "role_execution_evidence"
        - "expected_output"
        - "evidence_ref"
        - "NOT_VERIFIED"
        - "BLOCKED"
        - "production_readiness"
      must_not_contain:
        - "roles are listed so production may proceed"
        - "activation statement is sufficient evidence"
        - "PASS"
      quality_gates_tested:
        - role_names_are_not_execution_evidence
        - every_activated_role_has_distinct_output
        - missing_required_role_output_blocks_production
        - owner_synthesis_preserves_role_status
