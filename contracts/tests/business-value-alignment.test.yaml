skill_test:
  skill: business-value-alignment
  version: 1.0.1
  description: Verify business-value-alignment exposes and applies its reviewed product, research, experiment, or decision
    contract interface.
  cases:
  - id: value-analysis-starts-from-request-or-opportunity
    description: Evaluate a feature request before PRD or implementation and issue an evidence-labeled value verdict.
    trigger: Apply business-value-alignment to a realistic product, research, experiment, business-value, or decision task
      and report the contract-backed result.
    must_contain:
    - request_or_opportunity
    - user_value_must_be_explicit_before_solution_recommendation
    - stop_continue_or_experiment_verdict_must_be_explicit
    must_not_contain:
    - start implementation before value analysis
    - treat assumptions as known facts
    quality_gates_tested:
    - user_value_must_be_explicit_before_solution_recommendation
    - stop_continue_or_experiment_verdict_must_be_explicit
  - id: affiliate-program-unknown-demand-routes-experiment-first
    description: A one-time SaaS affiliate opportunity with unknown economics and demand stays evidence-labeled and experiment-first.
    trigger: >
      Saya ingin membuat affiliate program untuk produk creative SaaS sekali bayar.
      Tolong tentukan apakah ide ini layak, bagaimana sebaiknya dimulai, dan apa
      yang perlu diuji sebelum membangun dashboard lengkap.
    must_contain:
    - EXPERIMENT_FIRST
    - user value
    - business value
    - KNOWN
    - ASSUMED
    - UNKNOWN
    - leading
    - lagging
    - guardrail
    must_not_contain:
    - affiliate demand is proven
    - build the complete affiliate dashboard immediately
    - permanent commission is approved
    quality_gates_tested:
    - user_value_must_be_explicit_before_solution_recommendation
    - business_value_must_map_to_measurable_metric_or_learning_goal
    - metrics_must_distinguish_leading_lagging_and_guardrail_signals
    - value_claims_must_be_evidence_labeled_as_known_assumed_or_unknown
    - stop_continue_or_experiment_verdict_must_be_explicit
    - experiment_first_verdict_must_name_riskiest_assumption
