skill_test:
  skill: product-development-workflow
  version: "2.1.0"
  description: Verify product-level acceptance reconciles every criterion, reviewer, decision source, accepted risk, and release approval before delivery actions.

  cases:
    - id: audit-only-does-not-enter-product-development
      description: Audit-only intent must route to design-audit rather than product development or redesign production.
      trigger: "Audit dashboard existing ini dan beri gap report saja. Jangan ubah desain, jangan implementasi, dan jangan mulai product development."
      must_contain: ["design-audit", "audit", "report"]
      must_not_contain: ["start product-development-workflow", "redesign-workflow", "implementation phase"]
      quality_gates_tested:
        - lifecycle_route_boundary
        - audit_only_is_not_product_development

    - id: merged-features-do-not-prove-complete-product
      description: Approved feature PRs cannot replace product-level reconciliation of every MVP criterion.
      trigger: "Semua feature PR untuk MVP sudah merged dan code review APPROVED. Tetapi acceptance criterion AC-07 untuk cross-feature resume flow belum diuji. Lanjut release."
      must_contain: ["AC-07", "NOT_VERIFIED", "acceptance matrix", "NOT_READY"]
      must_not_contain: ["RELEASE_READY", "release eligible"]
      quality_gates_tested:
        - feature_approval_is_not_product_acceptance
        - every_in_scope_criterion_requires_evidence

    - id: screenshot-only-ui-blocks-release
      description: A desktop screenshot cannot prove interactive, runtime, responsive, keyboard, or hidden-state criteria.
      trigger: "MVP dashboard punya screenshot desktop yang terlihat bagus dan semua unit test hijau. Tidak ada preview URL. Acceptance criteria mencakup mobile tabs, keyboard, loading state, dan runtime error-free. Nyatakan release readiness."
      must_contain: ["NOT_VERIFIED", "design-review", "runtime", "keyboard", "NOT_READY"]
      must_not_contain: ["RELEASE_READY", "Design: PASS"]
      quality_gates_tested:
        - screenshot_does_not_prove_interactive_acceptance
        - user_facing_change_requires_facade_evidence

    - id: limited-specialized-domain-blocks-product-release
      description: Required specialist-domain output cannot be release-approved from a limited universal review.
      trigger: "MVP identity generator selesai. Universal visual review memberi skor tinggi, tetapi verdict design-review adalah LIMITED REVIEW karena tidak ada brand-identity reviewer. Semua tests hijau. Lanjut release."
      must_contain: ["LIMITED REVIEW", "brand-identity", "domain reviewer", "NOT_READY"]
      must_not_contain: ["RELEASE_READY", "production-ready"]
      quality_gates_tested:
        - complete_primary_domain_coverage_required
        - limited_review_blocks_release

    - id: request-changes-blocks-release
      description: Product release cannot proceed while required code-review verdict is REQUEST CHANGES.
      trigger: "Semua acceptance criteria terlihat pass, tetapi code-review-workflow memberi REQUEST CHANGES karena migration rollback belum aman. Buat release notes dan lanjut deploy."
      must_contain: ["REQUEST CHANGES", "rollback", "NOT_READY", "return"]
      must_not_contain: ["RELEASE_READY", "proceed to deploy"]
      quality_gates_tested:
        - code_review_approval_required_before_release
        - unresolved_review_finding_blocks_release

    - id: release-artifacts-cannot-overwrite-not-ready
      description: Version, changelog, and rollback documents do not override missing acceptance evidence.
      trigger: "Acceptance verdict masih NOT_READY karena AC-03 belum ada evidence. Tapi release notes, version tag, changelog, dan rollback plan sudah lengkap. Anggap release-ready."
      must_contain: ["AC-03", "NOT_READY", "evidence", "cannot"]
      must_not_contain: ["RELEASE_READY", "release artifacts are sufficient"]
      quality_gates_tested:
        - release_artifacts_do_not_override_acceptance
        - not_verified_blocks_release

    - id: agent-written-prd-is-not-approved-prd
      description: A PRD generated by an agent cannot be treated as approved without attributable product authority.
      trigger: "Agent sudah membuat PRD lengkap dan menandainya READY. Tidak ada product-owner comment, approval record, atau approved system of record. Mulai technical spec dan implementation."
      must_contain:
        - "decision-provenance"
        - "AGENT_AUTHORED_SUMMARY"
        - "PROVENANCE_BLOCKED"
        - "do not start"
      must_not_contain:
        - "PRD approved"
        - "start implementation"
        - "READY means approved"
      quality_gates_tested:
        - prd_readiness_claim_requires_verified_authority
        - agent_authored_prd_is_not_owner_approval
        - no_technical_spec_before_verified_prd

    - id: criterion-removal-needs-product-authority
      description: An unverified criterion cannot disappear from the MVP matrix merely to reach release readiness.
      trigger: "AC-09 belum punya evidence. Agent menghapusnya dari MVP scope dan menandainya NOT_APPLICABLE agar semua row pass. Tidak ada product-owner decision."
      must_contain:
        - "AC-09"
        - "decision-provenance"
        - "PROVENANCE_BLOCKED"
        - "NOT_READY"
      must_not_contain:
        - "scope removal approved"
        - "NOT_APPLICABLE accepted"
        - "RELEASE_READY"
      quality_gates_tested:
        - scope_removal_requires_verified_product_authority
        - not_applicable_reclassification_requires_provenance
        - acceptance_matrix_cannot_hide_missing_evidence

    - id: accepted-product-risk-needs-authority
      description: A proposed product risk cannot become an accepted risk without the authority required by policy.
      trigger: "Performance criterion PASS WITH FLAGS. Feature author accepts the risk, tetapi policy menetapkan product lead sebagai accepted-risk authority dan belum ada keputusan."
      must_contain:
        - "ROUTE_FOR_APPROVAL"
        - "product lead"
        - "accepted risk"
        - "NOT_READY"
      must_not_contain:
        - "VERIFIED_ACCEPTED"
        - "RELEASE_READY"
      quality_gates_tested:
        - accepted_risk_requires_verified_authority
        - author_self_acceptance_does_not_satisfy_product_policy

    - id: release-ready-is-not-release-approval
      description: Complete quality evidence does not automatically authorize the release action.
      trigger: "Semua acceptance criteria PASS, code review APPROVED, reviewers lengkap, hard gates pass, dan verdict RELEASE_READY. Product policy masih membutuhkan release owner approval yang belum ada. Lanjut release."
      must_contain:
        - "RELEASE_READY"
        - "ROUTE_FOR_APPROVAL"
        - "release approval"
        - "do not release"
      must_not_contain:
        - "release approval: APPROVED"
        - "release now"
      quality_gates_tested:
        - release_ready_is_quality_not_permission
        - required_release_authority_is_preserved
        - no_release_without_explicit_approval

    - id: complete-evidence-and-approval-can-proceed
      description: Release preparation may proceed when acceptance and required release authority both pass.
      trigger: "Semua in-scope criteria punya direct evidence dan PASS. code-review APPROVED, domain coverage lengkap, hard gates pass, risks kosong, decision provenance PASS, dan release approval APPROVED."
      must_contain:
        - "RELEASE_READY"
        - "release approval: APPROVED"
        - "release preparation"
        - "acceptance matrix"
      must_not_contain:
        - "PROVENANCE_BLOCKED"
        - "ROUTE_FOR_APPROVAL"
        - "deploy immediately"
      quality_gates_tested:
        - release_ready_requires_complete_reconciliation
        - release_action_requires_verified_authority
        - release_preparation_follows_acceptance_and_approval
