skill_test:
  skill: ux-psychology
  version: 1.0.1
  description: Verify the adapter exposes and applies its reviewed core interface.
  cases:
  - id: ux-findings-name-principles-and-actionable-friction
    description: Protect the reviewed core interface and its executable interpretation.
    trigger: Analyze a core product flow for cognitive and behavioral friction.
    must_contain:
    - no_vague_feedback_like_confusing_or_overwhelming
    - cognitive_load_report
    - habit_loop_analysis
    - heuristic_violation_list
    - behavioral_friction_map
    - improvement_recommendations
    - ui_or_flow_to_analyze
    must_not_contain:
    - the interface is confusing and overwhelming
    quality_gates_tested:
    - no_vague_feedback_like_confusing_or_overwhelming
