skill_test:
  skill: design-refinement
  version: 2.2.1
  description: Verify refinement requires covered findings, explicit locks and budget, correct design and implementation-context diagnosis, preservation evidence, and focused architecture/design acceptance.
  cases:
  - id: limited-identity-review-cannot-complete-refinement
    description: A limited universal review cannot authorize complete identity-system refinement.
    trigger: Review sebelumnya memberi LIMITED REVIEW untuk logo identity karena tidak ada identity reviewer. Sekarang perbaiki gate yang ada dan nyatakan identity system selesai.
    must_contain:
    - LIMITED REVIEW
    - domain specialist
    - cannot
    must_not_contain:
    - REFINEMENT COMPLETE
    - identity system passed
    quality_gates_tested:
    - primary_domain_coverage_and_governing_reviewers_must_be_sufficient
    - limited_review_cannot_certify_specialist_fix

  - id: static-poster-fix-uses-static-evidence
    description: A static visual refinement must not use browser-only validation as universal proof.
    trigger: Refine poster ini, pertahankan logo dan hierarchy, lalu verifikasi hasil final.
    must_contain:
    - static
    - preserve
    - evidence
    must_not_contain:
    - DOM
    - Lighthouse
    quality_gates_tested:
    - validation_must_match_surface_and_artifact_state
    - preservation_locks_must_be_rechecked_after_change
