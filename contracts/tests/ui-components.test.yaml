skill_test:
  skill: ui-components
  version: "1.1.0"
  description: Verify ui-components selects a fitting pattern from brief and content evidence before copying a template.

  cases:
    - id: pattern-selection-precedes-template-copy
      description: Component selection must use the decision tree and content volume before a template is copied.
      trigger: "Choose a hero component for a page with a short headline, long supporting proof, and several actions, then select the implementation template."
      must_contain:
        - "brief_signals"
        - "content_inventory"
        - "pattern_selected_from_decision_tree_not_arbitrary"
        - "hero_pattern_matches_content_volume"
      must_not_contain:
        - "copy the first template before selecting a pattern"
      sequence_required:
        - pattern: "pattern_selected_from_decision_tree_not_arbitrary"
          must_come_before: "copy the chosen template verbatim"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume
