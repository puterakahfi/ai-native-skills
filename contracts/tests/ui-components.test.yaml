skill_test:
  skill: ui-components
  version: "1.4.0"
  description: Verify ui-components selects a fitting capability, classifies hierarchy, routes shared organisms/templates through component-family-design, then maps repository components, variants, registry options, typography roles, and semantic-native eligibility.

  cases:
    - id: pattern-selection-precedes-implementation-mapping
      description: Component selection must use the decision tree and content volume before repository implementation choices are made.
      trigger: "Choose a hero for a page with a short headline, long supporting proof, and several actions, then select the repository implementation approach."
      must_contain:
        - "brief_signals"
        - "content_inventory"
        - "pattern_selected_from_decision_tree_not_arbitrary"
        - "hero_pattern_matches_content_volume"
        - "implementation-context-discovery"
      must_not_contain:
        - "copy the first template before selecting a pattern"
      sequence_required:
        - pattern: "pattern_selected_from_decision_tree_not_arbitrary"
          must_come_before: "implementation-context-discovery|implementation context"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume

    - id: shared-organism-routes-through-family-before-repository-mapping
      description: A route-specific navbar request must be classified as an organism and checked against the existing AppHeader family before code mapping.
      trigger: "Create a dedicated AI Skills navbar with different menu items and a mobile Sheet while keeping the application UI consistent."
      must_contain:
        - "component_hierarchy_classification"
        - "organism"
        - "family_requirement"
        - "component-family-design"
        - "invariant_anatomy"
        - "configurable_slots"
        - "implementation-context-discovery"
      must_not_contain:
        - "different menu items automatically require a new navbar family"
        - "create the route-local navbar before checking the family"
      sequence_required:
        - pattern: "hierarchy classification|component_hierarchy_classification"
          must_come_before: "component-family-design"
        - pattern: "component-family-design"
          must_come_before: "implementation-context-discovery"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume

    - id: component-coverage-precedes-template-or-library
      description: A selected UI capability must map through actual repository coverage before code or a new library.
      trigger: "The selected pattern needs a searchable selector. Canonical Input, Popover, Command, variants, form conventions, tokens, and Lucide exist. The proposal copies a generic template and installs another component/icon library."
      must_contain:
        - "implementation-context-discovery"
        - "component capability coverage"
        - "canonical variants"
        - "compose"
        - "typography roles"
        - "rejected alternatives"
        - "architecture-review"
      must_not_contain:
        - "install another component library"
        - "template overrides repository conventions"
        - "new icon family"
      sequence_required:
        - pattern: "pattern|capability"
          must_come_before: "component capability coverage|implementation-context-discovery"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume

    - id: missing-local-component-checks-canonical-registry
      description: An absent local component available from the accepted canonical registry precedes a parallel library or custom primitive.
      trigger: "The pattern requires Dialog. The repository uses a source-component system, Dialog is absent locally, and the configured canonical registry provides a fit Dialog. Choose the implementation handoff."
      must_contain:
        - "canonical registry"
        - "add_canonical_registry_component"
        - "repository-owned"
        - "verification"
      must_not_contain:
        - "install a second component library"
        - "build a div overlay first"
        - "missing locally proves capability gap"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume

    - id: typography-handoff-uses-semantic-roles
      description: Text hierarchy must map to repository roles rather than arbitrary route-local classes.
      trigger: "A pattern needs page title, section title, body, labels, metadata, and code. The repository already has semantic typography roles and representative usage. Produce the handoff."
      must_contain:
        - "typography_handoff"
        - "page_title"
        - "section_title"
        - "body"
        - "label"
        - "metadata"
        - "code"
        - "bounded_extensions"
      must_not_contain:
        - "invent an unrelated local type scale"
        - "font package alone decides"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
        - hero_pattern_matches_content_volume

    - id: semantic-native-structure-remains-eligible
      description: A component library does not require wrappers for semantic structures with no richer product contract.
      trigger: "A documentation section needs headings, a list, links, and simple details/summary. No shared abstraction or additional product state is required. Reject it because every element must use the component library."
      must_contain:
        - "semantic_native"
        - "valid"
        - "no richer shared interaction"
        - "accessibility"
      must_not_contain:
        - "every element must use the component library"
        - "native HTML is always drift"
      quality_gates_tested:
        - pattern_selected_from_decision_tree_not_arbitrary
