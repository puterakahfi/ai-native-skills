skill_test:
  skill: context-engineering
  version: 1.0.1
  description: Verify context-engineering exposes and applies its reviewed context, workflow, profile, or maintenance contract
    interface.
  cases:
  - id: context-artifacts-are-versioned-and-reviewed
    description: Author persistent repository context from an explicit product or repository reference.
    trigger: Apply context-engineering to a realistic context, routing, profile, planning, evaluation, or maintenance task
      and report the contract-backed result.
    must_contain:
    - context_must_be_versioned_and_reviewed
    - agents_md
    - context_pack_template
    - guardrail_rules
    - product_or_repo_ref
    must_not_contain:
    - treat context files as unreviewed scratch notes
    - write vague best-practice rules
    quality_gates_tested:
    - context_must_be_versioned_and_reviewed
