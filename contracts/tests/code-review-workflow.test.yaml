skill_test:
  skill: code-review-workflow
  version: "2.0.0"
  description: Verify code review classifies changed domains, requires rendered evidence for user-facing changes, and maps facade verdicts into merge decisions.

  cases:
    - id: css-change-without-preview-cannot-pass-design
      description: A CSS change that affects rendered output cannot be approved from source-only evidence.
      trigger: "Review PR ini. Perubahannya hanya CSS untuk spacing, tabs overflow, dan responsive layout. CI hijau, tetapi tidak ada preview, screenshot, atau URL yang bisa dijalankan."
      must_contain:
        - "user-facing design"
        - "source-only"
        - "NOT_VERIFIED"
        - "REQUEST CHANGES"
        - "rendered"
      must_not_contain:
        - "Approved to merge: YES"
        - "Design: PASS"
      quality_gates_tested:
        - design_change_required_for_css_output
        - source_only_cannot_approve_rendered_acceptance
        - green_ci_is_not_design_evidence

    - id: screenshot-does-not-prove-runtime-or-keyboard
      description: Screenshot evidence cannot prove runtime, keyboard, overflow interaction, or hidden states.
      trigger: "Review PR dashboard ini untuk merge. Ada screenshot desktop yang terlihat bagus, tetapi tidak ada URL. Author mengklaim keyboard, overflow tabs, loading state, dan console semuanya aman."
      design_gate_ids: [RI1, I4, G17]
      must_contain:
        - "NOT_VERIFIED"
        - "keyboard"
        - "runtime"
        - "screenshot"
        - "REQUEST CHANGES"
      must_not_contain:
        - "Approved to merge: YES"
        - "Runtime: PASS"
      quality_gates_tested:
        - screenshot_does_not_prove_hidden_behavior
        - evidence_gap_blocks_required_acceptance
        - canonical_gate_identity

    - id: specialized-generated-logo-needs-domain-reviewer
      description: Code that generates identity assets cannot receive complete design approval without the required domain reviewer.
      trigger: "Review PR generator logo ini. Output PNG sudah tersedia dan universal composition terlihat rapi, tetapi tidak ada brand-identity reviewer. PR mengklaim identity system production-ready."
      must_contain:
        - "brand-identity"
        - "LIMITED REVIEW"
        - "domain reviewer"
        - "BLOCKED"
      must_not_contain:
        - "Approved to merge: YES"
        - "production-ready: PASS"
      quality_gates_tested:
        - specialized_domain_requires_reviewer
        - limited_review_blocks_complete_domain_claim

    - id: backend-only-change-does-not-force-design-review
      description: A backend-only change should classify design as unaffected rather than inventing UI evidence requirements.
      trigger: "Review PR backend ini. Perubahan hanya menambahkan idempotency pada event consumer dan regression test. Tidak ada file UI, template, asset, atau user-facing output yang berubah."
      must_contain:
        - "User-facing design: none"
        - "Design: N/A"
        - "architecture"
        - "logic"
      must_not_contain:
        - "rendered preview required"
        - "LIMITED REVIEW"
      quality_gates_tested:
        - classify_domains_before_review
        - design_review_only_when_user_facing_output_changes

    - id: facade-needs-work-maps-to-request-changes
      description: A design-review NEEDS WORK verdict must map to request changes rather than a non-blocking flag.
      trigger: "Review PR UI ini. Design-review sudah selesai dengan verdict NEEDS WORK karena I4 tabs overflow gagal pada tablet dan evidence tersedia. Architecture dan tests pass."
      design_gate_ids: [I4]
      must_contain:
        - "NEEDS WORK"
        - "REQUEST CHANGES"
        - "I4"
        - "tablet"
      must_not_contain:
        - "Approved to merge: YES"
        - "I4: non-blocking"
        - "Design: PASS WITH FLAGS"
      quality_gates_tested:
        - facade_verdict_merge_mapping
        - needs_work_blocks_approval
        - canonical_gate_identity
