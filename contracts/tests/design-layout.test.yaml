skill_test:
  skill: design-layout
  version: "1.2.0"
  description: Verify the layout port routes spatial decisions through macrostructure, component structure, component-family composition, adaptive selection, and responsive validation.

  cases:
    - id: canonical-layout-port-order
      description: A layout decision selects page structure and component structure, resolves the shared family, chooses the adaptive strategy, and validates responsive mechanics last.
      trigger: "Design this product page across mobile, tablet, and desktop. Decide the page shape, component structure, shared header family, variants, and responsive behavior."
      must_contain:
        - "macrostructures"
        - "ui-components"
        - "component-family-design"
        - "adaptive-component-design"
        - "responsiveness"
      must_not_contain:
        - "responsiveness before adaptive-component-design"
        - "breakpoints decide the component"
      sequence_required:
        - pattern: "macrostructures"
          must_come_before: "ui-components"
        - pattern: "ui-components"
          must_come_before: "component-family-design"
        - pattern: "component-family-design"
          must_come_before: "adaptive-component-design"
        - pattern: "adaptive-component-design"
          must_come_before: "responsiveness"
      quality_gates_tested:
        - macrostructure_picked_before_component_layout
        - component_adaptation_selected_before_responsive_validation
        - responsiveness_applied_from_start

    - id: component-fitness-before-breakpoint-validation
      description: A component family that fails at an intermediate width is evaluated for adaptation before breakpoint mechanics are changed.
      trigger: "Desktop navigation overlaps on tablet. Decide the family variant and adaptive strategy before changing breakpoint mechanics."
      must_contain:
        - "component-family-design"
        - "adaptive-component-design"
        - "component fitness"
        - "responsiveness"
        - "after component selection"
      must_not_contain:
        - "shrink first"
        - "breakpoint alone decides"
      sequence_required:
        - pattern: "component-family-design"
          must_come_before: "adaptive-component-design"
        - pattern: "adaptive-component-design"
          must_come_before: "responsiveness"
      quality_gates_tested:
        - component_adaptation_selected_before_responsive_validation
        - mobile_tablet_desktop_behavior_defined_for_major_components
