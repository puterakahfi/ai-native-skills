skill_test:
  skill: design-review
  version: "3.3.0"
  description: Verify facade domain routing, evidence honesty, canonical gate identity, specialist coverage, and component findings that distinguish pattern fitness from local implementation defects.

  cases:
    - id: screenshot-dashboard-runtime-not-verified
      description: A dashboard screenshot cannot prove runtime or keyboard behavior.
      trigger: "Review screenshot dashboard ini untuk kesiapan rilis. Saya hanya memberikan screenshot, tidak ada URL atau source code."
      design_gate_ids: [RI1]
      must_contain:
        - "digital-interface"
        - "NOT_VERIFIED"
        - "runtime"
        - "coverage"
      must_not_contain:
        - "Runtime Integrity: PASS"
        - "RI1: 10"
        - "release-ready"
      quality_gates_tested:
        - classify_before_gates
        - screenshot_does_not_prove_runtime
        - evidence_before_score
        - every_reported_gate_id_must_be_registered

    - id: static-commercial-wrong-price-hard-fail
      description: Incorrect mandatory commercial content must fail the static content-fidelity hard gate.
      trigger: "Review poster jualan ini. Harga yang wajib adalah Rp2.000.000, tetapi teks pada desain tertulis Rp20.000.000."
      design_gate_ids: [SV11]
      must_contain:
        - "visual-communication"
        - "SV11"
        - "CRITICAL"
        - "Rp2.000.000"
      must_not_contain:
        - "verdict: PASS"
        - "minor issue"
      quality_gates_tested:
        - static_content_accuracy_hard_gate
        - required_fact_fidelity
        - canonical_gate_identity

    - id: logo-without-domain-reviewer-is-limited
      description: Universal visual gates cannot certify a complete logo identity system when the adapter is unavailable.
      trigger: "Review apakah konsep logo dan identity system ini sudah production-ready. Brand-identity-review tidak tersedia pada runtime ini."
      must_contain:
        - "brand-identity"
        - "LIMITED REVIEW"
        - "domain reviewer"
        - "scope"
      must_not_contain:
        - "full-domain PASS"
        - "production_ready: true"
      quality_gates_tested:
        - unsupported_domain_requires_reviewer
        - limited_review_verdict_ceiling

    - id: logo-with-domain-reviewer-is-adapter-covered
      description: Loading brand-identity-review changes primary-domain coverage from limited to adapter-covered.
      trigger: "Review identity system ini dengan brand-identity-review. Brand brief, vector masters, variants, minimum-size tests, monochrome, inverse, lockups, applications, dan comparison set tersedia."
      design_gate_ids: [BI1, BI2, BI5, BI7, BI8, BI10, BI11, BI15, BI16]
      must_contain:
        - "brand-identity-review"
        - "ADAPTER_COVERED"
        - "BI1"
        - "BI16"
      must_not_contain:
        - "LIMITED REVIEW"
        - "built-in interactive"
      quality_gates_tested:
        - external_domain_reviewer_loading
        - adapter_coverage_changes_verdict_ceiling
        - canonical_gate_identity

    - id: presentation-selects-presentation-strategy
      description: Presentation review must use presentation-domain gates instead of interactive gates.
      trigger: "Review deck presentasi ini untuk dipakai screen sharing. Fokus pada alur cerita, keterbacaan data, dan konsistensi slide."
      design_gate_ids: [PR1, PR2, PR3, RI1]
      must_contain:
        - "presentation"
        - "PR1"
        - "PR2"
        - "PR3"
      must_not_contain:
        - "evaluate RI1"
        - "touch target"
      quality_gates_tested:
        - presentation_domain_routing
        - interactive_gates_not_applied_to_static_deck
        - canonical_gate_identity

    - id: rail-missing-left-control-is-implementation-defect
      description: A fit category rail with stale directional controls should be diagnosed as an implementation defect.
      trigger: "Review category navigation. Primary discovery rail is appropriate and swipe works, but it always shows only the right chevron, including after scrolling to the middle and end."
      design_gate_ids: [I4, G13, G14]
      must_contain:
        - "IMPLEMENTATION_DEFECT"
        - "actual scroll"
        - "left control"
        - "local implementation owner"
        - "adjacent regression gates"
      must_not_contain:
        - "diagnosis: PATTERN_MISMATCH"
        - "selected_strategy: substitute to Select"
      quality_gates_tested:
        - component_finding_has_diagnosis
        - correction_owner_matches_defect_class
        - directional_affordance_uses_real_scroll_state

    - id: dynamic-options-are-pattern-mismatch
      description: Numerous dynamic searchable options forced into tabs should be diagnosed as a pattern mismatch.
      trigger: "Review filter component with 30 dynamic searchable options and long labels. It is implemented as one-line tabs and overflows at multiple widths."
      design_gate_ids: [I4]
      must_contain:
        - "PATTERN_MISMATCH"
        - "content contract"
        - "adaptive-component-design"
        - "substitution boundary"
        - "shared state"
      must_not_contain:
        - "just add chevrons"
        - "shrink typography"
      quality_gates_tested:
        - component_finding_has_diagnosis
        - pattern_mismatch_routes_to_adaptive_component_design
        - realistic_content_pressure_is_considered

    - id: focused-refinement-handoff-protects-passing-regions
      description: A component finding routed to refinement must include target, preserve, regression, and evidence contracts.
      trigger: "Review hanya finding I4 pada tablet category navigation. Hero, cards, typography, and desktop behavior currently pass and must remain stable."
      design_gate_ids: [I4]
      must_contain:
        - "refinement_handoff"
        - "target_regions"
        - "preserved_regions"
        - "preserved_component_contracts"
        - "required_evidence"
      must_not_contain:
        - "make it better"
        - "full redesign"
      quality_gates_tested:
        - focused_handoff_is_precise_enough_for_refinement_lock
        - passing_regions_are_preserved
