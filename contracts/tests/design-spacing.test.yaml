skill_test:
  skill: design-spacing
  version: "1.0.1"
  description: Verify design-spacing exposes and applies its core contract interface.

  cases:
    - id: spacing-rhythm-and-ma-gates
      description: A known conformance gap must be handled through explicit inputs, outputs, and blocking gates.
      trigger: "Apply design-spacing to a realistic change and report the contract-backed decision."
      must_contain:
        - "rhythm_consistent_across_sections"
        - "ma_intentional_not_accidental"
        - "more_space_above_headings_than_below"
        - "no_min_height_100vh"
      must_not_contain:
        - "default padding creates breathing room automatically"
      quality_gates_tested:
        - rhythm_consistent_across_sections
        - ma_intentional_not_accidental
        - more_space_above_headings_than_below
        - no_min_height_100vh
