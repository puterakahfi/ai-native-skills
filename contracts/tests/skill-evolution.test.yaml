skill_test:
  skill: skill-evolution
  version: 1.0.3
  description: Verify skill-evolution exposes and applies its reviewed context, workflow, profile, or maintenance contract
    interface.
  cases:
  - id: transferable-rule-needs-multiple-contexts-and-counterexamples
    description: Evaluate whether a verified fix should become reusable shared behavior.
    trigger: Apply skill-evolution to a realistic context, routing, profile, planning, evaluation, or maintenance task and
      report the contract-backed result.
    must_contain:
    - transferable_rule_is_validated_against_multiple_contexts_and_counterexamples
    - generalization_report
    - target_layer_decision
    - minimal_patch_plan
    - promotion_verdict
    - promotion_commit
    must_not_contain:
    - promote one anecdote as universal
    - skip counterexample testing
    quality_gates_tested:
    - transferable_rule_is_validated_against_multiple_contexts_and_counterexamples
