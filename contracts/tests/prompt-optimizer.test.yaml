skill_test:
  skill: prompt-optimizer
  version: 1.0.1
  description: Verify prompt-optimizer exposes and applies its reviewed context, workflow, profile, or maintenance contract
    interface.
  cases:
  - id: optimized-prompt-exposes-scope-constraints-and-stop
    description: Transform raw intent into a bounded prompt with measurable completion.
    trigger: Apply prompt-optimizer to a realistic context, routing, profile, planning, evaluation, or maintenance task and
      report the contract-backed result.
    must_contain:
    - scope_declaration
    - constraint_list
    - token_estimate
    - raw_intent
    - optimized_prompt_must_have_explicit_scope_in_and_out
    - constraint_list_must_be_present
    - optimized_prompt_must_have_stop_condition
    must_not_contain:
    - make it better
    - leave scope implicit
    quality_gates_tested:
    - optimized_prompt_must_have_explicit_scope_in_and_out
    - constraint_list_must_be_present
    - optimized_prompt_must_have_stop_condition
