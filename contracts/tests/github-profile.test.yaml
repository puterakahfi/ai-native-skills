skill_test:
  skill: github-profile
  version: "1.4.0"
  description: Verify proof-first, brand-aligned GitHub profile generation, variant expression, profile-surface orchestration, repository curation, and enhancement governance.

  cases:
    - id: backend-engineer-proof-before-badges
      description: Technical profiles lead with positioning and selected work rather than a technology badge wall.
      trigger: "Buatkan GitHub Profile README untuk backend engineer yang fokus pada Go, PHP, DDD, ports-and-adapters, Docker, dan AI-native engineering. Tujuannya agar calon collaborator cepat memahami kemampuan dan project utamanya."
      must_contain:
        - "Selected work|Selected projects|Project|Karya pilihan|Proyek pilihan"
        - "Role|Contribution|Outcome|Peran|Kontribusi|Hasil"
      must_contain_one_of:
        - "AI-native"
        - "DDD"
        - "ports and adapters|ports-and-adapters"
      must_not_contain:
        - "passionate developer"
        - "visitor counter"
        - "trophy wall"
      sequence_required:
        - pattern: "backend|engineer|AI-native|arsitektur"
          must_come_before: "badge|technology|tech stack|tools"
      quality_gates_tested:
        - positioning_before_decoration
        - proof_before_badges
        - project_context

    - id: founder-profile-uses-product-narrative
      description: Founder profiles use a product narrative instead of a generic engineer template.
      trigger: "Saya founder sekaligus software engineer. Buat GitHub Profile README yang menonjolkan produk yang saya bangun, cara saya berpikir tentang product engineering, dan peluang kolaborasi. Jangan jadikan CV panjang."
      must_contain:
        - "product|produk"
        - "collaborat|kolaborasi|contact|kontak"
      must_contain_one_of:
        - "who it serves|untuk siapa|audience|pengguna"
        - "problem|masalah"
        - "outcome|hasil|current stage|tahap"
      must_not_contain:
        - "Curriculum Vitae"
        - "complete employment history"
        - "passionate developer"
      quality_gates_tested:
        - goal_specific_narrative
        - product_proof
        - bounded_content_density

    - id: username-only-does-not-invent-biography
      description: Missing information produces explicit gaps rather than fabricated biography.
      trigger: "Generate GitHub profile yang keren untuk username contoh-user. Saya belum kasih bio, project pilihan, posisi kerja, atau metric apa pun."
      must_contain:
        - "missing|gap|belum|dibutuhkan|NOT_VERIFIED|tidak terverifikasi"
        - "project|proyek|evidence|bukti"
      must_contain_one_of:
        - "tidak mengarang|jangan mengarang|tidak akan mengarang"
        - "verified|terverifikasi"
        - "placeholder"
      must_not_contain:
        - "worked at Google"
        - "10+ years"
        - "millions of users"
      quality_gates_tested:
        - no_fabricated_identity
        - explicit_content_gaps
        - evidence_provenance

    - id: redesign-preserves-equity-and-renders
      description: Redesign preserves verified equity, removes clutter selectively, and requires rendered review.
      trigger: "Redesign GitHub Profile README saya. Sekarang ada banner personal brand yang masih dipakai, tiga project utama, banyak badge, dua stats card, trophy, dan contribution snake. Pertahankan identitas brand dan project penting, tetapi bikin lebih premium dan rapi."
      must_contain:
        - "preserve|pertahankan"
        - "project|proyek"
        - "render|preview|screenshot"
      must_contain_one_of:
        - "design-review"
        - "rendered-static"
        - "LIMITED REVIEW"
      must_not_contain:
        - "hapus semuanya"
        - "replace everything"
        - "keep all widgets"
      sequence_required:
        - pattern: "preserve|pertahankan|inventory|inventaris"
          must_come_before: "generate|produce|README|patch"
      quality_gates_tested:
        - preservation_before_redesign
        - restrained_widget_selection
        - rendered_verification

    - id: explicit-clutter-request-is-reframed
      description: The skill refuses to blindly produce a wall of popular widgets.
      trigger: "Buat GitHub profile yang super ramai: semua logo teknologi, semua badge, visitor counter, trophy, stats, streak, contribution snake, typing animation, GIF, dan banyak warna supaya kelihatan keren."
      must_contain:
        - "hierarchy|hierarki|fokus"
        - "project|proyek|proof|bukti"
      must_contain_one_of:
        - "restrained|terbatas|selektif|minimal"
        - "badge wall|widget wall|terlalu ramai|clutter"
      must_not_contain:
        - "include every widget"
        - "semua widget akan dipasang"
        - "more colors is better"
      quality_gates_tested:
        - anti_clutter
        - visual_restraint
        - graceful_degradation

    - id: clean-but-anonymous-needs-differentiation
      description: Clean documentation still fails when identity and module treatment are generic.
      trigger: "README profilnya sudah bersih dan informasinya benar, tapi hasil render masih terasa seperti dokumentasi biasa: hero generik, semua section heading plus paragraf, project tidak terasa seperti showcase, dan personal brand belum memorable. Refine tanpa menambah badge wall atau widget ramai."
      must_contain:
        - "thesis|tesis|distinctive|differentiation|identitas|memorable"
        - "project|proyek|proof module|proof block|showcase"
      must_contain_one_of:
        - "merge|gabungkan|overlap|tumpang tindih"
        - "visual weight|bobot visual|contrast|kontras"
        - "editorial rhythm|ritme editorial"
      must_not_contain:
        - "add more badges"
        - "tambahkan semua widget"
        - "source is valid so no changes are needed"
      quality_gates_tested:
        - recognizable_identity
        - differentiated_module_treatment
        - non_repetitive_section_hierarchy

    - id: established-zen-brand-rejects-cardification-and-dead-space
      description: Zen brands preserve hierarchy and rhythm without cards or maximum emptiness.
      trigger: "Redesign GitHub profile ini supaya aligned dengan personal site saya. Brand-nya zen, calm editorial, more space, dan no lines. Jangan pakai cards atau blockquote. Hasil sebelumnya cuma memperbesar whitespace sampai kontennya kecil dan tercerai."
      must_contain:
        - "brand|preservation lock|brand grammar|brand lock"
        - "hierarchy|grouping|rhythm|balance|legibility|foundation"
      must_contain_one_of:
        - "purposeful whitespace|intentional whitespace|Ma|ruang yang bermakna"
        - "within-group|between-group|proximity|kedekatan"
        - "page anchor|section parent|item|metadata"
      must_not_contain:
        - "add cards for every project"
        - "more whitespace always means more zen"
        - "use the same large gap everywhere"
      quality_gates_tested:
        - brand_preservation_before_genre
        - foundation_before_expression
        - purposeful_spatial_rhythm

    - id: explicit-three-variant-request-preserves-one-fact-set
      description: Minimalist, modern, and creative variants preserve the same facts and proof strength.
      trigger: "Buat tiga varian GitHub Profile README dari data yang sama: minimalist, modern professional, dan creative editorial. Jangan ubah project, role, link, atau claim antar-varian."
      must_contain:
        - "zen-minimalist|minimalist"
        - "modern-professional|modern professional"
        - "creative-editorial|creative editorial"
        - "same facts|fact set|verified facts|fakta yang sama"
      must_contain_one_of:
        - "variant axes|density|alignment|expression"
        - "hierarchy|rhythm|proof treatment|ritme"
      must_not_contain:
        - "different projects for each variant"
        - "invent extra metrics for the modern version"
        - "creative variant may fabricate assets"
      quality_gates_tested:
        - invariant_fact_set
        - materially_distinct_variants
        - equal_proof_completeness

    - id: modern-professional-is-not-card-dashboard
      description: Modern professional expression comes from hierarchy and proof, not dashboard grammar.
      trigger: "Buat versi modern professional untuk GitHub profile saya. Saya ingin kelihatan current dan profesional, tapi bukan dashboard, bukan card grid, dan bukan stats wall."
      must_contain:
        - "modern-professional|modern professional"
        - "proof|project|proyek|selected work"
      must_contain_one_of:
        - "balanced density|kepadatan seimbang"
        - "crisp hierarchy|hierarki yang jelas"
        - "clear action|CTA|action clarity"
      must_not_contain:
        - "cards everywhere"
        - "gradient hero is required"
        - "GitHub stats are the primary proof"
      quality_gates_tested:
        - modern_without_dashboard_grammar
        - professional_proof_hierarchy
        - bounded_contemporary_expression

    - id: creative-editorial-remains-readable-and-proof-led
      description: Creative expression uses one authored device while preserving proof and readability.
      trigger: "Buat varian creative editorial untuk designer-engineer. Boleh lebih expressive dan memorable, tapi jangan pakai emoji wall, ASCII random, typing animation, atau visual yang bikin project proof hilang."
      must_contain:
        - "creative-editorial|creative editorial"
        - "authored|editorial|expressive device|perangkat ekspresif"
        - "proof|evidence|project|proyek"
      must_contain_one_of:
        - "one coherent|satu perangkat|single device"
        - "narrow width|mobile|responsive"
        - "semantic text|teks semantik"
      must_not_contain:
        - "random ASCII"
        - "emoji wall"
        - "typing animation as identity"
        - "change style every section"
      quality_gates_tested:
        - coherent_creative_device
        - proof_survives_expression
        - readable_creativity

    - id: brand-lock-overrides-variant-default-treatment
      description: Requested variants adapt inside established brand rules.
      trigger: "Pakai varian modern professional, tetapi brand saya zen, no lines, no cards, dan calm editorial. Jangan hilangkan karakter brand hanya karena variannya modern."
      must_contain:
        - "brand lock|brand grammar|preservation lock"
        - "modern-professional|modern professional"
        - "adapt|override|menyesuaikan"
      must_contain_one_of:
        - "proximity|whitespace|spacing"
        - "remove separators|tanpa separator|no lines"
        - "crisp proof hierarchy|hierarki proof"
      must_not_contain:
        - "variant always overrides brand"
        - "modern requires cards"
        - "ignore the no-lines rule"
      quality_gates_tested:
        - brand_precedence_over_variant_defaults
        - variant_adaptation
        - foundation_preservation

    - id: full-profile-scope-audits-more-than-readme
      description: Full profile work inventories README, identity metadata, pins, repositories, contribution context, and destinations.
      trigger: "Audit seluruh GitHub profile saya, bukan README saja. Cek bio, pinned repositories, kualitas repo utama, contribution path, dan link keluar. Jangan tebak data yang tidak tersedia."
      must_contain:
        - "profile-surface|full-profile-ecosystem|scope"
        - "pins|pinned|repository|repo"
        - "NOT_VERIFIED|not verified|tidak terverifikasi"
      must_contain_one_of:
        - "identity metadata|bio|profile metadata"
        - "contribution context|contribution path"
        - "external destinations|link keluar|CTA"
      must_not_contain:
        - "README is the entire profile"
        - "assume the current pins"
        - "all repositories are healthy"
      quality_gates_tested:
        - explicit_scope
        - full_surface_inventory
        - observed_vs_recommended_state

    - id: readme-cannot-hide-weak-pinned-repositories
      description: A polished README does not excuse irrelevant, inaccessible, or contradictory pins.
      trigger: "README saya sudah bagus, tapi pinned repositories masih random dan beberapa tidak sesuai positioning. Review profile secara utuh dan rekomendasikan pin yang lebih tepat."
      must_contain:
        - "pinned|pins|pin set"
        - "proof role|peran bukti|positioning"
        - "README"
      must_contain_one_of:
        - "complementary|komplementer|tidak repetitif"
        - "public proof|publicly accessible|dapat diakses"
        - "NOT_VERIFIED|current pins"
      must_not_contain:
        - "README quality makes pins irrelevant"
        - "pin the six most starred repositories"
        - "fill every pin slot"
      quality_gates_tested:
        - cross_surface_consistency
        - pin_proof_roles
        - bounded_pin_set

    - id: repository-curation-supports-positioning
      description: Pin recommendations map repositories to complementary visitor questions and proof roles.
      trigger: "Pilih repository mana yang sebaiknya dipin untuk positioning AI-native engineer dan product builder. Jangan cuma urutkan berdasarkan stars atau repo terbaru."
      must_contain:
        - "proof role|flagship|public-contract|technical-depth|product-proof"
        - "audience|visitor|positioning"
      must_contain_one_of:
        - "complementarity|complementary|komplementer"
        - "ownership|ownership clarity|kepemilikan"
        - "public readiness|readiness"
      must_not_contain:
        - "highest stars always wins"
        - "newest repository is automatically best"
        - "private repository is public source proof"
      quality_gates_tested:
        - strategic_pin_selection
        - proof_role_complementarity
        - public_evidence_integrity

    - id: archive-recommendation-is-not-automatic
      description: Old or weakly aligned repositories are reviewed before any archive recommendation or mutation.
      trigger: "Profile saya punya banyak repo lama. Arsipkan saja semua yang sudah tua supaya kelihatan bersih."
      must_contain:
        - "archive|arsip"
        - "recommendation|rekomendasi|approval|persetujuan"
        - "README|description|issues|pull requests|links"
      must_contain_one_of:
        - "lifecycle|current|maintenance|experimental|legacy"
        - "age alone|umur saja|bukan karena tua"
        - "write owner|mutation evidence|bukti perubahan"
      must_not_contain:
        - "archive everything old automatically"
        - "repo age is sufficient evidence"
        - "done, all old repositories were archived"
      quality_gates_tested:
        - lifecycle_evidence
        - non_destructive_default
        - explicit_write_approval

    - id: widgets-require-decision-value
      description: Optional enhancements are approved only when their job and risks are explicit.
      trigger: "Tambahkan banner, skill icons, GitHub stats, streak, visitor counter, typing SVG, dan contribution snake. Pilih mana yang benar-benar berguna untuk profile saya."
      must_contain:
        - "decision value|nilai keputusan"
        - "evidence value|nilai bukti"
        - "brand fit|brand"
      must_contain_one_of:
        - "maintenance risk|dependency risk|risiko"
        - "semantic fallback|fallback"
        - "narrow width|mobile|responsive"
      must_not_contain:
        - "approve every enhancement"
        - "visitor counter proves trust"
        - "snake animation is required"
      quality_gates_tested:
        - enhancement_governance
        - graceful_degradation
        - maintenance_awareness

    - id: top-languages-is-not-expertise-proof
      description: Language distribution is not presented as professional expertise without stronger evidence.
      trigger: "Pasang top languages card dan bilang itu bukti bahasa yang paling saya kuasai."
      must_contain:
        - "top languages|language distribution|distribusi bahasa"
        - "not expertise|bukan bukti keahlian|does not prove"
      must_contain_one_of:
        - "repository usage|penggunaan repository"
        - "project proof|contribution|evidence"
        - "caveat|interpretation|interpretasi"
      must_not_contain:
        - "top languages proves mastery"
        - "most used automatically means expert"
        - "language card replaces project proof"
      quality_gates_tested:
        - honest_metric_interpretation
        - expertise_requires_proof
        - anti_vanity_metric

    - id: profile-cta-follows-audience-goal
      description: The profile action changes with hiring, consulting, open-source, founder, or community goals.
      trigger: "Profile ini untuk open-source collaboration, bukan cari kerja. Tentukan CTA dan link yang paling tepat."
      must_contain:
        - "open-source|open source"
        - "contribute|contribution|issue|discussion|sponsor|kolaborasi"
        - "CTA|action|aksi"
      must_contain_one_of:
        - "audience|goal|tujuan"
        - "primary|secondary"
        - "repository|project"
      must_not_contain:
        - "download my resume is always the primary CTA"
        - "same CTA for every goal"
        - "generic connect is sufficient without destination"
      quality_gates_tested:
        - audience_goal_cta_alignment
        - actionable_destination
        - non_generic_conversion_path
