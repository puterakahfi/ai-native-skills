skill_test:
  skill: github-profile
  version: "1.3.0"
  description: Verify proof-first, brand-aligned, foundation-led GitHub Profile README generation and materially distinct variants across personal-brand goals and platform constraints.

  cases:
    - id: backend-engineer-proof-before-badges
      description: A technical profile should lead with positioning and selected work rather than a generic technology badge wall.
      trigger: "Buatkan GitHub Profile README untuk backend engineer yang fokus pada Go, PHP, DDD, ports-and-adapters, Docker, dan AI-native engineering. Tujuannya agar calon collaborator cepat memahami kemampuan dan project utamanya."
      must_contain:
        - "Selected work|Selected projects|Project|Karya pilihan|Proyek pilihan"
        - "Role|Contribution|Outcome|Peran|Kontribusi|Hasil"
      must_contain_one_of:
        - "AI-native"
        - "DDD"
        - "ports and adapters|ports-and-adapters"
      must_not_contain:
        - "passionate developer"
        - "visitor counter"
        - "trophy wall"
      sequence_required:
        - pattern: "backend|engineer|AI-native|arsitektur"
          must_come_before: "badge|technology|tech stack|tools"
      quality_gates_tested:
        - positioning_before_decoration
        - proof_before_badges
        - project_context

    - id: founder-profile-uses-product-narrative
      description: A founder or product builder should not be forced into a generic engineer template.
      trigger: "Saya founder sekaligus software engineer. Buat GitHub Profile README yang menonjolkan produk yang saya bangun, cara saya berpikir tentang product engineering, dan peluang kolaborasi. Jangan jadikan CV panjang."
      must_contain:
        - "product|produk"
        - "collaborat|kolaborasi|contact|kontak"
      must_contain_one_of:
        - "who it serves|untuk siapa|audience|pengguna"
        - "problem|masalah"
        - "outcome|hasil|current stage|tahap"
      must_not_contain:
        - "Curriculum Vitae"
        - "complete employment history"
        - "passionate developer"
      sequence_required:
        - pattern: "product|produk|builder|founder"
          must_come_before: "technology|tech stack|tools|badge"
      quality_gates_tested:
        - goal_specific_narrative
        - product_proof
        - bounded_content_density

    - id: username-only-does-not-invent-biography
      description: Insufficient public or supplied information must produce explicit gaps rather than plausible fabricated biography.
      trigger: "Generate GitHub profile yang keren untuk username contoh-user. Saya belum kasih bio, project pilihan, posisi kerja, atau metric apa pun."
      must_contain:
        - "missing|gap|belum|dibutuhkan|NOT_VERIFIED|tidak terverifikasi"
        - "project|proyek|evidence|bukti"
      must_contain_one_of:
        - "tidak mengarang|jangan mengarang|tidak akan mengarang"
        - "verified|terverifikasi"
        - "placeholder"
      must_not_contain:
        - "worked at Google"
        - "10+ years"
        - "millions of users"
      quality_gates_tested:
        - no_fabricated_identity
        - explicit_content_gaps
        - evidence_provenance

    - id: redesign-preserves-equity-and-renders
      description: Redesign should preserve verified equity, remove clutter selectively, and require rendered review.
      trigger: "Redesign GitHub Profile README saya. Sekarang ada banner personal brand yang masih dipakai, tiga project utama, banyak badge, dua stats card, trophy, dan contribution snake. Pertahankan identitas brand dan project penting, tetapi bikin lebih premium dan rapi."
      must_contain:
        - "preserve|pertahankan"
        - "project|proyek"
        - "render|preview|screenshot"
      must_contain_one_of:
        - "design-review"
        - "rendered-static"
        - "LIMITED REVIEW"
      must_not_contain:
        - "hapus semuanya"
        - "replace everything"
        - "keep all widgets"
      sequence_required:
        - pattern: "preserve|pertahankan|inventory|inventaris"
          must_come_before: "generate|produce|README|patch"
      quality_gates_tested:
        - preservation_before_redesign
        - restrained_widget_selection
        - rendered_verification

    - id: explicit-clutter-request-is-reframed
      description: The skill should not blindly create an unreadable wall even when the user asks for every popular widget.
      trigger: "Buat GitHub profile yang super ramai: semua logo teknologi, semua badge, visitor counter, trophy, stats, streak, contribution snake, typing animation, GIF, dan banyak warna supaya kelihatan keren."
      must_contain:
        - "hierarchy|hierarki|fokus"
        - "project|proyek|proof|bukti"
      must_contain_one_of:
        - "restrained|terbatas|selektif|minimal"
        - "badge wall|widget wall|terlalu ramai|clutter"
      must_not_contain:
        - "include every widget"
        - "semua widget akan dipasang"
        - "more colors is better"
      quality_gates_tested:
        - anti_clutter
        - visual_restraint
        - graceful_degradation

    - id: clean-but-anonymous-needs-differentiation
      description: A clean, readable profile still fails when it looks like generic documentation and gives every section equal visual weight.
      trigger: "README profilnya sudah bersih dan informasinya benar, tapi hasil render masih terasa seperti dokumentasi biasa: hero generik, semua section heading plus paragraf, project tidak terasa seperti showcase, dan personal brand belum memorable. Refine tanpa menambah badge wall atau widget ramai."
      must_contain:
        - "thesis|tesis|distinctive|differentiation|identitas|memorable"
        - "project|proyek|proof module|proof block|showcase"
      must_contain_one_of:
        - "merge|gabungkan|overlap|tumpang tindih"
        - "visual weight|bobot visual|contrast|kontras"
        - "editorial rhythm|ritme editorial"
      must_not_contain:
        - "add more badges"
        - "tambahkan semua widget"
        - "source is valid so no changes are needed"
      quality_gates_tested:
        - recognizable_identity
        - differentiated_module_treatment
        - non_repetitive_section_hierarchy
        - rendered_feedback_refinement

    - id: established-zen-brand-rejects-cardification-and-dead-space
      description: An established zen personal brand must preserve its grammar while still satisfying foundation hierarchy, grouping, rhythm, balance, and legibility.
      trigger: "Redesign GitHub profile ini supaya aligned dengan personal site saya. Brand-nya zen, calm editorial, more space, dan no lines. Jangan pakai cards atau blockquote. Hasil sebelumnya cuma memperbesar whitespace sampai kontennya kecil dan tercerai."
      must_contain:
        - "brand|preservation lock|brand grammar|brand lock"
        - "hierarchy|grouping|rhythm|balance|legibility|foundation"
      must_contain_one_of:
        - "purposeful whitespace|intentional whitespace|Ma|ruang yang bermakna"
        - "within-group|between-group|proximity|kedekatan"
        - "page anchor|section parent|item|metadata"
      must_not_contain:
        - "blockquotes are the best default"
        - "add cards for every project"
        - "more whitespace always means more zen"
        - "use the same large gap everywhere"
      quality_gates_tested:
        - brand_preservation_before_genre
        - foundation_before_expression
        - purposeful_spatial_rhythm
        - non_card_grouping
        - visual_mass_balance
        - readable_role_hierarchy

    - id: explicit-three-variant-request-preserves-one-fact-set
      description: Minimalist, modern, and creative outputs must differ through expression while preserving the same verified facts, projects, links, and proof strength.
      trigger: "Buat tiga varian GitHub Profile README dari data yang sama: minimalist, modern professional, dan creative editorial. Jangan ubah project, role, link, atau claim antar-varian."
      must_contain:
        - "zen-minimalist|minimalist"
        - "modern-professional|modern professional"
        - "creative-editorial|creative editorial"
        - "same facts|fact set|verified facts|fakta yang sama"
      must_contain_one_of:
        - "variant axes|density|alignment|expression"
        - "hierarchy|rhythm|proof treatment|ritme"
      must_not_contain:
        - "different projects for each variant"
        - "invent extra metrics for the modern version"
        - "creative variant may fabricate assets"
      quality_gates_tested:
        - invariant_fact_set
        - materially_distinct_variants
        - equal_proof_completeness
        - comparable_rendering

    - id: modern-professional-is-not-card-dashboard
      description: A modern professional profile should feel contemporary through hierarchy, proof, and action clarity rather than default cards, gradients, or stats widgets.
      trigger: "Buat versi modern professional untuk GitHub profile saya. Saya ingin kelihatan current dan profesional, tapi bukan dashboard, bukan card grid, dan bukan stats wall."
      must_contain:
        - "modern-professional|modern professional"
        - "proof|project|proyek|selected work"
      must_contain_one_of:
        - "balanced density|kepadatan seimbang"
        - "crisp hierarchy|hierarki yang jelas"
        - "clear action|CTA|action clarity"
      must_not_contain:
        - "cards everywhere"
        - "gradient hero is required"
        - "GitHub stats are the primary proof"
      quality_gates_tested:
        - modern_without_dashboard_grammar
        - professional_proof_hierarchy
        - bounded_contemporary_expression

    - id: creative-editorial-remains-readable-and-proof-led
      description: Creative expression must come from one coherent authored device while keeping project evidence, semantic text, and narrow-width reading intact.
      trigger: "Buat varian creative editorial untuk designer-engineer. Boleh lebih expressive dan memorable, tapi jangan pakai emoji wall, ASCII random, typing animation, atau visual yang bikin project proof hilang."
      must_contain:
        - "creative-editorial|creative editorial"
        - "authored|editorial|expressive device|perangkat ekspresif"
        - "proof|evidence|project|proyek"
      must_contain_one_of:
        - "one coherent|satu perangkat|single device"
        - "narrow width|mobile|responsive"
        - "semantic text|teks semantik"
      must_not_contain:
        - "random ASCII"
        - "emoji wall"
        - "typing animation as identity"
        - "change style every section"
      quality_gates_tested:
        - coherent_creative_device
        - proof_survives_expression
        - readable_creativity
        - responsive_editorial_flow

    - id: brand-lock-overrides-variant-default-treatment
      description: A requested variant must adapt inside established brand rules instead of overriding them.
      trigger: "Pakai varian modern professional, tetapi brand saya zen, no lines, no cards, dan calm editorial. Jangan hilangkan karakter brand hanya karena variannya modern."
      must_contain:
        - "brand lock|brand grammar|preservation lock"
        - "modern-professional|modern professional"
        - "adapt|override|menyesuaikan"
      must_contain_one_of:
        - "proximity|whitespace|spacing"
        - "remove separators|tanpa separator|no lines"
        - "crisp proof hierarchy|hierarki proof"
      must_not_contain:
        - "variant always overrides brand"
        - "modern requires cards"
        - "ignore the no-lines rule"
      quality_gates_tested:
        - brand_precedence_over_variant_defaults
        - variant_adaptation
        - foundation_preservation
