skill_test:
  skill: ports-and-adapters
  version: 1.0.1
  description: Verify ports-and-adapters exposes and applies its reviewed architecture or engineering contract interface.
  cases:
  - id: external-dependencies-cross-named-ports
    description: Design a feature so external services cross domain ports and adapters preserve dependency inversion.
    trigger: Apply ports-and-adapters to a realistic architecture or engineering decision and report the contract-backed result.
    must_contain:
    - all_external_dependencies_must_cross_via_port
    - dependency_inversion_principle_enforced_at_every_boundary
    - adapter_implementations
    - dependency_graph
    - architecture_decision_record
    - component_or_feature
    must_not_contain:
    - domain imports the framework
    quality_gates_tested:
    - all_external_dependencies_must_cross_via_port
    - dependency_inversion_principle_enforced_at_every_boundary
