skill_adapter:
  id: diagram-architect
  runtime: hermes
  version: "1.0.0"
  adapter_path: "adapters/hermes/diagram-architect/SKILL.md"
  installed_as: "diagram-architect"
  implements:
    contract:
      id: diagram-architect
      source: "https://github.com/puterakahfi/native-ai-core/contracts/skills/visual-thinking/diagram-architect.contract.yaml"
      version: "^0.1.0"
  category: creative
  capabilities:
    - diagram_intent_classification
    - renderer_agnostic_diagram_spec
    - architecture_visualization_handoff
    - workflow_visualization_handoff
    - runtime_topology_visualization
    - renderer_selection
    - diagram_verification
  composes_with:
    - architecture-diagram
    - excalidraw
    - ascii-art
  notes:
    - "The adapter must produce a diagram spec before choosing a renderer."
    - "Renderer-specific outputs must trace back to the spec."
