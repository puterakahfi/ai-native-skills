skill_adapter:
  id: native-ai-runtime-ops
  runtime: hermes
  version: "1.0.0"
  adapter_path: "adapters/hermes/native-ai-runtime-ops/SKILL.md"
  installed_as: "native-ai-runtime-ops"
  implements:
    contract:
      id: native-ai-runtime-ops
      source: "https://github.com/puterakahfi/native-ai-core/contracts/skills/runtime-operations/native-ai-runtime-ops.contract.yaml"
      version: "^0.1.0"
  category: software-development
  capabilities:
    - ssh_runtime_access
    - cloud_runtime_bootstrap
    - hermes_profile_installation
    - canonical_session_state_operations
