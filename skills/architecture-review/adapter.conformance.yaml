# Static structural declaration for ai-native-core/contracts/skills/quality/architecture-review.contract.yaml.
# Executable methodology remains owned by SKILL.md.
contract_schema:
  kind: adapter_conformance
  version: 1.0.0
  path: schemas/adapter-conformance.schema.yaml
adapter_conformance:
  adapter:
    id: architecture-review
    kind: skill
    patterns:
      - skill-adapter
    entrypoint: skills/architecture-review/SKILL.md
  implements:
    contract_id: architecture-review
    contract_kind: skill_contract
    contract_path: contracts/skills/quality/architecture-review.contract.yaml
    contract_version: "~0.1"
  capability: engineering_contract_compliance_review
  interface:
    inputs:
      - code_or_pr_diff
      - engineering_contract_ref
      - adr_list
      - existing_dependency_list
      - folder_structure
      - test_coverage_report
    outputs:
      - compliance_verdict
      - violation_list
      - adr_required_flag
      - new_dependency_flag
      - architecture_smell_list
      - recommendation_list
    gates:
      - must_load_engineering_contract_before_review
      - must_check_stack_compliance
      - must_check_layer_boundary_violations
      - must_check_unauthorized_dependencies
      - must_check_architecture_style_compliance
      - must_check_test_strategy_compliance
      - must_flag_adr_requirement_when_contract_change_detected
      - must_not_approve_generated_code_that_violates_contract
      - treats_compiled_as_approved_is_forbidden
  boundary:
    covers: []
    delegates: []
  dependencies: []
  handoffs: []
  unsupported_claims: []
  adapter_requirements:
    - engineering_contract_source
    - adr_format
    - violation_severity_policy
    - blocking_vs_warning_policy
  evidence_refs:
    - id: architecture-review-core-contract
      layer: structural
      path: contracts/skills/quality/architecture-review.contract.yaml
      claim: Canonical contract identity and interface source.
    - id: migration-issue-99
      layer: structural
      uri: https://github.com/puterakahfi/ai-native-skills/issues/99
      claim: Bounded migration scope and acceptance criteria.
