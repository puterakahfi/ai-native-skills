      - design_pattern_or_component_fitness_selection
      - visual_style_brand_or_design_system_definition
      - runtime_behavior_visual_quality_or_accessibility_acceptance
      - architecture_compliance_acceptance_after_implementation
      - dependency_purchase_legal_or_licensing_approval
      - product_specific_migration_execution
      - backend_domain_or_business_policy
      - repository_write_or_merge_execution
  dependencies: []
  handoffs: []
  unsupported_claims: []
  adapter_requirements:
