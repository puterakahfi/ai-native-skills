    - framework_component_styling_and_icon_libraries_are_product_defined
    - canonicality_evidence_must_reference_actual_repository_sources
    - adapter_must_distinguish_installed_from_canonical_and_legacy_dependencies
    - adapter_must_inventory_actual_components_variants_registry_availability_and_typography_roles
    - adapter_must_emit_component_capability_coverage_before_component_creation
    - adapter_must_distinguish_semantic_native_structure_from_duplicate_interactive_contracts
    - adapter_must_consider_canonical_registry_addition_before_parallel_component_systems
    - adapter_must_emit_convention_locks_before_code_production
    - adapter_must_record_reuse_extension_registry_and_dependency_decisions
    - adapter_must_preserve_independent_architecture_review
